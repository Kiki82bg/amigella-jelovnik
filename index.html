      const norm = (typeof normalizeQtyUnit === 'function')

        : { qty: m[1], unit: m[2] || 'g' };
      return { name: m[3].trim(), qty: norm.qty, unit: norm.unit, source: 'user' };
    }

  // Dodaj u formState — pokušaj sve moguće scope-ove
  const fs = window._amI?.formState || (typeof formState !== 'undefined' ? formState : null);
  if (fs) {
    ings.forEach(ing => {

const AM_RK_STORAGE = 'am_recovery_key_v1';

// ── 1. Generiši Recovery Key (256-bit, hex) ───────────────────
function generateRecoveryKey() {
  const bytes = crypto.getRandomValues(new Uint8Array(32));
  return [...bytes].map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── 2. Derivacija AES ključa iz Recovery Key-a ───────────────
async function keyFromRecovery(recoveryHex) {
  const raw = new Uint8Array(recoveryHex.match(/.{1,2}/g).map(h => parseInt(h, 16)));
  return await crypto.subtle.importKey('raw', raw, 'AES-GCM', false, ['encrypt', 'decrypt']);
}

// ── 3. Enkripcija/dekripcija sa Recovery Key formatom ─────────
async function encryptWithRecovery(aesKey, dataObj) {
  // Svaki poziv generiše jedinstven random 12-byte IV — nikad ne reciklirati!
  // AES-GCM sigurnost zavisi od IV jedinstvenosti po ključu.
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = new TextEncoder().encode(JSON.stringify(dataObj));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, aesKey, data);
  return { iv: Array.from(iv), ct: Array.from(new Uint8Array(ct)) };
}
async function decryptWithRecovery(aesKey, payload) {
  const iv = new Uint8Array(payload.iv);
  const ct = new Uint8Array(payload.ct);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, aesKey, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

// ── 4. Čuvanje/učitavanje Recovery Key-a lokalno ─────────────
function amRKSave(hex) {
  try { localStorage.setItem(AM_RK_STORAGE, hex); } catch (_) {}
}
function amRKLoad() {
  try { return localStorage.getItem(AM_RK_STORAGE) || null; } catch (_) { return null; }
}

// ── 5. AES ključ iz lokalnog Recovery Key-a ──────────────────
let _amAesKey = null; // cache u memoriji
async function amGetAesKey() {
  if (_amAesKey) return _amAesKey;
  let rk = amRKLoad();
  if (!rk) {
    rk = generateRecoveryKey();

    // Prikaži modal pri prvom generisanju
    setTimeout(() => amShowRecoveryKeyModal(rk), 500);

  return _amAesKey;
}

// ── Lokalna enkripcija (AES-GCM, zero-knowledge) ─────────────
async function amEncrypt(data) {
  // Ključ iz user ID + salt — nikad ne napušta uređaj
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(AM_SYNC.userId.slice(0, 32).padEnd(32, '0')),
    'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('amigella_v13'), iterations: 100000, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt']
  );
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(data))
  );
  // Kombiniraj IV + encrypted u base64
  const combined = new Uint8Array(iv.length + encrypted.byteLength);
  combined.set(iv); combined.set(new Uint8Array(encrypted), iv.length);
  return btoa(String.fromCharCode(...combined));
}
async function amDecrypt(base64) {
  const enc = new TextEncoder();
  const combined = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
  const iv = combined.slice(0, 12);
  const data = combined.slice(12);
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(AM_SYNC.userId.slice(0, 32).padEnd(32, '0')),
    'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('amigella_v13'), iterations: 100000, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
  );
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
  return JSON.parse(new TextDecoder().decode(decrypted));
}

// ── REST API pozivi (Supabase HTTP API, bez SDK) ───────────────
async function _supabaseFetch(path, method, body) {
  const resp = await fetch(AM_SYNC.url + '/rest/v1/' + path, {
    method: method || 'GET',
    headers: {
      'apikey': AM_SYNC.key,
      'Authorization': 'Bearer ' + AM_SYNC.key,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=minimal' : '',
      'X-Client-Info': 'amigella-jelovnik/13'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!resp.ok && resp.status !== 204) {
    const err = await resp.text().catch(() => resp.status);
    throw new Error('Supabase ' + resp.status + ': ' + err);
  }
  if (resp.status === 204) return null;
  return resp.json().catch(() => null);
}

// ── Spremi recept u cloud ─────────────────────────────────────
async function amSyncSaveRecipe(recipe) {
  if (!AM_SYNC.enabled || !recipe?.name) return false;
  if (AM_SYNC.syncing) return false;
  AM_SYNC.syncing = true;
  try {
    // Koristi Recovery Key enkripciju (multi-device)
    const aesKey = await amGetAesKey();
    const payload = await encryptWithRecovery(aesKey, recipe);
    const row = {
      user_id: AM_SYNC.userId,
      recipe_id: recipe.id || ('r_' + Date.now()),
      name_hash: btoa(encodeURIComponent(recipe.name || '')).slice(0, 32),
      encrypted_data: JSON.stringify(payload), // {iv:[], ct:[]}
      updated_at: new Date().toISOString()
    };
    // Upsert — insert ili update ako već postoji
    await _supabaseFetch(
      'am_recipes?user_id=eq.' + AM_SYNC.userId + '&recipe_id=eq.' + row.recipe_id,
      'DELETE'
    ).catch(() => {}); // ignoriši ako ne postoji
    await _supabaseFetch('am_recipes', 'POST', row);
    _amSyncShowBadge('☁️ Sačuvano');
    amTelEvent('sync_save');
    return true;
  } catch (e) {
    console.warn('[Sync] Save failed:', e.message);
    _amSyncShowBadge('⚠️ Offline kopija');
    amTelEvent('error', { msg: 'sync_save: ' + e.message.slice(0, 50) });
    return false;
  } finally {
    AM_SYNC.syncing = false;
  }
}

// ── Učitaj sve recepte iz cloud-a ────────────────────────────
async function amSyncLoadRecipes() {
  if (!AM_SYNC.enabled) return null;
  try {
    const rows = await _supabaseFetch(
      'am_recipes?user_id=eq.' + AM_SYNC.userId + '&order=updated_at.desc'
    );
    if (!Array.isArray(rows) || !rows.length) return [];
    const recipes = [];
    for (const row of rows) {
      try {
        const aesKey = await amGetAesKey();
        const payload = JSON.parse(row.encrypted_data);
        const decrypted = await decryptWithRecovery(aesKey, payload);
        recipes.push(decrypted);
      } catch (_) {}
    }
    amTelEvent('sync_load');
    return recipes;
  } catch (e) {
    console.warn('[Sync] Load failed:', e.message);
    return null;
  }
}

// ── AI Cache (24h, po nazivu jela) ───────────────────────────
const _aiCache = new Map();
const AI_CACHE_TTL = 24 * 60 * 60 * 1000; // 24h
function _cacheGet(key) {
  const e = _aiCache.get(key);
  if (!e) return null;
  if (Date.now() - e.ts > AI_CACHE_TTL) { _aiCache.delete(key); return null; }
  return e.val;
}
function _cacheSet(key, val) { _aiCache.set(key, { val, ts: Date.now() }); }

// ── Rate limit + dnevni token budžet (meki guardrail) ────────

  count: 0,
  tokens: 0,          // procijenjeni tokeni (prompt ~200 + output ~300 = ~500/poziv)
  day: new Date().toDateString(),
  max: 10,            // max poziva/dan
  maxTokens: 5000,    // meki cap: ~10 poziva × 500 tokena
};
function _aiRateCheck(estimatedTokens) {
  const today = new Date().toDateString();
  if (_aiRateLimit.day !== today) {
    _aiRateLimit.count = 0;
    _aiRateLimit.tokens = 0;
    _aiRateLimit.day = today;
  }
  if (_aiRateLimit.count >= _aiRateLimit.max) {
    toast('Dostigla si dnevni limit AI predloga. Dodaj sastojke ručno ili pokušaj sutra. 💜', 'error');
    return false;
  }
  if (_aiRateLimit.tokens >= _aiRateLimit.maxTokens) {
    toast('Dnevni AI budžet iskorišten. Možeš dodavati sastojke ručno — sve radi normalno. 💜', 'error');
    return false;
  }
  _aiRateLimit.count++;
  _aiRateLimit.tokens += (estimatedTokens || 500);
  amTelEvent('ai_rate_check', { count: _aiRateLimit.count, tokens: _aiRateLimit.tokens });
  return true;
}

// ══════════════════════════════════════════════════════════════
// NETWORK RESILIENCY LAYER — Beta 2
// Retry + Backoff + Jitter + Timeout + CORS + 429 + 5xx + Offline
// ══════════════════════════════════════════════════════════════

// ── Error taxonomy ─────────────────────────────────────────────
const NET_ERR = {
  OFFLINE:  'offline',
  CORS:     'cors',
  TIMEOUT:  'timeout',
  RATE_429: 'rate_429',
  SERVER:   'server_5xx',
  ABORT:    'abort',
  UNKNOWN:  'unknown'
};

function classifyNetError(err, status) {
  if (!navigator.onLine || err?.message?.includes('NetworkError') || err?.message?.includes('Failed to fetch'))
    return NET_ERR.OFFLINE;
  if (err?.name === 'AbortError') return NET_ERR.ABORT;
  if (err?.message?.includes('CORS') || err?.message?.includes('cross-origin') || err?.message?.includes('blocked'))
    return NET_ERR.CORS;
  if (status === 429) return NET_ERR.RATE_429;
  if (status >= 500 && status <= 599) return NET_ERR.SERVER;
  if (err?.name === 'TimeoutError' || err?.message?.includes('timeout')) return NET_ERR.TIMEOUT;
  return NET_ERR.UNKNOWN;
}

// ── User-facing messages (localized-ready) ─────────────────────
const NET_MSG = {
  offline:     'Nema interneta. Koristiš sačuvane podatke.',
  cors:        'Nemoguće dohvatiti podatke. Pokušaj ponovo.',
  timeout:     'Zahtjev predugo traje. Pokušaj ponovo.',
  rate_429:    'Previše zahtjeva. Čekam trenutak...',
  server_5xx:  'Servis trenutno nedostupan. Pokušaj za par sekundi.',
  abort:       '',   // tiho — korisnica je sama zatvorila
  unknown:     'Nešto nije u redu. Pokušaj ponovo.'
};

// ── QA mode (aktivira se sa ?qa=1 u URL-u) ────────────────────
const _QA = (new URLSearchParams(window.location.search)).get('qa') === '1';
function qaLog(tag, data) {
  if (!_QA) return;
  console.groupCollapsed(`%c[QA:${tag}]`, 'color:#C9A96E;font-weight:bold', JSON.stringify(data||{}).slice(0,120));
  console.trace();

}

// Long task observer (QA mode)
if (_QA && 'PerformanceObserver' in window) {
  try {
    new PerformanceObserver(list => {
      list.getEntries().forEach(e => {
        if (e.duration > 50) qaLog('LONG_TASK', {ms: Math.round(e.duration), name: e.name});
      });

  // Storage estimate
  if (navigator.storage?.estimate) {
    navigator.storage.estimate().then(est => {

    });
  }
}

// ── Retry s Backoff + Jitter + AbortController + Timeout ──────
// delays: 250→500→1000→2000→4000ms (cap), jitter ±20%
async function retryWithBackoff(fn, opts) {
  const {
    maxAttempts = 3,
    baseDelay   = 250,
    maxDelay    = 4000,
    timeoutMs   = 7000,
    signal      = null,      // vanjski AbortSignal (modal close)
    onRetry     = null,      // callback(attempt, delay, errType)
  } = opts || {};

  let lastErr, lastStatus;

  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    // Provjeri da li je otkazano
    if (signal?.aborted) throw Object.assign(new Error('aborted'), {name:'AbortError'});

    // Backoff + jitter (osim prvog pokušaja)
    if (attempt > 0) {
      const exp = Math.min(baseDelay * Math.pow(2, attempt - 1), maxDelay);
      const jitter = exp * 0.2 * (Math.random() * 2 - 1); // ±20%
      const delay = Math.round(exp + jitter);
      qaLog('RETRY', {attempt, delay, errType: classifyNetError(lastErr, lastStatus)});
      if (onRetry) onRetry(attempt, delay, classifyNetError(lastErr, lastStatus));
      await new Promise((res, rej) => {
        const t = setTimeout(res, delay);
        if (signal) signal.addEventListener('abort', () => { clearTimeout(t); rej(new DOMException('aborted','AbortError')); }, {once:true});
      });
    }

    // Per-request timeout
    const reqAbort = new AbortController();
    const timeoutId = setTimeout(() => reqAbort.abort(), timeoutMs);
    // Kombiniraj vanjski signal i timeout signal
    if (signal) signal.addEventListener('abort', () => reqAbort.abort(), {once:true});

    try {
      const result = await fn(reqAbort.signal);
      clearTimeout(timeoutId);
      qaLog('NET_OK', {attempt});
      return result;
    } catch(e) {
      clearTimeout(timeoutId);
      lastErr = e;
      lastStatus = e.status;
      const errType = classifyNetError(e, e.status);
      qaLog('NET_ERR', {attempt, errType, msg: e.message?.slice(0,80)});

      // Ne ponavljaj ako: abort, offline (nema smisla), CORS (neće se popraviti)
      if (errType === NET_ERR.ABORT) throw e;
      if (errType === NET_ERR.OFFLINE) throw Object.assign(e, {_netType: NET_ERR.OFFLINE});
      if (errType === NET_ERR.CORS) throw Object.assign(e, {_netType: NET_ERR.CORS});

      // 429 — čekaj Retry-After ako postoji
      if (errType === NET_ERR.RATE_429 && e._retryAfter) {
        const extra = Math.min(parseInt(e._retryAfter) * 1000, 10000);
        await new Promise(r => setTimeout(r, extra));
      }

      if (attempt === maxAttempts - 1) throw Object.assign(e, {_netType: errType});
    }
  }
}

// ── Generički Claude API poziv — NOVA verzija ─────────────────
async function callClaude(userPrompt, systemPrompt, imageBase64, imageMime) {
  const msgContent = [];
  if (imageBase64) {
    msgContent.push({ type:'image', source:{type:'base64', media_type:imageMime||'image/jpeg', data:imageBase64} });
  }
  msgContent.push({ type:'text', text:userPrompt });
  const body = {
    model: CLAUDE_MODEL,
    max_tokens: CLAUDE_MAX_TOKENS,
    system: systemPrompt || '',
    messages: [{ role:'user', content:msgContent }]
  };

  // Modal close signal — otkazuje sve pending zahtjeve
  const modalSignal = window._amModalAbort?.signal || null;

  const result = await retryWithBackoff(
    async (signal) => {
      window._aiAbortController = new AbortController();
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal,
      });
      if (resp.status === 429) {
        const retryAfter = resp.headers.get('Retry-After');
        const err = new Error('Claude API 429');
        err.status = 429;
        err._retryAfter = retryAfter;
        // Pokaži korisniku
        if(typeof toast==='function') toast(NET_MSG.rate_429, 'info');
        throw err;
      }
      if (!resp.ok) {
        const err = new Error('Claude API ' + resp.status);
        err.status = resp.status;
        throw err;
      }
      const data = await resp.json();
      return data.content?.find(b => b.type === 'text')?.text || '';
    },
    {
      maxAttempts: 3,
      baseDelay: 250,
      maxDelay: 4000,
      timeoutMs: 7000,
      signal: modalSignal,
      onRetry: (attempt, delay, errType) => {
        if (errType === NET_ERR.SERVER && typeof toast === 'function') {
          toast(NET_MSG.server_5xx, 'info');
        }
      }
    }
  );
  return result;
}


// ── Helper: da li je slika tanjir/jelo (bez teksta)? ─────────
// Heuristika na bazi OCR rezultata — ne troši extra API poziv
async function _detectIfDishPhoto(base64, mime) {
  // Brza heuristika: Tesseract na thumbnail — ako < 5 znakova teksta → vjerovatno tanjir
  // Samo ako je Tesseract dostupan (lazy load)
  try {
    await loadTesseract();
    if (!window.Tesseract) return false;
    // Konvertuj base64 u blob za Tesseract
    const byteStr = atob(base64.slice(0, Math.min(base64.length, 50000))); // truncate za brzinu
    const arr = new Uint8Array(byteStr.length);
    for (let i = 0; i < byteStr.length; i++) arr[i] = byteStr.charCodeAt(i);
    const blob = new Blob([arr], { type: mime || 'image/jpeg' });
    const { data: { text } } = await Tesseract.recognize(blob, 'eng', { logger: () => {} });
    return (text || '').replace(/\s/g, '').length < 10; // < 10 znakova = tanjir
  } catch (_) { return false; }
}

// ── Parsiranje JSON iz Claude odgovora ─────────────────────
function parseClaudeJson(text) {
  // Ukloni markdown code fence ako postoji
  const clean = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  try { return JSON.parse(clean); } catch (_) {
    // Pokušaj naći JSON array ili objekt unutar teksta
    const arrMatch = clean.match(/\[[\s\S]*\]/);
    if (arrMatch) { try { return JSON.parse(arrMatch[0]); } catch (_) {} }
    const objMatch = clean.match(/\{[\s\S]*\}/);
    if (objMatch) { try { return JSON.parse(objMatch[0]); } catch (_) {} }
    return null;
  }
}

// Redosljed: cache → seed → Claude (fallback) — optimalno za trošak i brzinu
async function fetchAiIngredients(mealName) {
  if (!mealName || mealName.trim().length < 2) return null;
  const cacheKey = mealName.toLowerCase().trim();

  // ── Offline check — odmah vrati null, ne troši bateriju ──
  if (!navigator.onLine) {
    qaLog('NET_OFFLINE', {fn: 'fetchAiIngredients'});
    if(typeof toast==='function') toast(NET_MSG.offline, 'info');
    return null;
  }
  // 1. Cache hit → odmah vrati
  const cached = _cacheGet(cacheKey);
  if (cached) return cached;

  const sys = [
    'Ti si kulinarski asistent. Vraćaš ISKLJUČIVO validan JSON array.',
    'Format: [{"name":"naziv","qty":"količina","unit":"jedinica","confidence":0.9}]',

  const prompt = `Napiši listu sastojaka za jelo: "${mealName}". JSON array, max 12 stavki.`;

}

// ── TAČKA 2a: OCR via Claude Vision ──────────────────────────
async function ocrImageViaClaudeVision(file) {
  if (!file) return [];

    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const base64 = ev.target.result.split(',')[1];
        const mime = file.type || 'image/jpeg';
        const sys = [
          'Ti si OCR asistent za recepte.',
          'Vraćaš ISKLJUČIVO validan JSON array sastojaka.',
          'Format: [{"name":"naziv","qty":"količina","unit":"jedinica"}]',
          'Jedinice SAMO: g, kg, ml, l, kom, kaš, kšč.',
          'Primjeri: jaje→kom, voda→ml, brašno→g, ulje→ml, so→kšč, pavlaka→kaš.',
          'Ako slika nema tekst recepta ili je nečitka — vrati [].',
          'Bez objašnjenja. Samo JSON.'
        ].join(' ');
        const prompt = [
          'Izvuci listu sastojaka iz ove slike.',
          'Ako slika prikazuje tekst recepta: vrati JSON array.',
          'Ako slika prikazuje gotovo jelo (tanjir/foto) bez teksta: vrati JSON array sa confidence <= 0.5 za svaki sastojak i dodaj polje "low_confidence": true u prvi element.',
          'Format: [{"name":"naziv","qty":"kol","unit":"jed","confidence":0.9}].',
          'Jedinice SAMO: g,ml,kom,kašič,kašika. Bez objašnjenja. Samo JSON.'
        ].join(' ');
        const isTanjir = await _detectIfDishPhoto(base64, mime);
        if (isTanjir) toast('Ovo je samo okvirna procena sastojaka (niska sigurnost). 🍽️');

        resolve(ings);
      } catch (e) {
        // Tiho za mrežne greške u preview okruženju
        if(e.message && !e.message.includes('fetch') && !e.message.includes('postMessage') && !e.message.includes('cloned'))
          console.warn('[Claude Vision OCR]', e.message);
        resolve([]);
      }
    };
    reader.readAsDataURL(file);
  });
}

// ── TAČKA 2b: Link import via Claude ─────────────────────────
async function fetchIngredientsFromUrl(url) {
  if (!url || !/^https?:\/\//i.test(url)) return null;
  try {
    // Korak 1: dohvati HTML via proxy
    toast('Dohvaćam recept…');
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
    const resp = await Promise.race([
      fetch(proxy),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000))
    ]);
    if (!resp.ok) throw new Error('proxy ' + resp.status);
    const data = await resp.json();
    const html = data.contents || '';
    if (!html) throw new Error('empty');

    // Korak 2: Pokušaj schema.org brzo (bez AI)
    const schemaIngs = parseRecipeFromHtml(html);
    if (schemaIngs && schemaIngs.length >= 2) {
      toast('Recept učitan ✓');
      return schemaIngs;
    }

    // Korak 3: Fallback — Claude parsira plain text
    toast('Claude analizira stranicu…');
    // Očisti HTML na plain text (max 3000 znakova)
    const plain = html
      .replace(/<script[\s\S]*?<\/script>/gi, '')
      .replace(/<style[\s\S]*?<\/style>/gi, '')
      .replace(/<[^>]+>/g, ' ')
      .replace(/\s+/g, ' ')
      .trim()
      .slice(0, 3000);

    const sys = [
      'Ti si asistent za parsiranje recepata.',
      'Vraćaš ISKLJUČIVO validan JSON array sastojaka iz teksta.',
      'Format: [{"name":"naziv","qty":"količina","unit":"jedinica"}]',
      'Jedinice SAMO: g, ml, kom, kašič, kašika.',
      'Ako tekst nema recept — vrati [].',
      'Bez objašnjenja. Samo JSON.'
    ].join(' ');
    const prompt = 'Izvuci listu sastojaka iz ovog teksta stranice:\n\n' + plain;
    const raw = await callClaude(prompt, sys);
    const parsed = parseClaudeJson(raw);
    if (!Array.isArray(parsed) || !parsed.length) return [];
    return parsed.map(i => ({
      name: String(i.name||'').trim(),
      qty: String(i.qty||''),
      unit: i.unit||'g'
    })).filter(i => i.name.length > 1);
  } catch (e) {
    // Tiho — mreža blokirana u preview okruženju
    if(!e.message||!e.message.includes('fetch')) console.warn('[Claude Link Import]', e.message);
    return null;
  }
}

const AM_TELEMETRY_KEY = 'am_telemetry_v1';
const _amTelemetry = {
  sessions: 0,
  saves: 0,
  ai_triggers: 0,
  ai_accepted: 0,
  ai_dismissed: 0,
  ai_regen: 0,
  link_imports: 0,
  link_success: 0,
  ocr_attempts: 0,
  ocr_success: 0,
  ttfap_ms: [],       // time-to-first-AI-proposal
  ocr_ms: [],         // OCR duration
  link_ms: [],        // link import duration
  errors: [],         // nežni error log (bez PII)
};

function amTelLoad(){
  try{
    const saved = localStorage.getItem(AM_TELEMETRY_KEY);
    if(saved) Object.assign(_amTelemetry, JSON.parse(saved));
  }catch(_){}
}
function amTelSave(){
  try{ localStorage.setItem(AM_TELEMETRY_KEY, JSON.stringify(_amTelemetry)); }catch(_){}
}
function amTelEvent(event, data){
  try{
    switch(event){
      case 'session_open':    _amTelemetry.sessions++; break;
      case 'meal_saved':      _amTelemetry.saves++; break;
      case 'ai_trigger':      _amTelemetry.ai_triggers++; break;
      case 'ai_accepted':     _amTelemetry.ai_accepted++; break;
      case 'ai_dismissed':    _amTelemetry.ai_dismissed++; break;
      case 'ai_regen':        _amTelemetry.ai_regen++; break;
      case 'link_import':     _amTelemetry.link_imports++; break;
      case 'link_success':    _amTelemetry.link_success++; if(data?.ms) _amTelemetry.link_ms.push(data.ms); break;
      case 'ocr_attempt':     _amTelemetry.ocr_attempts++; break;
      case 'ocr_success':     _amTelemetry.ocr_success++; if(data?.ms) _amTelemetry.ocr_ms.push(data.ms); break;
      case 'ttfap':           if(data?.ms) _amTelemetry.ttfap_ms.push(data.ms); break;
      case 'error':           if(data?.msg) _amTelemetry.errors.push({t:Date.now(),m:data.msg.slice(0,80)}); break;
    }
    // Čuvaj samo posljednjih 50 mjerenja za svaku metriku
    ['ttfap_ms','ocr_ms','link_ms'].forEach(k=>{
      if(_amTelemetry[k].length > 50) _amTelemetry[k] = _amTelemetry[k].slice(-50);
    });
    if(_amTelemetry.errors.length > 20) _amTelemetry.errors = _amTelemetry.errors.slice(-20);
    amTelSave();
  }catch(_){}
}
function amTelReport(){
  const t = _amTelemetry;
  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : null;
  const p95 = arr => {
    if (!arr.length) return null;
    const s = [...arr].sort((a,b)=>a-b);
    return s[Math.floor(s.length * 0.95)] || s[s.length-1];
  };
  // Pragovi upozorenja (Copilot review)
  const warnings = [];
  if (p95(t.ttfap_ms) > 3500) warnings.push('⚠️ TTFAP p95 > 3.5s — optimizuj prompt ili HTML ekstrakciju');
  if (p95(t.ocr_ms) > 6000) warnings.push('⚠️ OCR p95 > 6s — provjeri mrežu i lazy-load sekvencu');
  if (t.link_imports > 0 && (t.link_success/t.link_imports) < 0.5)
    warnings.push('⚠️ Link import success rate < 50% — provjeri schema.org parser');
  if (t.ai_triggers > 0 && (t.ai_accepted/t.ai_triggers) < 0.3)
    warnings.push('ℹ️ AI accept rate < 30% — korisnice često odbacuju predloge');
  return {
    sessions: t.sessions,
    saves: t.saves,
    ai: {
      triggers: t.ai_triggers,
      accepted: t.ai_accepted,
      dismissed: t.ai_dismissed,
      regen: t.ai_regen,
      accept_rate: t.ai_triggers ? ((t.ai_accepted/t.ai_triggers)*100).toFixed(1)+'%' : 'n/a',
      avg_ttfap_ms: avg(t.ttfap_ms),
    },
    link_import: {
      attempts: t.link_imports,
      success: t.link_success,
      success_rate: t.link_imports ? ((t.link_success/t.link_imports)*100).toFixed(1)+'%' : 'n/a',
      avg_ms: avg(t.link_ms),
    },
    ocr: {
      attempts: t.ocr_attempts,
      success: t.ocr_success,
      success_rate: t.ocr_attempts ? ((t.ocr_success/t.ocr_attempts)*100).toFixed(1)+'%' : 'n/a',
      avg_ms: avg(t.ocr_ms),
    },
    recent_errors: t.errors.slice(-5),
    p95: { ttfap: p95(t.ttfap_ms), ocr: p95(t.ocr_ms), link: p95(t.link_ms) },
    warnings,
    daily_rate: { count: _aiRateLimit.count, tokens: _aiRateLimit.tokens, max: _aiRateLimit.max },
  };
}
// Inicijalizuj telemetriju

// ── Locale detekcija ──────────────────────────────────────────
function detectLocale(){
  const lang=(navigator.language||navigator.userLanguage||'').toLowerCase();
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';
  const tzLower=tz.toLowerCase();
  if(tzLower.includes('dubai')||tzLower.includes('riyadh')||tzLower.includes('qatar')||
     lang.startsWith('ar'))return'ME'; // Middle East
  if(tzLower.includes('istanbul')||lang.startsWith('tr'))return'TR';
  if(lang.startsWith('sr')||lang.startsWith('hr')||lang.startsWith('bs')||
     tzLower.includes('belgrade')||tzLower.includes('zagreb')||tzLower.includes('sarajevo'))return'YU';
  return'GLOBAL';
}

// ── Lokalizovani tekst ────────────────────────────────────────
function localizeText(key){
  const locale=detectLocale();
  const map={
    'djeca_label':{'YU':'Djeca','GLOBAL':'Deca','ME':'Djeca','TR':'Çocuklar'},
    'post_label':{'YU':'Post','GLOBAL':'Lent/Post','ME':'Ramadan','TR':'Oruç'},
    'brzi_obroci':{'YU':'Brzi obroci','GLOBAL':'Quick meals','ME':'وجبات سريعة','TR':'Hızlı yemek'},
    'gosti':{'YU':'Za goste','GLOBAL':'For guests','ME':'للضيوف','TR':'Misafir'},
  };
  return (map[key]||{})[locale]||(map[key]||{})['YU']||key;
}

// Vraća pakete koji su "aktuelni" na osnovu tekućeg datuma
function getSeasonalPacks(){
  const now=new Date();
  const m=now.getMonth()+1; // 1-12
  const locale=detectLocale();
  const packs=[];

  // Ramadan (approx — pomjera se ~11 dana godišnje; hardkodiran za 2026)
  // 2026: Ramadan ~18 Feb - 19 Mar
  const isRamadan=(m===2&&now.getDate()>=18)||(m===3&&now.getDate()<=19);
  if(isRamadan||(locale==='ME')){
    packs.push({key:'ramadan_s',label:'🌙 Ramadan',group:'period',
      cats:['halal','iftar','suhur','bez_alkohola'],
      labels:{halal:'Halal',iftar:'Iftar jelo',suhur:'Suhur jelo',bez_alkohola:'Bez alkohola'}});
  }

  // Pravoslavni/Katolički post (oktobar–novembar Petrov, decembar Božićni, mart-apr Veliki)
  const isPost=(m===3)||(m===4&&now.getDate()<=19)||(m===11)||(m===12&&now.getDate()<=6);
  if((isPost&&locale==='YU')||(!isRamadan&&locale==='GLOBAL'&&(m===3||m===4))){
    packs.push({key:'post_s',label:'🕊️ '+localizeText('post_label'),group:'period',
      cats:['posno','bez_mesa','vegetarijansko'],
      labels:{bez_mesa:'Bez mesa',posno:'Posno'}});
  }

  // Advent (decembar)
  if(m===12&&now.getDate()<=24){
    packs.push({key:'advent_s',label:'🎄 Blagdani',group:'period',
      cats:['blagdansko','svecano','desert'],
      labels:{blagdansko:'Blagdansko',svecano:'Svečano',desert:'Desert'}});
  }

  // Ljeto (jun-august) - lagana jela
  if(m>=6&&m<=8){
    packs.push({key:'ljeto_s',label:'☀️ Ljetni meni',group:'period',
      cats:['lako','hladno','osvjezavajuce'],
      labels:{lako:'Lagano',hladno:'Hladno',osvjezavajuce:'Osvježavajuće'}});
  }

  return packs;
}

function renderMainPacks(){
  const wrap=document.getElementById('main-packs-wrap');
  if(!wrap)return;
  wrap.innerHTML='';

  // Skupi sve pakete: sezonski + moji + statički
  const seasonal=getSeasonalPacks();
  const myPacks=getMyFreqPacks();
  const allPacks=[...myPacks,...seasonal,...STATIC_PACKS];

  // Grupiši
  const groups={
    mine:{label:'Moji',packs:[]},
    period:{label:'Sada',packs:[]},
    lifestyle:{label:'Lifestyle',packs:[]},
    family:{label:'Porodica',packs:[]},
  };
  allPacks.forEach(p=>{ if(groups[p.group])groups[p.group].packs.push(p); });

  Object.entries(groups).forEach(([gKey,g])=>{
    if(!g.packs.length)return;
    const groupDiv=document.createElement('div');groupDiv.className='packs-group';
    const glbl=document.createElement('div');glbl.className='packs-group-label';
    glbl.textContent=g.label;groupDiv.appendChild(glbl);
    const row=document.createElement('div');row.className='packs-group-row';

    g.packs.forEach(pack=>{
      const matchCount=S.meals.filter(m=>(m.tags||[]).some(t=>{
        const k=(t||'').toLowerCase().replace(/\s+/g,'_');
        return pack.cats.includes(k);
      })).length;

      // Je li ovaj filter aktivan?
      const af=window._getActiveCatFilter?window._getActiveCatFilter():null;
      const active=af&&pack.cats.some(c=>{
        return S.meals.flatMap(m=>m.tags||[]).some(t=>(t||'').toLowerCase().replace(/\s+/g,'_')===c&&
          af===(t));
      });

      const btn=document.createElement('button');btn.type='button';
      const cssGroup='pack-'+(pack.group==='mine'?'mine':pack.group==='period'?'period':
        pack.group==='family'?'family':'lifestyle');
      btn.className='preset-pack-btn '+cssGroup+(active?' applied':'');
      btn.textContent=pack.label+(matchCount?' ('+matchCount+')':'');
      btn.title=pack.cats.map(c=>pack.labels&&pack.labels[c]?pack.labels[c]:c).join(', ');

      btn.addEventListener('click',()=>{
        if(active){
          if(window._setActiveCatFilter)window._setActiveCatFilter(null);
        } else {
          // Filtriraj po prvoj kategoriji ovog paketa koja ima jela
          let filterLabel=null;
          for(const c of pack.cats){
            const found=S.meals.flatMap(m=>m.tags||[]).find(t=>
              (t||'').toLowerCase().replace(/\s+/g,'_')===c);
            if(found){filterLabel=found;break;}
          }
          if(filterLabel&&window._setActiveCatFilter)window._setActiveCatFilter(filterLabel);
        }
        if(window._renderMealsFilter)window._renderMealsFilter();
        renderMeals();renderMainPacks();
      });
      row.appendChild(btn);
    });
    groupDiv.appendChild(row);wrap.appendChild(groupDiv);
  });
}

  if(/jaj|kajgan|omlet/.test(key)) return MEAL_SVG_ICONS.jaja;

// ── Migracija starih jela bez cats polja ─────────────────────
const _TAG_TO_CAT = {
  'doručak':'d','dorucak':'d','breakfast':'d',
  'ručak':'r','rucak':'r','lunch':'r',
  'večera':'v','vecera':'v','dinner':'v',
};
function migrateMealCats(meal){
  if(meal.cats && meal.cats.length) return meal; // već ima cats
  // Deriviraj cats iz tags
  const derivedCats = [];
  (meal.tags||[]).forEach(tag => {
    const key = _TAG_TO_CAT[tag.toLowerCase().trim()];
    if(key && !derivedCats.includes(key)) derivedCats.push(key);
  });
  if(derivedCats.length) meal.cats = derivedCats;
  return meal;
}

// ── Filtriraj jela po slotu ───────────────────────────────────
function getMealsForSlot(slotKey, filterCat){
  // Migriramo sve on-the-fly
  S.meals.forEach(migrateMealCats);

  let meals;
  if(slotKey === 'd') meals = S.meals.filter(m => (m.cats||[]).includes('d'));
  else if(slotKey === 'r') meals = S.meals.filter(m => (m.cats||[]).includes('r'));
  else if(slotKey === 'v') meals = S.meals.filter(m => (m.cats||[]).includes('v'));
  else if(slotKey === 'u') meals = S.meals.filter(m => (m.cats||[]).includes('u'));
  else meals = S.meals.filter(m =>
    (m.extras||[]).includes(slotKey) ||
    (m.cats||[]).includes(slotKey) ||
    (m.tags||[]).some(t => t.toLowerCase().replace(/\s+/g,'_') === slotKey)
  );

  // Primjeni filter kategorije ako je aktivan
  if(filterCat && filterCat !== 'all'){
    meals = meals.filter(m =>
      (m.extras||[]).some(e => e.toLowerCase() === filterCat.toLowerCase()) ||
      (m.tags||[]).some(t => t.toLowerCase() === filterCat.toLowerCase()) ||
      (m.mealFlags||[]).some(f => f.toLowerCase() === filterCat.toLowerCase())
    );
  }
  return meals;
}

// ── Generiši filter chipove iz korisničkih kategorija ─────────
function getPlanFilterCats(){
  const cats = new Set();
  const skip = new Set(['Doručak','Ručak','Večera','Užina','Ostalo','Omiljeno','Gosti','Brzo','Zdravo','Jeftino','Smrznuto','Breakfast','Lunch','Dinner','Snack']);
  S.meals.forEach(m => {
    (m.extras||[]).forEach(e => { if(e && !skip.has(e)) cats.add(e); });
    (m.tags||[]).forEach(t => { if(t && !skip.has(t)) cats.add(t); });
  });
  return [...cats].slice(0, 8);
}

// ── Render cijelog Obroci tab-a ───────────────────────────────
function renderObroci(){
  const wrap = document.getElementById('plan-acc-list');
  if(!wrap) return;

  // Filter chipovi
  const filterCats = getPlanFilterCats();
  let filterHtml = '';
  if(filterCats.length > 0){
    const chips = ['all', ...filterCats].map(cat => {
      const isOn = _planActiveFilter === cat;
      const lbl = cat === 'all' ? 'Sve' : cat;
      return `<span class="plan-filter-chip${isOn?' on':''}" onclick="planSetFilter('${esc(cat)}')">${esc(lbl)}</span>`;
    }).join('');
    filterHtml = `<div class="plan-filter-row">${chips}</div>`;
  }

  // Užina samo ako postoji
  const hasUzina = S.meals.some(m => (m.cats||[]).includes('u'));
  const baseSlots = [
    { key:'d', label:'Doručak' },
    { key:'r', label:'Ručak' },
    { key:'v', label:'Večera' },
  ];
  if(hasUzina) baseSlots.push({ key:'u', label:'Užina' });
  const allSlots = [...baseSlots, ..._planCustomCats];

  wrap.innerHTML = filterHtml + allSlots.map(({key, label}) => {
    const meals = getMealsForSlot(key, _planActiveFilter);
    const isOpen = _planOpenSlot === key;
    const countHi = _planActiveFilter !== 'all' && meals.length > 0;
    return `
      <div class="plan-acc" id="plan-acc-${key}">
        <div class="plan-acc-hdr ${isOpen?'open':''}" onclick="planToggleAcc('${key}')">
          <span class="plan-acc-title">${esc(label)}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="plan-acc-count${countHi?' hi':''}">${meals.length}</span>
            <span class="plan-acc-arrow">▾</span>
          </div>
        </div>
        <div class="plan-acc-body ${isOpen?'open':''}" id="plan-body-${key}">
          <div class="plan-search-wrap">
            <input class="plan-search-inp" id="plan-srch-${key}"
              placeholder="Pretraži…"
              oninput="planFilterMeals('${key}', this.value)"

          </div>
          <div id="plan-meals-${key}">
            ${renderPlanMeals(key, meals, '')}

        </div>
      </div>`;
  }).join('');
}

function renderPlanMeals(slotKey, meals, query){
  const dates = getWD(S.weekOffset);
  const filtered = query
    ? meals.filter(m => m.name.toLowerCase().includes(query.toLowerCase()))
    : meals;

  if(!filtered.length){
    if(!query && getMealsForSlot(slotKey).length === 0){
      return `<div class="plan-empty">Nema jela označenih za ovu kategoriju.<br>
        <span style="font-size:10px;">Dodaj jelo i označi ga kao "${slotKey==='d'?'Doručak':slotKey==='r'?'Ručak':'Večera'}".</span></div>`;
    }
    return `<div class="plan-empty">Nema rezultata za "${esc(query)}"</div>`;
  }

  return filtered.map(m => {
    const isExpanded = _planOpenMeal === m.id + '_' + slotKey;
    const dayBtns = dates.map((d,i) => {
      const e = getEntry(dk(d), slotKey);
      const assigned = e && e.mealId === m.id;
      return `<button class="plan-day-btn ${assigned?'assigned':''}"
        data-day-index="${i}"
        onclick="planDayTap('${m.id}','${slotKey}',${i},event)">
        ${DAYS[i]}
      </button>`;
    }).join('');

    return `
      <div class="plan-meal-row" id="pmr-${m.id}-${slotKey}">
        <div class="plan-meal-name">${esc(m.name)}</div>
        <button class="plan-btn" onclick="planToggleMeal('${m.id}','${slotKey}',event)">
          Plan ›
        </button>
      </div>
      <div id="pds-${m.id}-${slotKey}" style="display:${isExpanded?'block':'none'}">
        <div class="plan-day-strip">${dayBtns}</div>
      </div>`;
  }).join('');
}

function planFilterMeals(slotKey, query){

window.__AM_DEV__ = true;

const amWait = function(ms){ return new Promise(function(r){setTimeout(r,ms);}); };
var _amResults = [];

function amTest(title, fn) { return {title:title, fn:fn}; }

async function amRunTests(tests, suite) {
  var out = [];
  for (var i=0; i<tests.length; i++) {
    var t = tests[i];
    var pass=false, skip=false, err=null;
    try {
      var r = await Promise.resolve(t.fn());
      if (r === 'skip') skip = true;
      else pass = !!r;
    } catch(e) { err = e.message; }
    out.push({suite:suite, title:t.title, pass:pass, skip:skip, err:err});
  }
  return out;
}

function amRenderReport(results) {
  var el = document.getElementById('am-test-results');
  if (!el) return;
  var html = '', lastSuite = null;
  for (var i=0; i<results.length; i++) {
    var r = results[i];
    if (r.suite !== lastSuite) {
      lastSuite = r.suite;
      html += '<div class="am-suite-hdr">'+r.suite+'</div>';
    }
    var ico = r.skip ? '&#9197;' : r.pass ? '&#9989;' : '&#10060;';
    var skipCls = r.skip ? ' am-tr-skip' : '';
    html += '<div class="am-tr"><span class="am-tr-ico">'+ico+'</span><div>';
    html += '<div class="am-tr-lbl'+skipCls+'">'+r.title+'</div>';
    if (r.err) html += '<div class="am-tr-err">'+r.err+'</div>';
    html += '</div></div>';
  }
  el.innerHTML = html;
  document.getElementById('am-test-overlay').style.display = 'flex';
}

window.amDownloadReport = function() {
  var blob = new Blob([JSON.stringify(_amResults, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'amigella-test-' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
};

function _ni(){return document.getElementById('am-name-input')||document.getElementById('am-name');}
function _lb(){return document.getElementById('am-ac-list')||document.getElementById('ac-dish-dd');}

async function _openModal(){
  var ov=document.getElementById('modal');
  if(!ov||ov.style.display==='none'){
    var b=document.querySelector('[data-test="btn-add-meal"]')||document.querySelector('.add-cta');
    if(b)b.click(); else if(typeof openAddMeal==='function')openAddMeal();
    await _W(350);
  }
}

// ── Suite 1: Struktura ─────────────────────────────────────────
async function _suiteStrukt(){
  var S='Struktura modala'; var out=[];
  await _openModal();
  out.push(await _t('Modal otvoren',async function(){return !!_ni();},S));
  out.push(await _t('Naziv input postoji (id=am-name-input)',function(){return !!document.getElementById('am-name-input')||!!document.getElementById('am-name');},S));
  out.push(await _t('Listbox postoji (id=am-ac-list)',function(){var l=_lb();return !!l;},S));
  out.push(await _t('role=combobox na inputu',function(){var n=_ni();return !!n&&(n.getAttribute('role')==='combobox'||n.getAttribute('aria-autocomplete')==='list');},S));
  out.push(await _t('aria-controls="am-ac-list"',function(){var n=_ni();return !!n&&(n.getAttribute('aria-controls')==='am-ac-list'||n.getAttribute('aria-controls')==='ac-dish-dd');},S));
  out.push(await _t('Kategorije čipovi (D/R/V + fav + guests)',async function(){
    var chips=document.querySelectorAll('#am-cats li.chip,#am-cats button.chip');
    return chips.length>=5;
  },S));
  out.push(await _t('data-test="meal-chip-fav" postoji',function(){return !!document.querySelector('[data-test="meal-chip-fav"]');},S));
  out.push(await _t('data-test="meal-chip-guests" postoji',function(){return !!document.querySelector('[data-test="meal-chip-guests"]');},S));
  out.push(await _t('Dugme Sačuvaj postoji',function(){return !!(document.getElementById('am-save-btn')||document.querySelector('[data-test="save"]'));},S));
  out.push(await _t('data-test="ingr-add" postoji',function(){return !!document.querySelector('[data-test="ingr-add"]');},S));
  out.push(await _t('Porcije x2 postoji',function(){return !!(document.querySelector('[data-scale="2"]')||document.querySelector('[data-test="servings-x2"]'));},S));
  return out;
}

// ── Suite 2: UX (1–6) ──────────────────────────────────────────
async function _suiteUX(){
  var S='UX provjere (1–6)'; var out=[];
  await _openModal();

  // (1) Toggle kategorije
  out.push(await _t('(1) Toggle D/R/V: selektuj i deselektuj',async function(){
    var chips=document.querySelectorAll('#am-cats li.chip,#am-cats button.chip');
    var dvChips=[...chips].filter(function(c){var k=c.getAttribute('data-key');return k==='d'||k==='r'||k==='v';});
    if(!dvChips.length)return 'skip';
    var c=dvChips[0];
    if(!c.classList.contains('sel')){c.click();await _W(100);}
    if(!c.classList.contains('sel'))throw new Error('Chip se nije selektovao');
    // Dodaj drugi da bi deselekt bio dozvoljen
    var c2=dvChips[1]||dvChips[0];
    if(c2!==c&&!c2.classList.contains('sel')){c2.click();await _W(100);}
    c.click();await _W(120);
    return !c.classList.contains('sel');
  },S));

  out.push(await _t('(1) Min 1 D/R/V: blokira poslednji',async function(){
    if(typeof AM==='undefined')return 'skip';
    var prev=[...AM.cats];
    AM.cats=['d'];
    if(typeof renderCatsObroka==='function')renderCatsObroka();
    await _W(60);
    var chip=document.querySelector('[data-key="d"]');
    if(!chip)return 'skip';
    chip.click();await _W(120);
    var blocked=AM.cats.includes('d');
    AM.cats=prev.length?prev:['d'];
    if(typeof renderCatsObroka==='function')renderCatsObroka();
    return blocked;
  },S));

  out.push(await _t('(1) Omiljeno toggle radi',async function(){
    var chip=document.querySelector('[data-test="meal-chip-fav"]');
    if(!chip)return 'skip';
    var wasSel=chip.classList.contains('sel');
    chip.click();await _W(100);
    var isSel=chip.classList.contains('sel');
    chip.click();await _W(100); // vrati
    return isSel!==wasSel;
  },S));

  out.push(await _t('(1) Gosti toggle radi',async function(){
    var chip=document.querySelector('[data-test="meal-chip-guests"]');
    if(!chip)return 'skip';
    var was=chip.classList.contains('sel');
    chip.click();await _W(100);
    var now=chip.classList.contains('sel');
    chip.click();await _W(100);
    return now!==was;
  },S));

  // (2) Placeholder
  out.push(await _t('(2) Placeholder = "Unesi naziv jela…"',function(){
    var n=_ni();if(!n)return 'skip';
    return (n.placeholder||'').toLowerCase().includes('unesi')||(n.placeholder||'').toLowerCase().includes('naziv');
  },S));

  // (3) AI
  out.push(await _t('(3) AI kartica pri unosu',async function(){
    var n=_ni();if(!n)return 'skip';
    if(typeof AM!=='undefined'){AM.aiAccepted=false;AM.aiDismissed=false;AM.aiResult=null;}
    n.value='musaka';n.dispatchEvent(new Event('input',{bubbles:true}));
    await _W(800);
    var box=document.getElementById('am-ai-suggestion-box')||document.querySelector('.am-ai-box,#am-ai-wrap');
    n.dispatchEvent(new KeyboardEvent('keydown',{key:'Escape',bubbles:true}));
    return !!(box&&box.innerHTML.trim().length>20);
  },S));

  // (4) Porcije
  out.push(await _t('(4) Porcije: servingsBase postoji',async function(){
    // Skaliranje je premješteno na dashboard — provjeravamo samo da formState ima base
    if(typeof formState==='undefined')return 'skip';
    return typeof formState.servingsBase==='number'&&formState.servingsBase>0;
  },S));

  // (5) Dodaj sastojak
  out.push(await _t('(5) Dodaj sastojak → red',async function(){
    var nf=document.getElementById('am-new-n')||document.querySelector('[data-test="ingr-name"]');
    var add=document.getElementById('am-add-ing-btn')||document.querySelector('[data-test="ingr-add"]');
    if(!nf||!add)return 'skip';
    var before=document.querySelectorAll('.ing-row,[data-test="ingr-row"]').length;
    nf.value='brasno';nf.dispatchEvent(new Event('input',{bubbles:true}));
    add.click();await _W(160);
    return document.querySelectorAll('.ing-row,[data-test="ingr-row"]').length>before;
  },S));

  // (6) Save
  out.push(await _t('(6) Sačuvaj (validacija bez naziva)',async function(){
    var n=_ni();if(!n)return 'skip';
    n.value='';n.dispatchEvent(new Event('input',{bubbles:true}));
    if(typeof AM!=='undefined')AM.name='';
    var save=document.getElementById('am-save-btn')||document.querySelector('[data-test="save"]');
    if(!save)return 'skip';
    save.click();await _W(120);
    return n.classList.contains('error')||
      !!(document.querySelector('.am-error-msg.visible'))||
      n.value===''&&document.querySelector('#am-cat-err')!==null;
  },S));

  return out;
}

// ── Suite 3: Kategorije & Predikt (STRESS) ─────────────────────
async function _suiteStress(){
  var S='Kategorije & Predikt (stress)'; var out=[];
  await _openModal();

  // === A) Predikt ===
  var acCases=[
    {q:'kromp',exp:'krompir'},
    {q:'krompir pi',exp:'pire'},
    {q:'pire kormpir',exp:'pire'},
    {q:'pur\u00e8 di pat',exp:'patate'},
    {q:'kartoffelp\u00fc',exp:'kartoffel'},
    {q:'pur\u00e9e de pom',exp:'pommes'},
    {q:'\u043f\u044e\u0440\u0435 \u0438\u0437 \u043a\u0430\u0440\u0442',exp:'\u043f\u044e\u0440\u0435'},
    {q:'pur\u00e9 de pat',exp:'pat'},
  ];

  for(var ai=0;ai<acCases.length;ai++){
    (function(c){
      out.push(_t('Predikt "'+c.q+'" daje ≥1 rezultat',async function(){
        await _openModal();
        var n=_ni();if(!n)return 'skip';
        if(typeof AM!=='undefined'){AM.aiAccepted=false;AM.aiDismissed=false;}
        n.value=c.q;n.dispatchEvent(new Event('input',{bubbles:true}));
        await _W(500);
        var lb=_lb();
        var items=lb?lb.querySelectorAll('[role="option"]'):[];
        n.dispatchEvent(new KeyboardEvent('keydown',{key:'Escape',bubbles:true}));
        await _W(60);
        return items.length>0;
      },S));
    })(acCases[ai]);
  }

  // Resolve all predikt promises
  var pending=out.filter(function(x){return x&&typeof x.then==='function';});
  out=await Promise.all(out);

  // Enter odabira prvu opciju
  out.push(await _t('Predikt Enter odabira prvu opciju',async function(){
    await _openModal();
    var n=_ni();if(!n)return 'skip';
    n.value='pire';n.dispatchEvent(new Event('input',{bubbles:true}));
    await _W(450);
    var lb=_lb();
    if(!lb||!lb.querySelectorAll('[role="option"]').length)return 'skip';
    n.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true,cancelable:true}));
    await _W(120);
    var lb2=_lb();
    return !lb2||lb2.hidden||lb2.style.display==='none'||!lb2.querySelector('[role="option"]');
  },S));

  // Esc zatvara
  out.push(await _t('Predikt Esc zatvara listbox',async function(){
    await _openModal();
    var n=_ni();if(!n)return 'skip';
    n.value='pasta';n.dispatchEvent(new Event('input',{bubbles:true}));
    await _W(400);
    n.dispatchEvent(new KeyboardEvent('keydown',{key:'Escape',bubbles:true}));
    await _W(100);
    var lb=_lb();
    return !lb||lb.hidden||lb.style.display==='none'||!lb.querySelector('[role="option"]');
  },S));

  // Blur zatvara
  out.push(await _t('Predikt blur zatvara listbox',async function(){
    await _openModal();
    var n=_ni();if(!n)return 'skip';
    n.value='gulas';n.dispatchEvent(new Event('input',{bubbles:true}));
    await _W(400);
    n.blur();await _W(300);
    var lb=_lb();
    return !lb||lb.hidden||lb.style.display==='none'||!lb.querySelector('[role="option"]');
  },S));

  // === B) Kategorije stress ===
  out.push(await _t('Kategorije: 100 nasumičnih togla — invarianta ≥1 D/R/V',async function(){
    await _openModal();
    if(typeof AM==='undefined'||typeof renderCatsObroka==='undefined')return 'skip';
    AM.cats=['d','r','v'];AM.flags={fav:false,guests:false};renderCatsObroka();await _W(60);
    var keys=['d','r','v','fav','guests'];
    for(var i=0;i<100;i++){
      var k=keys[Math.floor(Math.random()*keys.length)];
      var chip=document.querySelector('[data-key="'+k+'"]')||document.querySelector('[data-flag="'+k.replace('flag_','')+'"]');
      if(chip){chip.click();await _W(8);}
      // Invarianta
      var core=AM.cats.filter(function(x){return x==='d'||x==='r'||x==='v';});
      if(!core.length)return false; // Pukla invarianta
    }
    return AM.cats.filter(function(x){return x==='d'||x==='r'||x==='v';}).length>=1;
  },S));

  out.push(await _t('X ne prikazuje se na neselektovanom čipu',async function(){
    await _openModal();
    if(typeof AM==='undefined')return 'skip';
    // Uzmi neselektovan chip
    var unsel=document.querySelector('#am-cats li.chip:not(.sel),#am-cats button.chip:not(.sel)');
    if(!unsel)return 'skip';
    var xBtn=unsel.querySelector('.chip__remove');
    return !xBtn;
  },S));

  out.push(await _t('aria-selected tačan nakon togla',async function(){
    await _openModal();
    if(typeof AM==='undefined')return 'skip';
    AM.cats=['d'];if(typeof renderCatsObroka==='function')renderCatsObroka();await _W(60);
    var d=document.querySelector('[data-key="d"]');
    if(!d)return 'skip';
    var arD=d.getAttribute('aria-selected');
    var r=document.querySelector('[data-key="r"]');
    var arR=r?r.getAttribute('aria-selected'):'false';
    return arD==='true'&&arR==='false';
  },S));

  // === C) Dodatne kategorije CRUD ===
  out.push(await _t('CRUD: Dodaj 3 nove kategorije',async function(){
    await _openModal();
    if(typeof AM==='undefined')return 'skip';
    AM.extras=[]; if(typeof renderExtras==='function')renderExtras(); await _W(60);
    var inp=document.getElementById('new-cat-inp');
    if(!inp){
      // Otvori input
      var nb=document.getElementById('chip-newcat')||document.querySelector('.add-cat-btn');
      if(nb){nb.click();await _W(100);}
      inp=document.getElementById('new-cat-inp');
    }
    if(!inp)return 'skip';
    var newCats=['Sezonsko','Nedeljni specijal','Bez laktoze'];
    for(var i=0;i<newCats.length;i++){
      var nci=document.getElementById('new-cat-inp');
      if(!nci||nci.style.display==='none'){
        var nb2=document.getElementById('chip-newcat')||document.querySelector('#am-extras .chip:not(.sel)');
        if(nb2){nb2.click();await _W(100);}
        nci=document.getElementById('new-cat-inp');
      }
      if(!nci)return 'skip';
      nci.value=newCats[i];nci.dispatchEvent(new Event('input',{bubbles:true}));
      nci.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true,cancelable:true}));
      await _W(120);
    }
    return AM.extras.includes('Sezonsko')&&AM.extras.includes('Nedeljni specijal')&&AM.extras.includes('Bez laktoze');
  },S));

  out.push(await _t('CRUD: Deduplicate (ne dodaje duplikat)',async function(){
    await _openModal();
    if(typeof AM==='undefined')return 'skip';
    var before=AM.extras.length;
    // Pokušaj dodati 'Sezonsko' ponovo
    var nci=document.getElementById('new-cat-inp');
    if(!nci||nci.style.display==='none'){
      var nb=document.getElementById('chip-newcat');
      if(nb){nb.click();await _W(100);}
      nci=document.getElementById('new-cat-inp');
    }
    if(!nci)return 'skip';
    nci.value='Sezonsko';nci.dispatchEvent(new Event('input',{bubbles:true}));
    nci.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true,cancelable:true}));
    await _W(120);
    return AM.extras.length===before; // Nije dodato
  },S));

  out.push(await _t('CRUD: Rename "Sezonsko" → "Sezonski meni"',async function(){
    await _openModal();
    if(typeof AM==='undefined'||!AM.extras.includes('Sezonsko'))return 'skip';
    // Selektuj pa klikni
    var chip=null;
    var all=document.querySelectorAll('#am-extras li.chip,#am-extras button.chip');
    all.forEach(function(c){if(c.getAttribute('data-key')==='Sezonsko'||(c.querySelector('.chip__label')&&c.querySelector('.chip__label').textContent==='Sezonsko'))chip=c;});
    if(!chip)return 'skip';
    if(!chip.classList.contains('sel')){chip.click();await _W(100);}
    chip.click();await _W(120); // Rename mode
    var ri=document.getElementById('new-cat-inp')||document.querySelector('[data-test="cat-rename-input"]')||document.querySelector('#am-extras input');
    if(!ri)return 'skip';
    ri.value='Sezonski meni';
    ri.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true,cancelable:true}));
    await _W(150);
    return AM.extras.includes('Sezonski meni')&&!AM.extras.includes('Sezonsko');
  },S));

  out.push(await _t('CRUD: Brisanje čipa (X)',async function(){
    await _openModal();
    if(typeof AM==='undefined')return 'skip';
    if(!AM.extras.includes('Bez laktoze'))return 'skip';
    var chip=null;
    var all=document.querySelectorAll('#am-extras li.chip,#am-extras button.chip');
    all.forEach(function(c){
      var lb=c.querySelector('.chip__label');
      if(lb&&lb.textContent==='Bez laktoze')chip=c;
    });
    if(!chip)return 'skip';
    if(!chip.classList.contains('sel')){chip.click();await _W(100);}
    var x=chip.querySelector('.chip__remove');
    if(!x)return 'skip';
    x.click();await _W(200);
    return !AM.extras.includes('Bez laktoze');
  },S));

  return out;
}

window.uxAll = async function(){

  _UXR=[];

  var b=await _suiteUX();
  var c=await _suiteStress();

window.uxRun = async function(which){
  if(which==='struktura'){uxSpin('Struktura…');_UXR=await _suiteStrukt();}

  else if(which==='stress'){uxSpin('Stress test…');_UXR=await _suiteStress();}
  uxRender(_UXR);
};

// ── UX SMOKE TEST PANEL ─────────────────────────────────────────
const _uxW=ms=>new Promise(r=>setTimeout(r,ms));
let _uxResults=[];

function uxOpen() {document.getElementById('ux-smoke-overlay').style.display='flex';}
function uxClose(){document.getElementById('ux-smoke-overlay').style.display='none';}

function uxShowRunning(msg){
  document.getElementById('ux-smoke-results').innerHTML='<div class="ux-running"><div class="ux-ring"></div>'+msg+'</div>';
  document.getElementById('ux-summary').style.display='none';
}
function uxRender(results){
  const el=document.getElementById('ux-smoke-results');
  let html='',lastS=null;
  for(const r of results){
    if(r.suite!==lastS){lastS=r.suite;html+='<div class="ux-suite-hdr">'+r.suite+'</div>';}
    const ico=r.skip?'&#9197;':r.pass?'&#9989;':'&#10060;';
    const sc=r.skip?' ux-skip':'';
    html+='<div class="ux-tr"><span class="ux-ico">'+ico+'</span><div>';
    html+='<div class="ux-lbl'+sc+'">'+r.title+'</div>';
    if(r.err)html+='<div class="ux-err">'+r.err+'</div>';
    html+='</div></div>';
  }
  el.innerHTML=html||'<p style="color:#A99BC5;font-size:11px;padding:16px 0;text-align:center">Nema rezultata.</p>';
  el.scrollTop=0;
  const pass=results.filter(r=>r.pass||r.skip).length;
  const fail=results.filter(r=>!r.pass&&!r.skip).length;
  document.getElementById('ux-score-2').innerHTML='<em>'+(results.length-fail)+'/'+results.length+'</em> testova pro\u0161lo';
  document.getElementById('ux-summary').style.display='flex';
}
function uxDownload(){
  const blob=new Blob([JSON.stringify(_uxResults,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='amigella-ux-'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.json';
  a.click();URL.revokeObjectURL(a.href);
}

async function uxT(title,fn,suite){
  let pass=false,skip=false,err=null;
  try{const r=await Promise.resolve(fn());if(r==='skip')skip=true;else pass=!!r;}
  catch(e){err=e.message;}
  return{suite,title,pass,skip,err};
}

async function uxEnsure(){
  if(!document.getElementById('am-overlay')?.classList.contains('visible')){
    // openAddMeal() je pravi adapter za AmigellaModal.open()
    // openModal(html) je stari jelovnik modal za detail prikaz - NE koristiti!
    if(typeof openAddMeal==='function') openAddMeal();
    else if(typeof AmigellaModal!=='undefined') AmigellaModal.open();
    await _uxW(420); // Čekaj mount() + renderAll() + chip render
  }
}
const uxNI=()=>document.getElementById('am-name-input');
const uxLB=()=>document.getElementById('am-ac-list')||document.getElementById('ac-dish-dd');

// ── Suite A: Struktura ─────────────────────────────────────────
async function uxSuiteModal(){
  const s='Struktura modala',out=[];
  await uxEnsure();
  out.push(await uxT('Modal se otvara',()=>!!document.getElementById('am-overlay')?.classList.contains('visible'),s));
  out.push(await uxT('Polje Naziv jela (id=am-name-input)',()=>!!uxNI(),s));
  out.push(await uxT('Placeholder postoji (nije prazan)',()=>{const n=uxNI();return n&&(n.placeholder||'').length>3;},s));
  out.push(await uxT('Listbox id=am-ac-list postoji',()=>!!uxLB(),s));
  out.push(await uxT('role=combobox na inputu',()=>uxNI()?.getAttribute('role')==='combobox',s));
  out.push(await uxT('aria-controls=am-ac-list',()=>uxNI()?.getAttribute('aria-controls')==='am-ac-list',s));
  out.push(await uxT('\u22655 meal type chipova (D/R/V + Omiljeno + Gosti)',()=>document.querySelectorAll('#am-meal-types-chips li.chip').length>=5,s));
  out.push(await uxT('data-test=meal-chip-fav postoji',()=>!!document.querySelector('[data-test="meal-chip-fav"]'),s));
  out.push(await uxT('data-test=meal-chip-guests postoji',()=>!!document.querySelector('[data-test="meal-chip-guests"]'),s));
  out.push(await uxT('Dugme Sačuvaj postoji (data-test=save)',()=>!!document.querySelector('[data-test="save"]'),s));
  return out;
}

// ── Suite B: UX 1–6 ───────────────────────────────────────────
async function uxSuiteUX(){
  const s='UX provjere (1–6)', out=[];
  const w=ms=>new Promise(r=>setTimeout(r,ms));
  const fs=()=>window._amI?.formState;
  const ni=()=>document.getElementById('am-name-input');
  const ensure=async()=>{
    if(!document.getElementById('am-overlay')?.classList.contains('visible')){
      if(typeof openAddMeal==='function')openAddMeal();
      else if(window.AmigellaModal)AmigellaModal.open();
      await w(400);
    }
    if(typeof switchTab==='function'){switchTab(1);await w(100);}
  };

  // (1) Kategorije — D/R/V + flags
  out.push(await uxT('(1) Doručak chip se može selektovati', async()=>{
    await ensure();
    const c=document.querySelector('[data-test="meal-chip-breakfast"]');
    if(!c)return 'skip';
    const before=c.classList.contains('sel');
    c.click(); await w(80);
    return c.classList.contains('sel')!==before || c.classList.contains('sel');
  },s));

  out.push(await uxT('(1) Omiljeno chip postoji i klikabilan', async()=>{
    await ensure();

    {q:'puré de pat',key:'pire_krompir'},
    {q:'pasta car',key:'pasta_carbonara'},
    {q:'sarma',key:'sarma'},
  ];

  for(const{q,key} of queries){
    out.push(await uxT('Predikt "'+q+'" \u2192 \u22651 opcija',async()=>{

      if(typeof formState!=='undefined'){formState.aiAccepted=false;formState.aiDismissed=false;}
      n.value=q;n.dispatchEvent(new Event('input',{bubbles:true}));await _uxW(450);

      n.dispatchEvent(new KeyboardEvent('keydown',{key:'Escape',bubbles:true}));await _uxW(60);

      return items.length>0;

  // Enter potvrđuje izbor
  out.push(await uxT('Predikt: Enter bira prvu opciju',async()=>{
    await uxEnsure();const n=uxNI();if(!n)return'skip';
    n.value='pasta car';n.dispatchEvent(new Event('input',{bubbles:true}));await _uxW(450);
    const lb=uxLB();if(!lb||lb.hidden)return'skip';
    n.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true}));await _uxW(120);
    return lb.hidden&&n.value.toLowerCase().includes('pasta');
  },s));

  // Esc zatvara
  out.push(await uxT('Predikt: Esc zatvara listbox',async()=>{
    await uxEnsure();const n=uxNI();if(!n)return'skip';
    n.value='pire';n.dispatchEvent(new Event('input',{bubbles:true}));await _uxW(450);
    n.dispatchEvent(new KeyboardEvent('keydown',{key:'Escape',bubbles:true}));await _uxW(80);
    return uxLB()?.hidden!==false;
  },s));

  // Blur zatvara
  out.push(await uxT('Predikt: blur zatvara listbox',async()=>{
    await uxEnsure();const n=uxNI();if(!n)return'skip';
    n.value='gula';n.dispatchEvent(new Event('input',{bubbles:true}));await _uxW(450);
    n.dispatchEvent(new Event('blur',{bubbles:true}));await _uxW(200);
    return uxLB()?.hidden!==false;
  },s));

  // ↑↓ navigacija
  out.push(await uxT('Predikt: \u2191\u2193 menja aria-selected',async()=>{
    await uxEnsure();const n=uxNI();if(!n)return'skip';
    n.value='pire';n.dispatchEvent(new Event('input',{bubbles:true}));await _uxW(450);
    const lb=uxLB();if(!lb||lb.hidden)return'skip';
    n.dispatchEvent(new KeyboardEvent('keydown',{key:'ArrowDown',bubbles:true}));await _uxW(60);
    const sel=lb.querySelectorAll('[aria-selected="true"]');
    n.dispatchEvent(new KeyboardEvent('keydown',{key:'Escape',bubbles:true}));
    return sel.length===1;
  },s));

  // B) Kategorije stress: 100 nasumičnih toggle-a
  out.push(await uxT('Kategorije stress: 100 toggle-a, invarianta D/R/V \u22651',async()=>{
    await uxEnsure();
    const coreKeys=['d','r','v'];const allKeys=['d','r','v','fav','guests'];
    let violations=0;
    for(let i=0;i<100;i++){
      const key=allKeys[Math.floor(Math.random()*allKeys.length)];
      const isCore=coreKeys.includes(key);
      const chip=document.querySelector('[data-test="meal-chip-'+({d:'breakfast',r:'lunch',v:'dinner',fav:'fav',guests:'guests'}[key])+'"]');
      if(!chip)continue;
      if(chip.classList.contains('sel')){
        // Try deselect via X
        const x=chip.querySelector('.chip__remove');
        if(x)x.click();
        else chip.click();
      }else{chip.click();}
      await _uxW(20);
      // Check invariant
      const coreSel=[...document.querySelectorAll('#am-meal-types-chips li.chip[data-core="1"].sel')];
      if(coreSel.length===0){violations++;
        // Force re-select first core chip
        const fc=document.querySelector('#am-meal-types-chips li.chip[data-core="1"]');
        if(fc&&!fc.classList.contains('sel'))fc.click();
        await _uxW(20);}
    }
    if(violations>0)throw new Error(violations+' narušavanja invariante D/R/V\u22651');
    return violations===0;
  },s));

  // X se prikazuje samo na selektovanom
  out.push(await uxT('X dugme samo na selektovanom čipu',async()=>{
    await uxEnsure();
    const chips=[...document.querySelectorAll('#am-meal-types-chips li.chip')];
    for(const c of chips){
      const isSel=c.classList.contains('sel');
      const hasX=!!c.querySelector('.chip__remove');
      if(isSel&&!hasX)throw new Error('Sel chip bez X: '+c.getAttribute('data-key'));
      if(!isSel&&hasX)throw new Error('Non-sel chip ima X: '+c.getAttribute('data-key'));
    }
    return true;
  },s));

  // aria-selected konzistentan
  out.push(await uxT('aria-selected konzistentan sa .sel klasom',async()=>{
    await uxEnsure();
    const chips=[...document.querySelectorAll('#am-meal-types-chips li.chip')];
    for(const c of chips){
      const isSel=c.classList.contains('sel');
      const ariaS=c.getAttribute('aria-selected');
      if(isSel&&ariaS!=='true')throw new Error('sel ali aria-selected!=true: '+c.getAttribute('data-key'));
      if(!isSel&&ariaS!=='false')throw new Error('not sel ali aria-selected!=false: '+c.getAttribute('data-key'));
    }
    return true;
  },s));

  // C) CRUD dodatnih kategorija
  out.push(await uxT('CRUD: dodaj 3 kategorije',async()=>{
    await uxEnsure();
    for(const name of['Sezonsko','Nedeljni specijal','Bez laktoze']){
      // Close if open
      document.getElementById('am-new-cat-row').style.display='none';
      const addBtn=document.querySelector('#am-extra-chips .chip-add-new');if(addBtn)addBtn.click();
      await _uxW(80);
      const inp=document.getElementById('am-new-cat-input');if(!inp)throw new Error('New cat input nema');
      inp.value=name;inp.dispatchEvent(new Event('input',{bubbles:true}));
      document.getElementById('am-new-cat-confirm').click();await _uxW(80);
    }
    const catChips=document.querySelectorAll('#am-extra-chips li.chip[data-custom="1"]');
    if(catChips.length<3)throw new Error('Samo '+catChips.length+'/3 custom kategorija');
    return catChips.length>=3;
  },s));

  out.push(await uxT('CRUD: rename "Sezonsko" \u2192 "Sezonski meni"',async()=>{
    await uxEnsure();
    // Find Sezonsko chip
    const chips=[...document.querySelectorAll('#am-extra-chips li.chip[data-custom="1"]')];
    let target=null;
    for(const c of chips){if((c.getAttribute('data-label')||'').toLowerCase().includes('sezonsko')){target=c;break;}}
    if(!target){
      // Try finding by label text
      for(const c of chips){const lbl=c.querySelector('.chip__label');if(lbl&&lbl.textContent.toLowerCase().includes('sezonsko')){target=c;break;}}
    }
    if(!target)return'skip';// might be renamed or missing
    // Select chip first if not selected
    if(!target.classList.contains('sel')){target.click();await _uxW(80);}
    // Click to trigger rename
    target.click();await _uxW(120);
    const renameInp=target.querySelector('[data-test="cat-rename-input"]')||document.querySelector('[data-test="cat-rename-input"]');
    if(!renameInp)return'skip';
    renameInp.value='Sezonski meni';
    renameInp.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true}));await _uxW(200);
    // Check renamed
    const newChips=[...document.querySelectorAll('#am-extra-chips li.chip[data-custom="1"]')];
    const renamed=newChips.some(c=>(c.getAttribute('data-label')||'').toLowerCase().includes('sezonski meni'));
    if(!renamed)throw new Error('Rename nije uspeo');
    return renamed;
  },s));

  out.push(await uxT('CRUD: deduplicate (ne dozvoli duplikat)',async()=>{
    await uxEnsure();
    document.getElementById('am-new-cat-row').style.display='none';
    const addBtn=document.querySelector('#am-extra-chips .chip-add-new');if(addBtn)addBtn.click();
    await _uxW(60);
    const inp=document.getElementById('am-new-cat-input');if(!inp)return'skip';
    inp.value='Bez laktoze';// already added
    document.getElementById('am-new-cat-confirm').click();await _uxW(80);
    const cats=[...document.querySelectorAll('#am-extra-chips li.chip[data-custom="1"]')];
    const dupCount=cats.filter(c=>(c.getAttribute('data-label')||'').toLowerCase().includes('bez laktoze')).length;
    document.getElementById('am-new-cat-row').style.display='none';
    if(dupCount>1)throw new Error('Duplikat dodan: '+dupCount+'x');
    return dupCount<=1;
  },s));

  out.push(await uxT('CRUD: brisanje X \u2192 chip nestaje',async()=>{
    await uxEnsure();
    const chips=[...document.querySelectorAll('#am-extra-chips li.chip[data-custom="1"]')];

    const keyBefore=target.getAttribute('data-key');x.click();await _uxW(200);
    const stillThere=document.querySelector('#am-extra-chips li.chip[data-key="'+keyBefore+'"]');
    if(stillThere)throw new Error('Chip se nije uklonio');
    return!stillThere;
  },s));

  return out;
}

  const ensure = async () => {
    if (!document.getElementById('am-overlay')?.classList.contains('visible')) {
      if (typeof openAddMeal === 'function') openAddMeal();
      else if (window.AmigellaModal) AmigellaModal.open();
      await w(400);
    }
    if (typeof switchTab === 'function') { switchTab(1); await w(100); }
  };

  // ── G1: LLM Fallback & Guardrails ────────────────────────
  out.push(await uxT('G1.1: callClaude postoji i prima timeout', () => {
    return typeof callClaude === 'function' &&
           typeof AbortController !== 'undefined';
  }, s));

  out.push(await uxT('G1.2: Cache (_aiCache) sa 24h TTL', () => {
    return typeof _aiCache !== 'undefined' &&
           typeof AI_CACHE_TTL !== 'undefined' &&
           AI_CACHE_TTL === 24 * 60 * 60 * 1000;
  }, s));

  out.push(await uxT('G1.3: Cache hit ne poziva fetchAiIngredients ponovo', async () => {
    // Simuliraj cache
    _cacheSet('test_jelo_cache', [{name:'test',qty:'100',unit:'g'}]);
    const cached = _cacheGet('test_jelo_cache');
    _aiCache.delete('test_jelo_cache'); // cleanup
    return !!cached && cached.length > 0;
  }, s));

  out.push(await uxT('G1.4: Rate limit blokira > max poziva', () => {
    const orig = { ..._aiRateLimit };
    _aiRateLimit.count = _aiRateLimit.max; // simuliraj max
    const result = !_aiRateCheck(100);
    Object.assign(_aiRateLimit, orig); // restore
    return result;
  }, s));

  out.push(await uxT('G1.5: Token budžet blokira > maxTokens', () => {
    const orig = { ..._aiRateLimit };
    _aiRateLimit.tokens = _aiRateLimit.maxTokens;
    _aiRateLimit.count = 0; // count ok ali tokens ne
    const result = !_aiRateCheck(100);
    Object.assign(_aiRateLimit, orig);
    return result;
  }, s));

  out.push(await uxT('G1.6: Retry backoff delays [250, 750]', () => {
    // Provjeri da callClaude ima delays array u kodu (static check)
    return typeof callClaude === 'function' &&
           callClaude.toString().includes('250') &&
           callClaude.toString().includes('750');
  }, s));

  out.push(await uxT('G1.7: fetchAiIngredients vraća null bez PII u erroru', async () => {
    // Simuliraj: prazno ime → null
    const r = await fetchAiIngredients('');
    return r === null;
  }, s));

  out.push(await uxT('G1.8: Negacija "bez brašna" filtrira brašno', () => {
    const result = filterByNegation(['brašno','jaja','maslac'], 'torta bez brašna');
    return !result.includes('brašno') && result.includes('jaja');
  }, s));

  // ── G2: Link & OCR ───────────────────────────────────────
  out.push(await uxT('G2.1: fetchIngredientsFromUrl postoji', () => {
    return typeof fetchIngredientsFromUrl === 'function';
  }, s));

  out.push(await uxT('G2.2: Invalid URL → null gracefully', async () => {
    let threw = false;
    try { await fetchIngredientsFromUrl('ftp://bad'); } catch (_) { threw = true; }
    return !threw;
  }, s));

  out.push(await uxT('G2.3: parseRecipeFromHtml parsira JSON-LD', () => {
    const html = '<script type="application/ld+json">{"@type":"Recipe","recipeIngredient":["200g brašno","3 jaja"]}</sc'+'ript>';
    const r = parseRecipeFromHtml(html);
    return Array.isArray(r) && r.length === 2;
  }, s));

  out.push(await uxT('G2.4: ocrImageViaClaudeVision postoji', () => {
    return typeof ocrImageViaClaudeVision === 'function';
  }, s));

  out.push(await uxT('G2.5: _detectIfDishPhoto postoji', () => {
    return typeof _detectIfDishPhoto === 'function';
  }, s));

  out.push(await uxT('G2.6: OCR null file → []', async () => {
    const r = await ocrImageFile(null);
    return Array.isArray(r) && r.length === 0;
  }, s));

  // ── G3: Empty State UX ───────────────────────────────────
  out.push(await uxT('G3.1: Empty state 3 CTA dugmadi', async () => {
    await ensure();
    if (typeof switchTab === 'function') { switchTab(2); await w(200); }
    const f = fs(); if (f) f.ingredients = []; // osiguraj praznu listu
    if (typeof renderIngList === 'function') renderIngList();
    await w(100);
    const empty = document.getElementById('am-ing-empty');
    if (!empty) return 'skip';
    const btns = empty.querySelectorAll('button');
    return btns.length >= 3;
  }, s));

  out.push(await uxT('G3.2: Slow AI banner postoji i ima ispravan copy', () => {
    return typeof _showAiSlowBanner === 'function' &&
           typeof amStartAiSlowTimer === 'function';
  }, s));

  out.push(await uxT('G3.3: Slow AI timer = 2000ms', () => {
    return _showAiSlowBanner.toString().includes('2000') ||
           amStartAiSlowTimer.toString().includes('2000');
  }, s));

  // ── G4: Zero-knowledge Sync + Recovery Key ───────────────
  out.push(await uxT('G4.1: generateRecoveryKey vraća 64-char hex', () => {
    const rk = generateRecoveryKey();
    return typeof rk === 'string' && rk.length === 64 && /^[0-9a-f]+$/.test(rk);
  }, s));

  out.push(await uxT('G4.2: Dva razlišita poziva daju različite ključeve', () => {
    const r1 = generateRecoveryKey();
    const r2 = generateRecoveryKey();
    return r1 !== r2;
  }, s));

  out.push(await uxT('G4.3: keyFromRecovery vraća AES ključ', async () => {
    const rk = generateRecoveryKey();
    const key = await keyFromRecovery(rk);
    return key instanceof CryptoKey;
  }, s));

  out.push(await uxT('G4.4: encryptWithRecovery → decrypt vraća isti objekt', async () => {
    const rk = generateRecoveryKey();
    const key = await keyFromRecovery(rk);
    const original = { name: 'Test jelo', ings: ['brašno', 'jaja'] };
    const enc = await encryptWithRecovery(key, original);
    const dec = await decryptWithRecovery(key, enc);
    return dec.name === original.name && dec.ings.length === 2;
  }, s));

  out.push(await uxT('G4.5: IV jedinstvenost (dva encrypt → dva različita IV)', async () => {
    const rk = generateRecoveryKey();
    const key = await keyFromRecovery(rk);
    const enc1 = await encryptWithRecovery(key, { test: 1 });
    const enc2 = await encryptWithRecovery(key, { test: 2 });
    return JSON.stringify(enc1.iv) !== JSON.stringify(enc2.iv);
  }, s));

  out.push(await uxT('G4.6: Recovery Key nikad ne ide u telemetriju', () => {
    const telStr = JSON.stringify(amTelReport());
    const rk = generateRecoveryKey();
    // Recovery key ne smije biti u telemetriji
    return !telStr.includes(rk) && typeof amTelReport().rk === 'undefined';
  }, s));

  out.push(await uxT('G4.7: amRKSave/amRKLoad round-trip', () => {
    const rk = generateRecoveryKey();
    amRKSave(rk);
    const loaded = amRKLoad();
    return loaded === rk;
  }, s));

  out.push(await uxT('G4.8: amShowRecoveryKeyModal kreira modal', async () => {
    amShowRecoveryKeyModal('aabbccdd'.repeat(8));
    await w(100);
    const modal = document.getElementById('am-rk-modal');
    const ok = !!modal;
    if (modal) modal.remove();
    return ok;
  }, s));

  out.push(await uxT('G4.9: amShowImportRecoveryKeyModal kreira modal', async () => {
    amShowImportRecoveryKeyModal();
    await w(100);
    const modal = document.getElementById('am-rk-import-modal');
    const ok = !!modal;
    if (modal) modal.remove();
    return ok;
  }, s));

  // ── G5: Telemetrija ──────────────────────────────────────
  out.push(await uxT('G5.1: amTelReport ima p95 metrike', () => {
    const r = amTelReport();
    return typeof r.p95 === 'object' &&
           'ttfap' in r.p95 &&
           'ocr' in r.p95;
  }, s));

  out.push(await uxT('G5.2: amTelReport ima warnings array', () => {
    const r = amTelReport();
    return Array.isArray(r.warnings);
  }, s));

  out.push(await uxT('G5.3: amTelReport ima daily_rate', () => {
    const r = amTelReport();
    return typeof r.daily_rate === 'object' &&
           'count' in r.daily_rate &&
           'tokens' in r.daily_rate;
  }, s));

  out.push(await uxT('G5.4: Telemetrija nema PII (email, IP, key)', () => {
    const str = JSON.stringify(amTelReport());
    return !str.includes('@') &&
           !str.includes('192.168') &&
           str.length < 5000; // nema veliku količinu podataka
  }, s));

  out.push(await uxT('G5.5: Token cap na 50 mjerenja', () => {
    const orig = [..._amTelemetry.ttfap_ms];
    for (let i = 0; i < 60; i++) amTelEvent('ttfap', { ms: i * 10 });
    const capped = _amTelemetry.ttfap_ms.length <= 50;
    _amTelemetry.ttfap_ms = orig; // restore
    return capped;
  }, s));

  return out;
}

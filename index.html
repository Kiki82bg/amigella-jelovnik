<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#EDE8F8">
<meta name="supported-color-schemes" content="light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-touch-fullscreen" content="yes">
<title>Amigella · Jelovnik</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1C1420;--ink2:#5A4B6A;--ink3:#9B8AAB;
  --gold:#C9A96E;--gold-bg:rgba(201,169,110,0.13);--gold-brd:rgba(201,169,110,0.35);
  --bg:#F4F0F8;--card:rgba(255,255,255,0.85);
  --deep:#7A5AAE;--pearl:#E8C7D3;--deep2:rgba(122,90,174,0.12);--deep3:rgba(122,90,174,0.22);
  --green:#3DB87A;--green2:rgba(61,184,122,0.12);
  --red:#D94F4F;--red2:rgba(217,79,79,0.1);
  --r:13px;--sh:0 2px 14px rgba(30,10,60,0.09);
  --fd:'Fraunces',serif;--fs:'DM Sans',sans-serif;
  color-scheme:light only;
}
html{background:linear-gradient(145deg,#EDE8F8,#D4C8EE 55%,#C2B2E4)!important;}
body{
  font-family:var(--fs);font-size:16px;
  background:linear-gradient(145deg,#EDE8F8,#D4C8EE 55%,#C2B2E4)!important;
  color:#1C1420!important;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:0;-webkit-text-size-adjust:100%;
}
/* Force light — Android Chrome dark theme override */
@media(prefers-color-scheme:dark){
  html,body{background:linear-gradient(145deg,#EDE8F8,#D4C8EE 55%,#C2B2E4)!important;color:#1C1420!important;}
  .phone{background:#F4F0F8!important;color:#1C1420!important;}
  .hdr{background:#F4F0F8!important;}
  .hdr-title{color:#1C1420!important;}
  .mc{background:rgba(255,255,255,0.93)!important;}
  .mc-nm{color:#1C1420!important;}
  .scroll{background:#F4F0F8!important;}
  .slbl{color:#9B8AAB!important;}
  .sw{color:#9B8AAB!important;background:transparent!important;}
  .sw.active{background:#7A5AAE!important;color:#fff!important;}
  .sync{background:rgba(122,90,174,.1)!important;color:#7A5AAE!important;}
  .ms{background:linear-gradient(168deg,#F6F2FA 0%,#EBE3F5 100%)!important;}
  input,select,textarea{background:#f8f6fc!important;color:#2E1A47!important;}
  .chip{background:#fff!important;color:#2E1A47!important;}
  .chip.sel{background:#9B7FCC!important;color:#fff!important;}
  .plan-acc{background:rgba(255,255,255,0.93)!important;}
  .plan-acc-title,.plan-meal-name{color:#1C1420!important;}
  #am-modal,.am-footer{background:#fff!important;color:#1C1420!important;}
  .preset-pack-btn{background:#fff!important;color:#5A4B6A!important;}
  .filter-chip{background:#fff!important;color:#5A4B6A!important;}
  .filter-chip.active{background:#7A5AAE!important;color:#fff!important;}
  .packs-group-label{color:#9B8AAB!important;}
  .mc-tag{background:rgba(122,90,174,.15)!important;color:#7A5AAE!important;}
  .add-cta{background:#C9A96E!important;color:#fff!important;}
}

/* ── Phone shell — puno na telefonu ── */
.phone{
  width:100%;max-width:430px;
  height:100vh;height:100dvh;
  min-height:-webkit-fill-available;
  background:var(--bg);
  border-radius:0;box-shadow:none;
  display:flex;flex-direction:column;
  overflow:hidden;overflow-x:hidden;position:relative;flex-shrink:0;
}
@media(min-width:500px){
  body{padding:16px;}
  .phone{width:390px;height:844px;min-height:unset;border-radius:42px;box-shadow:0 44px 110px rgba(40,10,80,0.38),inset 0 0 0 1.5px rgba(255,255,255,0.45);}
}

/* ── Header ── */
.hdr{padding:18px 20px 0;flex-shrink:0;background:var(--bg)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-title{font-family:var(--fd);font-size:26px;font-style:italic;font-weight:600;color:var(--ink)}
.week-nav{display:flex;align-items:center;gap:3px}
.wn{border:none;background:transparent;color:var(--ink3);font-size:15px;cursor:pointer;padding:0 3px;line-height:1;transition:color .15s}
.wn:hover{color:var(--deep)}
.wbadge{font-size:9px;font-weight:600;color:var(--ink2);background:var(--gold-bg);border:1px solid var(--gold-brd);border-radius:20px;padding:2px 9px}

/* ── Primary CTA — "＋ Dodaj jelo" (žuto, sticky ispod naslova) ── */
.add-cta{
  display:flex;align-items:center;gap:8px;
  background:var(--gold);color:white;
  border:none;border-radius:12px;
  font-family:var(--fs);font-size:15px;font-weight:700;
  padding:13px 22px;cursor:pointer;
  box-shadow:0 3px 14px rgba(201,169,110,0.45);
  transition:all .18s;
  margin:8px 0 12px 0;
  align-self:flex-start;
  position:relative;
  z-index:10;
  touch-action:manipulation;
  -webkit-tap-highlight-color:rgba(201,169,110,0.3);
  pointer-events:auto;
  min-height:48px;
}
.add-cta:hover{background:#b89058;box-shadow:0 4px 18px rgba(201,169,110,0.55);transform:translateY(-1px)}
.add-cta:active{transform:scale(.97)}
.add-cta-icon{font-size:16px;line-height:1}

/* ── Tab switcher ── */
.switcher{display:flex;gap:4px;flex-shrink:0}
.sw{flex:1;padding:10px 0;border:none;border-radius:10px;font-family:var(--fs);font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;background:transparent;color:var(--ink3)}
.sw.active{background:var(--deep);color:white;box-shadow:0 2px 10px rgba(122,90,174,0.35)}
.sub-sw{display:flex;gap:3px;padding:8px 20px 0;flex-shrink:0}
.ssw{flex:1;padding:5px 0;border:1.5px solid rgba(122,90,174,.2);border-radius:8px;font-family:var(--fs);font-size:10px;font-weight:500;cursor:pointer;background:transparent;color:var(--ink2);transition:all .15s}
.ssw.active{background:var(--deep2);border-color:var(--deep);color:var(--deep);font-weight:600}

/* ── Toolbar ── */
.toolbar{display:flex;gap:5px;justify-content:flex-end;padding:5px 20px 0;flex-shrink:0}
.tb{font-size:8.5px;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid rgba(122,90,174,.2);background:transparent;color:var(--ink3);cursor:pointer;transition:all .15s}
.tb:hover,.tb.on{background:var(--deep2);color:var(--deep);border-color:var(--deep)}

/* ── Scroll ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 16px 80px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none}
.slbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);padding:9px 4px 5px}

/* ── Meal cards ── */
.mc{background:var(--card);backdrop-filter:blur(8px);border-radius:var(--r);border:1px solid rgba(255,255,255,.85);padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.mc:active{transform:scale(.98)}
.mc-top{display:flex;align-items:center;gap:10px}
.mc-e{font-size:22px;flex-shrink:0}
/* mc-nm i mc-tag definisani u P5/P6 sekciji ispod */

/* ── Day strip ── */
.dstrip{display:flex;gap:3px;margin-top:8px;padding:7px 9px;background:rgba(122,90,174,.05);border-radius:10px;border:1px solid rgba(122,90,174,.11)}
.db{flex:1;padding:5px 2px;border:1px solid rgba(122,90,174,.2);border-radius:7px;font-family:var(--fs);font-size:8px;font-weight:600;text-align:center;cursor:pointer;background:white;color:var(--ink2);transition:all .15s}
.db:hover{background:var(--deep);color:white;border-color:var(--deep)}
.db.assigned{background:var(--gold);color:white;border-color:var(--gold)}


.plan-filter-row { display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;padding:2px 0; }
.plan-filter-chip { padding:6px 14px;border-radius:20px;font-size:13px;border:0.5px solid rgba(122,90,174,.2);color:var(--ink2);background:var(--card);cursor:pointer;transition:all .12s;user-select:none; }
.plan-filter-chip:hover { border-color:var(--deep);color:var(--deep); }
.plan-filter-chip.on { background:var(--deep);color:#fff;border-color:var(--deep);font-weight:600; }
.plan-acc-count.hi { background:#EDE8F5;color:#5B3FA6;font-weight:600; }
/* ── Plan accordion (v13) ── */
.plan-acc { margin-bottom: 10px; border-radius: 14px; background: var(--card); border: 1px solid rgba(122,90,174,.12); box-shadow: 0 2px 8px rgba(30,10,60,.06); overflow: hidden; }
.plan-acc-hdr { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; cursor: pointer; user-select: none; }
.plan-acc-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: .01em; }
.plan-acc-count { font-size:12px; color: var(--ink3); background: rgba(122,90,174,.08); padding: 3px 10px; border-radius: 20px; }
.plan-acc-arrow { font-size: 11px; color: var(--ink3); transition: transform .2s; }
.plan-acc-hdr.open .plan-acc-arrow { transform: rotate(180deg); }
.plan-acc-body { display: none; border-top: 1px solid rgba(122,90,174,.08); }
.plan-acc-body.open { display: block; }
.plan-search-wrap { padding: 10px 12px 6px; position: relative; }
.plan-search-inp { width: 100%; padding: 7px 30px 7px 12px; border: 1px solid rgba(122,90,174,.18); border-radius: 10px; font-family: var(--fs); font-size: 11px; color: var(--ink); background: var(--bg,#F4F0F8); outline: none; box-sizing: border-box; transition: border-color .15s; }
.plan-search-inp:focus { border-color: var(--deep); }
.plan-search-icon { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); color: var(--ink3); font-size: 12px; pointer-events: none; }
.plan-meal-row { display: flex; align-items: center; padding: 9px 14px; gap: 10px; border-bottom: 1px solid rgba(122,90,174,.06); transition: background .12s; }
.plan-meal-row:last-child { border-bottom: none; }
.plan-meal-row:hover { background: rgba(122,90,174,.04); }
.plan-meal-name { flex: 1; font-size: 15px; font-weight: 600; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.plan-btn { padding: 5px 11px; border: 1px solid rgba(122,90,174,.22); border-radius: 8px; background: transparent; font-size: 10px; font-weight: 600; color: var(--deep); cursor: pointer; white-space: nowrap; transition: all .12s; }
.plan-btn:hover { background: var(--deep); color: #fff; border-color: var(--deep); }
.plan-day-strip { display: flex; gap: 4px; padding: 8px 14px 12px; }
.plan-day-btn { flex: 1; padding: 6px 2px; border: 1px solid rgba(122,90,174,.2); border-radius: 8px; font-family: var(--fs); font-size: 9px; font-weight: 600; text-align: center; cursor: pointer; background: white; color: var(--ink2); transition: all .15s; }
.plan-day-btn:hover { background: var(--deep); color: white; border-color: var(--deep); }
.plan-day-btn.assigned { background: var(--gold,#C9A96E); color: white; border-color: var(--gold,#C9A96E); }
.plan-empty { padding: 16px 14px; font-size: 11px; color: var(--ink3); font-style: italic; text-align: center; }
.plan-add-cat { display: flex; align-items: center; gap: 7px; padding: 10px 4px; cursor: pointer; color: var(--deep); font-size: 11px; font-weight: 600; opacity: .7; transition: opacity .15s; user-select:none; }
.plan-add-cat:hover { opacity: 1; }


/* ── Amigella placeholder boja — svuda konzistentna ── */
input::placeholder, textarea::placeholder { color:#5A4B6A !important; opacity:1 !important; }
input::-webkit-input-placeholder, textarea::-webkit-input-placeholder { color:#5A4B6A !important; opacity:1 !important; }
input::-moz-placeholder, textarea::-moz-placeholder { color:#5A4B6A !important; opacity:1 !important; }
/* Posebno za am-modal inpute */
#am-modal input::placeholder { color:#5A4B6A !important; opacity:1 !important; }
#am-modal select { color:#2E1A47 !important; }
/* ── Amigella tekst boja — sva slova teget ── */
#am-modal input, #am-modal select, #am-modal textarea { color:#2E1A47; }
#am-modal { color:#2E1A47; }
/* ── Tab 1 chip rows (pill stil, finalni mockup) ── */
.am-chip-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:nowrap}
.am-chip-row .chip{flex:1;min-width:0;height:28px;border-radius:100px;padding:0 6px;font-size:10px;justify-content:center;border:0.5px solid rgba(122,90,174,.25);background:#fff;color:#2E1A47}
.am-chip-row .chip[aria-selected="true"],.am-chip-row .chip.sel{background:#9B7FCC;border-color:#9B7FCC;color:#fff;font-weight:500}
.am-sec-label{font-size:11px;font-weight:500;color:var(--deep);margin-bottom:6px;margin-top:2px}
/* Stil za am-chips lista — pill chipovi */
#am-meal-types-chips{display:block;padding:0;margin:0}
/* am-chip-row unutar am-meal-types-chips */
#am-meal-types-chips .am-chip-row .chip{flex:1;min-width:0;height:28px;border-radius:100px;padding:0 6px;font-size:10px;display:flex;align-items:center;justify-content:center;border:0.5px solid rgba(122,90,174,.25);background:#fff;cursor:pointer;font-family:var(--font);font-weight:400;color:#2E1A47;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize}
#am-meal-types-chips .am-chip-row .chip.sel,#am-meal-types-chips .am-chip-row .chip[aria-selected="true"]{background:#9B7FCC;border-color:#9B7FCC;color:#fff}
#am-meal-types-chips .am-chip-row .chip .chip__remove{display:none}
/* meal-type-sep kao label između redova */
#am-meal-types-chips .meal-type-sep{font-size:11px;font-weight:500;color:var(--deep);margin:8px 0 6px;padding:0}
/* ── Plan rows ── */
.pr{background:var(--card);border-radius:10px;border:1px solid rgba(255,255,255,.85);padding:8px 11px;margin-bottom:5px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh)}
.slt-hdr{font-size:10px;font-weight:700;color:var(--ink2);padding:4px 0;display:flex;align-items:center;gap:5px}

/* ── Week grid ── */
.wg{display:grid;grid-template-columns:32px repeat(7,1fr);gap:2px}
.wg-lbl{font-size:8px;font-weight:600;color:var(--ink3);display:flex;align-items:center;padding:2px}
.wg-dh{text-align:center;font-size:8px;font-weight:700;color:var(--ink2);padding:4px 1px;border-radius:6px 6px 0 0;background:rgba(122,90,174,.07)}
.wg-dh.today{background:var(--deep);color:white}
.wg-c{min-height:40px;background:var(--card);border-radius:6px;padding:3px 2px;cursor:pointer;border:1px solid rgba(255,255,255,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:8px;color:var(--ink3);transition:all .15s}
.wg-c.filled{background:var(--gold-bg);border-color:var(--gold-brd);color:var(--ink);font-weight:600}
.wg-c:hover{background:var(--deep2)}
.cm{font-size:7.5px;line-height:1.2;word-break:break-word}

/* ── Shopping preview ── */
.shop-prev{background:var(--gold-bg);border:1px solid var(--gold-brd);border-radius:10px;padding:9px 12px;margin-bottom:10px}
.shop-title{font-size:9px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;justify-content:space-between}
.shop-chip{display:inline-block;background:white;border:1px solid var(--gold-brd);border-radius:20px;padding:2px 8px;font-size:9px;color:var(--ink2);margin:2px}

/* ── Parse panel ── */
.panel{background:var(--card);border-radius:var(--r);border:1px solid rgba(255,255,255,.85);padding:13px;margin-bottom:10px;box-shadow:var(--sh)}
.ptitle{font-family:var(--fd);font-size:13px;font-weight:600;color:var(--ink);margin-bottom:9px}
.irow{display:flex;gap:7px;margin-bottom:8px}
.inp{flex:1;padding:8px 11px;border-radius:9px;border:1.5px solid rgba(122,90,174,.2);background:rgba(255,255,255,.85);font-family:var(--fs);font-size:11px;color:var(--ink);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--deep)}
.inp-xs{flex:0 0 62px;padding-left:6px}
.pres{background:var(--deep2);border-radius:9px;padding:8px 11px;margin-top:7px;font-size:10px}
.prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.plbl{color:var(--ink3);font-size:9px}.pval{color:var(--ink);font-weight:600}
.badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:8.5px;font-weight:700}
.b-ok{background:var(--green2);color:#1a7048}
.b-in{background:var(--gold-bg);color:#7a5010}
.b-ol{background:var(--red2);color:var(--red)}

/* ── Sync / toast / undo ── */
.sync{background:var(--deep2);border-top:1px solid rgba(122,90,174,.15);padding:5px 16px;font-size:9px;color:var(--deep);font-weight:600;display:flex;align-items:center;gap:6px;flex-shrink:0;transition:all .3s;min-height:26px}
.sync.ok{background:var(--green2);color:#1a7048}
.sync.auth{background:var(--red2);color:var(--red)}
.sdot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.sdot.pulse{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
#toast{position:absolute;bottom:66px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(28,20,32,.93);color:white;padding:7px 16px;border-radius:22px;font-family:var(--fs);font-size:10px;font-weight:500;white-space:nowrap;opacity:0;transition:all .24s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:100;max-width:300px;white-space:normal;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#ubar{position:absolute;bottom:32px;left:12px;right:12px;background:rgba(28,20,32,.9);color:white;padding:8px 14px;border-radius:12px;font-size:10px;display:none;align-items:center;justify-content:space-between;z-index:99;backdrop-filter:blur(4px)}
#ubar.on{display:flex;animation:su .22s ease}
@keyframes su{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.ubtn{padding:3px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.3);background:transparent;color:var(--gold);font-family:var(--fs);font-size:9.5px;font-weight:700;cursor:pointer}
#fab{position:absolute;bottom:14px;right:16px;width:44px;height:44px;border-radius:22px;background:var(--deep);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(122,90,174,.5);display:flex;align-items:center;justify-content:center;z-index:50;transition:all .15s;line-height:1}
#fab:hover{transform:scale(1.08)}

/* ════════════════════════════════════════
   MODAL — "Dodaj novo jelo"
   ════════════════════════════════════════ */
.mo{position:absolute;inset:0;z-index:200;background:rgba(20,12,30,.55);backdrop-filter:blur(6px);display:flex;align-items:flex-end}
.ms{width:100%;background:linear-gradient(168deg,#F6F2FA 0%,#EBE3F5 100%);border-radius:24px 24px 0 0;max-height:94%;overflow-y:auto;animation:shup .28s cubic-bezier(.34,1.4,.64,1)}
@keyframes shup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:36px;height:4px;background:rgba(90,75,106,.2);border-radius:2px;margin:14px auto 0}
.mb{padding:14px 18px 30px}

/* Modal sections */
.ms-title{font-family:var(--fd);font-size:17px;font-weight:600;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ms-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin:14px 0 6px}
.ms-info{font-size:9.5px;color:var(--ink3);margin:-3px 0 7px;font-style:italic}
.m-inp{width:100%;padding:10px 13px;border-radius:10px;border:1.5px solid rgba(122,90,174,.2);background:rgba(255,255,255,.9);font-family:var(--fs);font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
.m-inp:focus{border-color:var(--deep)}

/* Category chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.chip{padding:10px 18px;border-radius:100px;border:1px solid rgba(122,90,174,.25);background:#fff;font-family:var(--font);font-size:14px;font-weight:500;color:#2E1A47;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:5px;min-height:44px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--deep);color:var(--deep)}
.chip.sel{background:#9B7FCC;border-color:#9B7FCC;color:#fff;font-weight:600}
.chip.required.sel{background:#9B7FCC;color:white}
.chip.warn{border-color:var(--red);color:var(--red);animation:shake .35s ease}
.chip-x{font-size:10px;opacity:.75;cursor:pointer;line-height:1;padding:1px 2px;border-radius:50%;transition:opacity .15s;flex-shrink:0}
.chip-x:hover{opacity:1;background:rgba(255,255,255,.25)}
.chip-lbl{cursor:pointer}
.chip.sel .chip-lbl:hover{text-decoration:underline dotted rgba(255,255,255,.6)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* AI suggestion box */
.ai-box{background:linear-gradient(120deg,rgba(122,90,174,.08),rgba(201,169,110,.07));border:1px solid rgba(122,90,174,.18);border-radius:12px;padding:11px 13px;margin-bottom:10px}
.ai-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--deep);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.ai-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.ai-chip{padding:4px 10px;border-radius:20px;border:1px solid rgba(122,90,174,.25);background:white;font-size:10px;color:var(--ink2);cursor:pointer;transition:all .12s}
.ai-chip:hover{background:var(--deep);color:white;border-color:var(--deep)}
.ai-chip.added{background:var(--green2);border-color:var(--green);color:#1a7048;text-decoration:line-through}
.ai-chip-low{opacity:.55;font-style:italic;border-style:dashed;color:var(--muted)!important;}
.ai-chip-low:hover{opacity:1;font-style:normal;}
.ai-chip-mid{opacity:.78;}

.ai-actions{display:flex;gap:7px}
.ai-spin{display:flex;align-items:center;gap:7px;color:var(--ink3);font-size:10px;padding:4px 0}
.spinner{width:14px;height:14px;border:2px solid rgba(122,90,174,.2);border-top-color:var(--deep);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-fallback{font-size:10px;color:var(--ink3);padding:6px 0;font-style:italic}

/* Ingredient list */
.ing-list{margin-bottom:6px}
.ing-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid rgba(122,90,174,.07);position:relative}
.ing-row:last-child{border-bottom:none}
.ing-drag{color:var(--ink3);cursor:grab;font-size:13px;flex-shrink:0;padding:2px;touch-action:none}
.ing-drag:active{cursor:grabbing}
.ing-name-inp{flex:1.8;min-width:0;padding:5px 8px;border-radius:8px;border:1.5px solid transparent;background:rgba(255,255,255,.7);font-family:var(--fs);font-size:11px;color:var(--ink);outline:none;transition:all .15s}
.ing-name-inp:focus{border-color:var(--deep);background:white}
.ing-num{width:52px;flex-shrink:0;padding:5px 7px;border-radius:8px;border:1.5px solid transparent;background:rgba(255,255,255,.7);font-family:var(--fs);font-size:11px;color:var(--ink);outline:none;text-align:right;transition:all .15s}
.ing-num:focus{border-color:var(--deep);background:white}
.ing-unit{width:58px;flex-shrink:0;padding:5px 4px;border-radius:8px;border:1.5px solid transparent;background:rgba(255,255,255,.7);font-family:var(--fs);font-size:10px;color:var(--ink);outline:none;cursor:pointer;transition:all .15s}
.ing-unit:focus{border-color:var(--deep);background:white}
.ing-del{width:22px;height:22px;flex-shrink:0;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .15s}
.ing-del:hover{background:var(--red2);color:var(--red)}
.ing-idx{width:14px;flex-shrink:0;font-size:9px;color:var(--ink3);text-align:right}

/* Add ingredient */
.add-ing-row{display:flex;gap:6px;margin-top:6px;align-items:flex-start;padding-bottom:8px}
.add-ing-name{flex:1.5;padding:7px 10px;border-radius:9px;border:1.5px dashed rgba(122,90,174,.3);background:rgba(255,255,255,.6);font-family:var(--fs);font-size:11px;color:var(--ink);outline:none;transition:all .15s}
.add-ing-name:focus{border-color:var(--deep);border-style:solid;background:white}
.add-ing-num{width:52px;padding:7px 7px;border-radius:9px;border:1.5px dashed rgba(122,90,174,.3);background:rgba(255,255,255,.6);font-family:var(--fs);font-size:11px;text-align:right;color:var(--ink);outline:none;transition:all .15s}
.add-ing-num:focus{border-color:var(--deep);border-style:solid;background:white}
.add-ing-unit{width:62px;padding:7px 5px;border-radius:9px;border:1.5px dashed rgba(122,90,174,.3);background:rgba(255,255,255,.6);font-family:var(--fs);font-size:10px;color:var(--ink);outline:none;cursor:pointer;transition:all .15s}
.add-ing-unit:focus{border-color:var(--deep);border-style:solid;background:white}

/* Servings scaler */
.scaler{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.6);border-radius:10px;padding:8px 12px;margin-bottom:10px}
.scaler-lbl{font-size:10px;color:var(--ink2);font-weight:600;flex:1}
.sc-btn{width:28px;height:28px;border:1.5px solid rgba(122,90,174,.25);border-radius:8px;background:white;cursor:pointer;font-size:15px;font-weight:600;color:var(--deep);display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.sc-btn:hover{background:var(--deep);color:white;border-color:var(--deep)}
.sc-val{font-size:13px;font-weight:700;color:var(--ink);min-width:28px;text-align:center}
.sc-preset{padding:4px 9px;border-radius:7px;border:1px solid rgba(122,90,174,.2);background:transparent;font-size:9.5px;font-weight:600;color:var(--ink3);cursor:pointer;transition:all .12s}
.sc-preset:hover,.sc-preset.on{background:var(--deep2);color:var(--deep);border-color:var(--deep)}

/* Accordion */
.acc-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:9px 0;border-top:1px solid rgba(122,90,174,.1);margin-top:8px;user-select:none}
.acc-title{font-size:11px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:6px}
.acc-icon{font-size:12px;color:var(--ink3);transition:transform .2s}
.acc-icon.open{transform:rotate(90deg)}
.acc-body{overflow:hidden;transition:max-height .22s ease}

/* Nutrition */
.nutri-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.nutri-cell{background:rgba(255,255,255,.7);border-radius:9px;padding:8px 10px}
.nutri-lbl{font-size:8.5px;color:var(--ink3);margin-bottom:2px}
.nutri-val{font-size:13px;font-weight:700;color:var(--ink)}
.nutri-unit{font-size:9px;color:var(--ink3)}
.nutri-status{font-size:9px;color:var(--ink3);font-style:italic;margin-bottom:6px;display:flex;align-items:center;gap:5px}

/* Recipe links */
.link-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(122,90,174,.07)}
.link-row:last-child{border-bottom:none}
.link-url{font-size:10px;color:var(--deep);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none}
.link-del{border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:13px;padding:2px;border-radius:50%;transition:all .15s}
.link-del:hover{background:var(--red2);color:var(--red)}

/* Photo thumbs */
.thumb-grid{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.thumb{width:56px;height:56px;border-radius:9px;background:rgba(122,90,174,.1);border:1.5px solid rgba(122,90,174,.2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink3);cursor:pointer;position:relative;overflow:hidden;transition:all .15s}
.thumb:hover{border-color:var(--deep)}
.thumb-del{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(217,79,79,.85);color:white;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:1}

/* Modal footer */
.m-footer{display:flex;gap:9px;margin-top:18px;padding-top:14px;border-top:1px solid rgba(122,90,174,.1)}
.btn{padding:11px 14px;border-radius:11px;border:none;font-family:var(--fs);font-size:11.5px;font-weight:700;cursor:pointer;transition:all .17s}
.btn-save{background:var(--deep);color:white;box-shadow:0 3px 14px rgba(122,90,174,.4)}
.btn-save:hover{opacity:.9;transform:translateY(-1px)}
.btn-save:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-cancel{background:transparent;color:var(--ink3);border:1.5px solid rgba(122,90,174,.2);padding:11px 12px}
.btn-cancel:hover{background:var(--deep2);color:var(--ink2)}
.btn-sm{padding:6px 12px;font-size:10px;font-weight:600;border-radius:9px;cursor:pointer;border:none;transition:all .15s}
.btn-add{background:var(--deep);color:white}.btn-add:hover{opacity:.88}
.btn-ghost{background:transparent;border:1.5px solid rgba(122,90,174,.25);color:var(--ink2)}.btn-ghost:hover{background:var(--deep2)}
.btn-gold{background:var(--gold);color:white;box-shadow:0 2px 10px rgba(201,169,110,.35)}.btn-gold:hover{opacity:.9}
.btn-green{background:var(--green);color:white}.btn-green:hover{opacity:.9}

/* Draft badge */
.draft-badge{font-size:8.5px;color:var(--gold);background:rgba(201,169,110,.15);border:1px solid rgba(201,169,110,.3);border-radius:20px;padding:1px 8px;margin-left:auto}
/* Conflict modal for generic */
.conf-opts{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.conf-btn{padding:10px 14px;border-radius:10px;border:1.5px solid rgba(122,90,174,.2);background:white;font-family:var(--fs);font-size:11px;font-weight:600;color:var(--ink);cursor:pointer;text-align:left;transition:all .15s}
.conf-btn:hover{background:var(--deep2);border-color:var(--deep)}
.conf-btn.cancel-btn{color:var(--ink3);font-weight:400}
.conf-btn.danger-btn{color:var(--red);border-color:var(--red2)}

/* ── Autocomplete focus-visible (a11y) ─ */
.am-ac-item:focus-visible{outline:2px solid rgba(91,63,166,.35);outline-offset:-2px}


/* ── AC dropdown spec styling ─────── */
#ac-dish-dd li[role="option"]{padding:9px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .12s;border-radius:7px;margin:1px 4px}
#ac-dish-dd li[role="option"][aria-selected="true"],
#ac-dish-dd li[role="option"]:hover{background:rgba(122,90,174,.1);color:var(--deep)}
#ac-dish-dd li[role="option"]:focus-visible{outline:2px solid rgba(91,63,166,.35);outline-offset:-2px}
#ac-dish-dd li[role="option"] span:last-child{font-size:9px;color:var(--ink3)}

/* ── AMIGELLA DEV TEST PANEL ────────────────────────────── */
#am-dev-fab{position:fixed;bottom:72px;right:14px;width:44px;height:44px;border-radius:50%;background:var(--deep,#5B3FA6);color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;z-index:9998;box-shadow:0 3px 12px rgba(91,63,166,.45);display:flex;align-items:center;justify-content:center}
#am-dev-panel{position:fixed;bottom:126px;right:14px;background:#fff;border:1.5px solid rgba(91,63,166,.25);border-radius:14px;padding:14px;width:202px;box-shadow:0 6px 24px rgba(26,18,40,.18);z-index:9997;display:none;font-family:var(--fs,system-ui),sans-serif}
#am-dev-panel h4{margin:0 0 10px;font-size:12px;color:#5B3FA6;font-weight:700}
.am-dpbtn{display:block;width:100%;margin-bottom:7px;padding:8px 12px;border:1.5px solid rgba(91,63,166,.3);border-radius:9px;background:transparent;font-size:11px;font-weight:600;color:#5B3FA6;cursor:pointer;text-align:left;transition:background .12s}
.am-dpbtn:hover{background:rgba(91,63,166,.09)}
/* ── REPORT OVERLAY ──────────────────────────────────────── */
#am-test-overlay{position:fixed;inset:0;background:rgba(18,10,32,.55);backdrop-filter:blur(4px);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px}
#am-test-card{background:#fff;border-radius:18px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;padding:20px;font-family:var(--fs,system-ui),sans-serif;box-shadow:0 12px 48px rgba(26,18,40,.2)}
#am-test-card h3{margin:0 0 12px;font-size:15px;color:#1A1228;display:flex;justify-content:space-between;align-items:center}
#am-test-card h3 button{background:transparent;border:none;font-size:18px;cursor:pointer;color:#7B6E9A;padding:0 4px;line-height:1}
.am-tr{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(110,80,170,.1);font-size:12px}
.am-tr:last-child{border-bottom:none}
.am-tr-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.am-tr-lbl{flex:1;color:#1A1228;font-weight:500}
.am-tr-err{font-size:10px;color:#C0392B;margin-top:2px}
.am-tr-skip{color:#7B6E9A;font-weight:400}
#am-test-dl{display:block;width:100%;margin-top:14px;padding:10px;background:#5B3FA6;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;text-align:center}
#am-test-dl:hover{background:#432D80}
.am-suite-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#7B6E9A;margin:10px 0 4px;padding-top:8px;border-top:1px solid rgba(110,80,170,.12)}
.am-suite-hdr:first-child{border-top:none;margin-top:0}


/* ══ UX SMOKE TEST PANEL ════════════════════════════════════ */
#ux-fab{position:fixed;bottom:20px;right:20px;z-index:9999;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--deep,#5B3FA6),#7C5AC7);color:#fff;border:none;font-size:10px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(91,63,166,.45);display:flex;align-items:center;justify-content:center;line-height:1.2;text-align:center;transition:transform .15s}
#ux-fab:hover{transform:scale(1.08)}
#ux-overlay{position:fixed;inset:0;z-index:10000;background:rgba(18,10,32,.6);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;padding:16px}
#ux-card{background:#fff;border-radius:22px 22px 18px 18px;width:100%;max-width:500px;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 16px 56px rgba(26,18,40,.28);overflow:hidden}
.ux-hdr{display:flex;align-items:center;gap:10px;padding:16px 18px 12px;border-bottom:1px solid rgba(110,80,170,.14);flex-shrink:0}
.ux-hdr h3{margin:0;font-size:14px;font-weight:800;color:#1A1228;flex:1}
.ux-hdr button{background:transparent;border:none;font-size:20px;cursor:pointer;color:#7B6E9A;padding:0 3px;line-height:1}
.ux-btns{display:flex;flex-wrap:wrap;gap:6px;padding:10px 18px;border-bottom:1px solid rgba(110,80,170,.1);flex-shrink:0}
.ux-btn{flex:1;min-width:110px;padding:8px 10px;border:1.5px solid rgba(91,63,166,.28);border-radius:10px;background:transparent;font-size:10.5px;font-weight:700;color:#5B3FA6;cursor:pointer;transition:all .13s;white-space:nowrap}
.ux-btn:hover{background:rgba(91,63,166,.1)}
.ux-btn.primary{background:#5B3FA6;color:#fff;border-color:#5B3FA6}
.ux-btn.primary:hover{background:#432D80}
#ux-results{flex:1;overflow-y:auto;padding:10px 18px 4px;scroll-behavior:smooth}
.ux-s-hdr{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#7B6E9A;margin:10px 0 4px;padding-top:8px;border-top:1px solid rgba(110,80,170,.1)}
.ux-s-hdr:first-child{border-top:none;margin-top:2px}
.ux-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid rgba(110,80,170,.07);font-size:11.5px;animation:uxIn .13s ease both}
@keyframes uxIn{from{opacity:0;transform:translateX(-5px)}}
.ux-row:last-child{border-bottom:none}
.ux-ico{font-size:14px;flex-shrink:0;line-height:1.35}
.ux-lbl{flex:1;font-weight:500;color:#1A1228;line-height:1.4}
.ux-err{font-size:10px;color:#C0392B;margin-top:2px;font-style:italic}
.ux-skip{color:#A99BC5;font-weight:400}
.ux-spin{display:flex;align-items:center;gap:8px;font-size:11px;color:#7B6E9A;padding:8px 0}
.ux-ring{width:14px;height:14px;border:2px solid rgba(110,80,170,.2);border-top-color:#5B3FA6;border-radius:50%;animation:uxSpin .65s linear infinite;flex-shrink:0}
@keyframes uxSpin{to{transform:rotate(360deg)}}
.ux-foot{padding:10px 18px 14px;flex-shrink:0;border-top:1px solid rgba(110,80,170,.1);display:flex;align-items:center;justify-content:space-between;gap:8px}
.ux-score{font-size:13px;font-weight:800;color:#1A1228}
.ux-score em{color:#5B3FA6;font-style:normal}
#ux-dl{padding:8px 16px;background:#5B3FA6;color:#fff;border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
#ux-dl:hover{background:#432D80}

/* ── UX Smoke Panel ── */
#ux-smoke-fab{position:fixed;bottom:20px;right:20px;z-index:9999;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#5B3FA6,#7C5AC7);color:#fff;border:none;font-size:10px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(91,63,166,.5);display:flex;align-items:center;justify-content:center;line-height:1.2;text-align:center}
#ux-smoke-fab:hover{transform:scale(1.07)}
#ux-smoke-overlay{position:fixed;inset:0;z-index:10000;background:rgba(18,10,32,.6);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;padding:16px}
#ux-smoke-card{background:#fff;border-radius:22px 22px 18px 18px;width:100%;max-width:480px;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 16px 56px rgba(26,18,40,.28);overflow:hidden}
.ux-card-hdr{display:flex;align-items:center;gap:10px;padding:16px 18px 12px;border-bottom:1px solid rgba(110,80,170,.14);flex-shrink:0}
.ux-card-hdr h3{margin:0;font-size:14px;font-weight:800;color:#1A1228;flex:1}
.ux-card-hdr button{background:transparent;border:none;font-size:20px;cursor:pointer;color:#7B6E9A;padding:0 2px;line-height:1}
.ux-run-btns{display:flex;gap:6px;padding:10px 18px;border-bottom:1px solid rgba(110,80,170,.1);flex-shrink:0;flex-wrap:wrap}
.ux-run-btn{flex:1;min-width:90px;padding:8px 6px;border:1.5px solid rgba(91,63,166,.3);border-radius:10px;background:transparent;font-size:10px;font-weight:700;color:#5B3FA6;cursor:pointer;transition:all .14s;white-space:nowrap}
.ux-run-btn:hover{background:rgba(91,63,166,.1)}
.ux-run-btn.primary{background:#5B3FA6;color:#fff;border-color:#5B3FA6}
.ux-run-btn.primary:hover{background:#432D80}
#ux-smoke-results{flex:1;overflow-y:auto;padding:10px 18px 4px}
.ux-suite-hdr{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#7B6E9A;margin:10px 0 5px;padding-top:8px;border-top:1px solid rgba(110,80,170,.1)}
.ux-suite-hdr:first-child{border-top:none;margin-top:2px}
.ux-tr{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(110,80,170,.08);font-size:12px}
.ux-tr:last-child{border-bottom:none}
.ux-ico{font-size:15px;flex-shrink:0;line-height:1.3}
.ux-lbl{flex:1;font-weight:500;color:#1A1228;line-height:1.4}
.ux-err{font-size:10px;color:#C0392B;margin-top:2px;font-style:italic}
.ux-skip{color:#A99BC5;font-weight:400}
.ux-running{color:#7B6E9A;font-style:italic;font-size:11px;padding:8px 0;display:flex;align-items:center;gap:6px}
.ux-ring{width:14px;height:14px;border:2px solid rgba(110,80,170,.2);border-top-color:#5B3FA6;border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
.ux-summary{padding:10px 18px 14px;flex-shrink:0;border-top:1px solid rgba(110,80,170,.1);display:flex;align-items:center;justify-content:space-between;gap:8px}
.ux-score{font-size:13px;font-weight:800;color:#1A1228}
.ux-score em{color:#5B3FA6;font-style:normal}
#ux-dl-btn{padding:8px 16px;background:#5B3FA6;color:#fff;border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
#ux-dl-btn:hover{background:#432D80}



/* ── Amigella Modal CSS ─────────────────── */
/* ── Reset & tokens ────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --deep:#5B3FA6; --deep-dk:#432D80; --deep-lt:rgba(91,63,166,.10); --deep-xl:rgba(91,63,166,.06);
  --muted:#7B6E9A; --ink:#1A1228; --ink2:#4A3E68;
  --red:#C0392B; --red-lt:rgba(192,57,43,.10);
  --green:#27AE60; --green-lt:rgba(39,174,96,.12);
  --gold:#C9A96E;
  --bg:#F7F4FB; --surface:#FFFFFF;
  --border:rgba(110,80,170,.18); --border-hi:rgba(110,80,170,.50);
  --r-sm:8px; --r-md:12px; --r-lg:18px; --r-pill:100px;
  --shadow-sm:0 1px 4px rgba(26,18,40,.08);
  --shadow-md:0 4px 24px rgba(26,18,40,.12);
  --shadow-lg:0 12px 48px rgba(26,18,40,.18);
  --anim:140ms ease;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --font-d:Georgia,'Times New Roman',serif;
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}



/* ── Overlay ── */
#am-overlay{will-change:opacity;position:absolute;inset:0;z-index:1000;background:rgba(18,10,32,.55);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;opacity:0;transition:opacity var(--anim);border-radius:42px;overflow:hidden;pointer-events:none;}
#am-overlay.visible{opacity:1;pointer-events:auto;}
#am-overlay.closing{opacity:0}

/* ── Modal sheet ── */
#am-modal{contain:layout style;width:100%;max-width:344px;background:#fff;border-radius:0;max-height:100%;height:100%;display:flex;flex-direction:column;box-shadow:none;transform:translateY(-100%);transition:transform 220ms cubic-bezier(0.34,1.4,0.64,1)}
#am-overlay.visible #am-modal{transform:translateY(0)}
#am-overlay.closing #am-modal{transform:translateY(-100%)}
.am-handle{width:40px;height:4px;background:rgba(110,80,170,.22);border-radius:var(--r-pill);margin:12px auto 0;flex-shrink:0}

/* ── Header ── */
.am-header{padding:16px 20px 8px;flex-shrink:0;display:flex;align-items:center;gap:10px;background:#fff}
.am-title{font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:600;color:var(--ink);line-height:1.2;margin-bottom:2px;font-style:normal}
.am-draft-badge{font-size:10px;font-weight:600;color:var(--gold);background:rgba(201,169,110,.14);border:1px solid rgba(201,169,110,.3);border-radius:var(--r-pill);padding:2px 8px}

/* ── Body ── */
.am-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 20px 32px;min-height:0;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.am-body::-webkit-scrollbar{width:4px}
.am-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── Form groups ── */
.am-group{margin-bottom:14px}
.am-label{display:block;font-size:13px;font-weight:500;letter-spacing:0;text-transform:none;color:var(--deep);margin-bottom:5px;}
.am-label .req{color:var(--red);margin-left:2px}
.am-hint{font-size:10px;color:var(--ink3);margin-top:-2px;margin-bottom:8px;line-height:1.4}

/* ── Inputs ── */
.am-input{width:100%;padding:12px 14px;border:1px solid rgba(122,90,174,.2);border-radius:12px;background:#f8f6fc;font-family:var(--font);font-size:16px;color:var(--ink);outline:none;transition:border-color var(--anim);line-height:1.4}
.am-input:focus{border-color:var(--deep);box-shadow:0 0 0 3px rgba(91,63,166,.12)}
.am-input.error{border-color:var(--red)}
.am-input::placeholder{color:var(--muted);opacity:.7}

/* ── Autocomplete ── */
.am-ac-wrap{position:relative}
.am-ac-list{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--surface);border:1.5px solid var(--border-hi);border-radius:var(--r-md);box-shadow:var(--shadow-md);z-index:100;overflow:hidden;max-height:200px;overflow-y:auto}
.am-ac-list[hidden]{display:none}
.am-ac-item{padding:8px 14px;font-size:12px;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background var(--anim);border-bottom:0.5px solid var(--border);line-height:1.4;text-transform:capitalize}
.am-ac-item:last-child{border-bottom:none}
.am-ac-item:hover,.am-ac-item[aria-selected="true"]{background:var(--deep-lt);color:var(--deep)}
.am-ac-item .ac-hint{font-size:10px;color:var(--muted);margin-left:auto}
.am-ac-empty{padding:12px 14px;font-size:12px;color:var(--muted);font-style:italic}

/* ── Chips ── */
.am-chips{display:flex;flex-wrap:wrap;gap:7px;list-style:none;padding:0}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border:0.5px solid rgba(122,90,174,.25);border-radius:100px;background:#fff;font-family:var(--font);font-size:11px;font-weight:400;color:var(--ink2);cursor:pointer;user-select:none;transition:all var(--anim);min-height:28px;line-height:1.3}
.chip:hover{border-color:var(--deep);color:var(--deep)}
.chip:focus-visible{outline:2px solid var(--deep);outline-offset:2px}
.chip[aria-selected="true"],.chip.sel{background:#9B7FCC;border-color:#9B7FCC;color:#fff;font-weight:500}
.chip__label{pointer-events:none}.chip__dot{pointer-events:none}.chip span{pointer-events:none}
.chip__remove{appearance:none;border:0;background:transparent;pointer-events:auto;cursor:pointer;line-height:1;font-size:15px;font-weight:300;padding:0 1px;border-radius:4px;color:inherit;opacity:.75;display:flex;align-items:center;justify-content:center;min-width:18px;min-height:18px;transition:opacity var(--anim),background var(--anim)}
.chip__remove:hover{opacity:1;background:rgba(255,255,255,.25)}
.chip__remove:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.chip__rename-input{border:none;background:transparent;font-family:var(--font);font-size:12px;font-weight:600;color:#fff;outline:none;min-width:60px;max-width:120px;padding:0 2px}
@keyframes chipFadeOut{to{opacity:0;transform:scale(.8)}}
.am-chips.error .chip[aria-selected="false"]{border-color:var(--red)}
.am-err-msg{font-size:11px;color:var(--red);margin-top:5px;display:none}
.am-err-msg.visible{display:block}
.chip-add-new{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border:0.5px dashed rgba(122,90,174,.35);border-radius:100px;background:transparent;font-size:11px;color:var(--muted);cursor:pointer;transition:all var(--anim);min-height:28px}
.chip-add-new:hover{border-color:var(--deep);color:var(--deep)}
.new-cat-row{display:flex;gap:7px;margin-top:8px;align-items:center}
.new-cat-row .am-input{font-size:12px;padding:7px 11px}
.new-cat-row button{flex-shrink:0;padding:7px 14px;border:none;border-radius:var(--r-md);background:var(--deep);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:opacity var(--anim);min-height:36px}
.new-cat-row button:hover{opacity:.88}

/* ── AI box ── */
.am-ai-box{background:linear-gradient(120deg,var(--deep-xl),rgba(91,63,166,.04));border:1px solid var(--border);border-radius:var(--r-md);padding:11px 13px;margin-bottom:12px}
.am-copy-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid rgba(122,90,174,.2);border-radius:8px;background:transparent;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .12s;margin-bottom:8px}
.am-copy-btn:hover{background:rgba(122,90,174,.07);color:var(--deep);border-color:var(--deep)}
.am-copy-btn.copied{color:#1a7048;border-color:#1a7048;background:rgba(26,112,72,.06)}
.am-ai-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--deep);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.am-ai-label .ai-conf{font-weight:400;font-size:9px;opacity:.65;letter-spacing:0}
.am-ai-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.ai-chip{display:inline-block;padding:3px 10px;border:1px solid var(--border-hi);border-radius:var(--r-pill);font-size:11px;color:var(--ink2);background:var(--surface);cursor:pointer;transition:all var(--anim)}
.ai-chip:hover{background:var(--deep);color:#fff;border-color:var(--deep)}
.ai-chip.added{background:var(--green-lt);color:var(--green);border-color:var(--green);text-decoration:line-through}
.am-ai-actions{display:flex;gap:8px}
.am-ai-note{font-size:10px;color:var(--muted);margin-top:7px;font-style:italic}
.am-ai-spinner{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);padding:6px 0}
.spinner-ring{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--deep);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Ingredients ── */
.ing-list{list-style:none;margin-bottom:8px}
.ing-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);animation:ingIn 160ms ease both}
@keyframes ingIn{from{opacity:0;transform:translateX(-8px)}}
.ing-row:last-child{border-bottom:none}
.ing-drag{color:var(--muted);font-size:13px;cursor:grab;padding:2px;flex-shrink:0;touch-action:none}
.ing-drag:active{cursor:grabbing}
.ing-num-wrap{font-size:10px;color:var(--muted);width:18px;text-align:right;flex-shrink:0}
.ing-name{flex:1.8;min-width:0}
.ing-qty{width:54px;flex-shrink:0;text-align:right}
.ing-unit{width:62px;flex-shrink:0;padding:7px 5px;font-size:10px}
.ing-del{flex-shrink:0;width:26px;height:26px;border:none;background:transparent;cursor:pointer;font-size:15px;color:var(--muted);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background var(--anim),color var(--anim)}
.ing-del:hover{background:var(--red-lt);color:var(--red)}
.add-ing-row{display:flex;gap:6px;align-items:flex-start;margin-top:6px}
.add-ing-row .am-input{font-size:12px;padding:8px 10px}
.add-ing-row .ing-qty{font-size:12px;padding:8px 7px}
.add-ing-row .ing-unit{font-size:11px}
.btn-add-ing{flex-shrink:0;padding:8px 13px;border:none;border-radius:var(--r-md);background:var(--deep);color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;min-width:66px;transition:opacity var(--anim);min-height:38px}
.btn-add-ing:hover{opacity:.88}
.paste-hint{
  font-size:11px;color:var(--deep);background:rgba(46,26,71,.06);
  border:1px dashed rgba(46,26,71,.2);border-radius:8px;
  padding:7px 10px;margin:6px 0 8px;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:background .15s;
}
.paste-hint:hover{background:rgba(46,26,71,.1)}
.paste-hint-icon{font-size:14px;flex-shrink:0}
.paste-hint-text{flex:1}
.paste-hint-text b{display:block;font-weight:600;margin-bottom:1px}
.paste-hint-text span{opacity:.7;font-size:10px}

/* ── Servings ── */
.servings-row{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-md);padding:9px 13px}
.servings-lbl{font-size:12px;color:var(--ink2);font-weight:500;flex:1}
.sc-preset{padding:5px 9px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;transition:all var(--anim);min-height:30px}
.sc-preset:hover,.sc-preset.active{background:var(--deep-lt);color:var(--deep);border-color:var(--deep)}
.sc-btn{width:30px;height:30px;border:1.5px solid var(--border-hi);border-radius:var(--r-sm);background:var(--surface);font-size:16px;font-weight:600;color:var(--deep);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--anim)}
.sc-btn:hover{background:var(--deep);color:#fff;border-color:var(--deep)}
.sc-num-input{width:42px;text-align:center;border:1.5px solid var(--border-hi);border-radius:var(--r-sm);padding:4px 2px;font-size:14px;font-weight:700;color:var(--ink);outline:none;background:var(--surface)}
.sc-num-input:focus{border-color:var(--deep)}

/* ── Accordion ── */
.am-acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 0;cursor:pointer;border-top:1px solid var(--border);margin-top:6px;user-select:none}
.am-acc-title{font-size:12px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:6px}
.am-acc-opt{font-size:10px;color:var(--muted);font-weight:400}
.am-acc-icon{font-size:12px;color:var(--muted);transition:transform var(--anim)}
.am-acc-hdr[aria-expanded="true"] .am-acc-icon{transform:rotate(90deg)}
.am-acc-body{overflow:hidden;max-height:0;transition:max-height 200ms ease}
.am-acc-body.open{max-height:600px}
.am-acc-body .inner{padding-bottom:10px}

/* ── Footer ── */
.am-footer{flex-shrink:0;display:flex;gap:10px;padding:10px 20px 16px;border-top:1px solid rgba(122,90,174,.1);background:#fff;align-items:center}
.am-footer button{padding:13px;border-radius:100px;font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;transition:all var(--anim)}
.btn-save{background:var(--deep);color:#fff;border:none;box-shadow:0 3px 16px rgba(91,63,166,.38)}
.btn-save:hover{background:var(--deep-dk)}
.btn-cancel{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-cancel:hover{background:var(--deep-xl);color:var(--ink2)}

/* ── Undo bar ── */
.am-undo-bar{
  position:absolute;
  left:0;
  top:auto;
  right:auto;
  display:none;
  align-items:center;
  gap:6px;
  background:none;
  border:none;
  box-shadow:none;
  backdrop-filter:none;
  color:var(--muted);
  font-size:11px;
  padding:4px 0 0 0;
  border-radius:0;
  z-index:200;
  opacity:0;
  transform:translateY(-4px);
  transition:opacity .18s ease, transform .18s ease;
  white-space:nowrap;
  pointer-events:none;
}
.am-undo-bar.visible{
  display:flex;
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}}
.undo-btn{background:transparent;border:1px solid rgba(255,255,255,.35);color:var(--gold);font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--r-sm);cursor:pointer}

/* ── Lang row ── */




.nutri-cell{background:var(--surface);border-radius:var(--r-sm);padding:8px 10px;border:1px solid var(--border)}
.nutri-cell-lbl{font-size:9px;color:var(--muted);margin-bottom:2px}
.nutri-cell-val{font-size:14px;font-weight:700;color:var(--ink)}
.nutri-cell-unit{font-size:9px;color:var(--muted)}
.nutri-note{font-size:10px;color:var(--muted);font-style:italic;margin-bottom:7px}

/* ── Link/thumb ── */
.link-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.link-row:last-child{border-bottom:none}
.link-row a{color:var(--deep);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none}
.link-row a:hover{text-decoration:underline}
.thumb-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.thumb{width:58px;height:58px;border-radius:var(--r-sm);background:var(--deep-xl);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);position:relative;overflow:hidden}
.thumb-del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(192,57,43,.8);color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── Neue AC stilovi ─────────────────────────────────────────── */
.am-ac-group-hdr{padding:5px 14px 3px;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);pointer-events:none}
.am-ac-recent{opacity:.85}
.am-ac-recent:hover,.am-ac-recent[aria-selected="true"]{opacity:1}
.ac-recent-icon{font-size:12px;margin-right:4px;flex-shrink:0}
.am-ac-seasonal .ac-hint{color:var(--deep);font-size:9px}
.am-ac-ingmatch .ac-hint{color:var(--green);font-size:9px}
.ac-name-wrap{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-variant{font-size:10px;color:var(--muted);font-style:italic}
/* Voice btn */
#am-voice-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:none;background:transparent;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);transition:all var(--anim)}
#am-voice-btn:hover{background:var(--deep-lt);color:var(--deep)}
#am-voice-btn.active{background:var(--red-lt);color:var(--red);animation:pulse 1s infinite}
#am-voice-btn.hidden{display:none}
@keyframes pulse{0%,100%{transform:translateY(-50%) scale(1)}50%{transform:translateY(-50%) scale(1.15)}}
.am-ac-wrap{position:relative}
.undo-act-btn{
  background:none;
  border:none;
  color:var(--deep,#2E1A47);
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  padding:0;
  text-decoration:underline;
  text-underline-offset:2px;
  flex-shrink:0;
  opacity:.75;
  line-height:1;
}
.undo-act-btn:hover{opacity:1;color:var(--deep,#2E1A47);}
.am-hint-warn{color:var(--deep,#2E1A47) !important;font-weight:500;transition:color .2s}

/* ── Boje kategorija ─────────────────────────────────── */
:root{
  --cat-c1:#7C5CBF;--cat-c2:#E07070;--cat-c3:#4A9B6F;
  --cat-c4:#D4A017;--cat-c5:#4A7FB5;--cat-c6:#B06B9E;
  --cat-c7:#5B9EA0;--cat-c8:#A0522D;
}
.chip.has-color .chip__dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  margin-right:5px;flex-shrink:0;vertical-align:middle;
}
.chip .chip__dot{display:none}
.cat-color-picker{
  display:none;position:absolute;z-index:20;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);
  flex-wrap:wrap;gap:6px;width:144px;
}
.cat-color-picker.open{display:flex}
.cat-color-swatch{
  width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  transition:transform .15s,border-color .15s;
}
.cat-color-swatch:hover{transform:scale(1.2)}
.cat-color-swatch.active{border-color:var(--deep)}
.mc-tag.has-color::before{
  content:'';display:inline-block;width:6px;height:6px;
  border-radius:50%;margin-right:4px;vertical-align:middle;
  background:var(--tag-color,var(--deep));
}

/* ── Modal Tabovi ────────────────────────────────────── */
.am-tabs{display:flex;border-bottom:2px solid var(--border);margin:-8px -16px 16px;padding:0 16px;}
.am-tab{
  flex:1;padding:10px 4px;background:none;border:none;cursor:pointer;
  font-size:12px;font-weight:600;color:rgba(91,63,166,.55);letter-spacing:.1px;
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;
  text-transform:none;
}
.am-tab.active{color:var(--deep);border-bottom-color:var(--deep);}
.am-tab:not(.active):hover{color:rgba(91,63,166,.8);}
.am-tab-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:50%;background:var(--deep);
  color:#fff;font-size:9px;margin-left:4px;vertical-align:middle;
}
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:50%;background:var(--deep);
  color:#fff;font-size:9px;margin-left:4px;vertical-align:middle;
}
.am-tab-panel{display:none}
.am-tab-panel.active{display:block}

/* ── Filter jela po kategoriji ──────────────────────── */
.meals-filter{
  display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;
  padding:8px 16px;margin:-4px -16px 4px;
  scrollbar-width:none;-ms-overflow-style:none;
}
.meals-filter::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  background:var(--surface);border:1.5px solid var(--border);
  font-size:13px;font-weight:600;color:var(--muted);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.filter-chip.active{
  background:var(--deep);border-color:var(--deep);color:#fff;
}
.filter-chip.all-chip{font-weight:700}

/* ── Preset paketi ───────────────────────────────────── */
.preset-packs{margin-top:8px;}
.preset-packs-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.preset-pack-row{display:flex;gap:6px;flex-wrap:wrap;}
.preset-pack-btn{
  padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--surface);font-size:11px;font-weight:600;cursor:pointer;
  color:var(--ink2);transition:all .15s;white-space:nowrap;
}
.preset-pack-btn:hover{border-color:var(--deep);color:var(--deep);background:rgba(46,26,71,.05);}
.preset-pack-btn.applied{background:var(--deep);border-color:var(--deep);color:#fff;}

/* ── Najčešće korišćene ──────────────────────────────── */
.freq-cats-row{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;padding-bottom:8px;
  border-bottom:1px dashed var(--border);
}
.freq-cats-label{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--gold);
  text-transform:uppercase;margin-bottom:4px;}
.freq-cats-empty{display:none}

/* ── Auto-cat sugestije ──────────────────────────────── */
#am-autocat-suggest{display:none !important}
  display:none;align-items:center;gap:6px;flex-wrap:wrap;
  margin-top:6px;padding:6px 8px;background:rgba(201,169,110,.08);
  border:1px solid rgba(201,169,110,.25);border-radius:8px;
}
.autocat-lbl{font-size:10px;font-weight:700;color:var(--gold);white-space:nowrap}
.autocat-chip{
  padding:3px 8px;border-radius:12px;border:1.5px solid var(--gold);
  background:transparent;font-size:11px;color:var(--gold);cursor:pointer;
  font-weight:600;transition:all .15s;
}
.autocat-chip:hover{background:var(--gold);color:#fff;}

/* ── Brzi paketi na glavnom ekranu ──────────────────── */
#main-packs-wrap{padding:8px 0 4px;}
#main-packs-wrap .preset-packs-label{
  font-size:10px;font-weight:700;letter-spacing:.6px;
  text-transform:uppercase;color:var(--muted);
  padding:0 0 6px;display:block;
}
#main-packs-wrap .preset-pack-row{
  display:flex;gap:6px;flex-wrap:wrap;
}
#main-packs-wrap .preset-pack-btn{
  padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--surface);font-size:12px;font-weight:600;
  cursor:pointer;color:var(--ink2);transition:all .18s;
  white-space:nowrap;
}
#main-packs-wrap .preset-pack-btn:hover{
  border-color:var(--deep);color:var(--deep);
  background:rgba(46,26,71,.05);
}
#main-packs-wrap .preset-pack-btn.applied{
  background:var(--deep);border-color:var(--deep);color:#fff;
}

/* ── Smart paketi — grupe ─────────────────────────────── */
.packs-group{margin-bottom:10px}
.packs-group-label{
  font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:4px;
}
.packs-group-label::after{content:'';flex:1;height:1px;background:var(--border)}
.packs-group-row{display:flex;gap:6px;flex-wrap:wrap}

/* Lifestyle - nijansa: teal */
.pack-lifestyle{border-color:rgba(74,155,111,.4);color:#2d6e4e}
.pack-lifestyle:hover,.pack-lifestyle.applied{background:#4A9B6F;border-color:#4A9B6F;color:#fff}
/* Porodica - nijansa: warm purple */
.pack-family{border-color:rgba(176,107,158,.4);color:#7a3a6e}
.pack-family:hover,.pack-family.applied{background:#B06B9E;border-color:#B06B9E;color:#fff}
/* Period/sezona - nijansa: gold */
.pack-period{border-color:rgba(201,169,110,.4);color:#7a5c1e}
.pack-period:hover,.pack-period.applied{background:#C9A96E;border-color:#C9A96E;color:#fff}
/* Moji (iz freq) - nijansa: deep */
.pack-mine{border-color:rgba(46,26,71,.3);color:var(--deep)}
.pack-mine:hover,.pack-mine.applied{background:var(--deep);border-color:var(--deep);color:#fff}

/* ── Rename hint na custom chipovima ─────────────────── */
.chip[data-custom='1']:hover .chip__label::after{
  content:' ✏️';font-size:9px;opacity:.6;
}
.chip__rename-input{
  border:none;outline:none;background:transparent;
  font:inherit;width:80px;min-width:40px;max-width:140px;
  color:inherit;padding:0;
}
/* Selektovane custom — rename hint */
.chip.sel[data-custom='1'] .chip__label{cursor:text}

/* ── Extra categories — uniformni chip izgled ─────────── */
.ec-chip{
  padding:6px 12px;border-radius:22px;
  border:1.5px solid rgba(122,90,174,.22);
  background:white;font-size:12px;font-weight:500;
  color:var(--ink2);cursor:pointer;
  display:inline-flex;align-items:center;gap:5px;
  user-select:none;transition:all .15s;
}
.ec-chip:hover{border-color:var(--deep);color:var(--deep);}
.ec-chip.sel{
  background:var(--deep);border-color:var(--deep);
  color:#fff;font-weight:600;
}
.ec-chip .chip__label{pointer-events:none;font-size:12px;text-transform:capitalize;}
.ec-chip .chip__remove{
  appearance:none;border:0;background:transparent;
  pointer-events:auto;cursor:pointer;
  color:inherit;opacity:.75;font-size:14px;
  line-height:1;padding:0 1px;margin-left:1px;
  border-radius:50%;transition:opacity .15s;flex-shrink:0;
}
.ec-chip .chip__remove:hover{opacity:1;background:rgba(255,255,255,.2);}
/* Rename hint */
.ec-chip[data-custom='1']:hover .chip__label::after{
  content:' ✏️';font-size:9px;opacity:.5;
}

.ec-chip.ec-editing{background:#f5f2fb;border-color:var(--deep,#2E1A47);box-shadow:0 0 0 3px rgba(46,26,71,.15);cursor:default}
.ec-chip:not(.ec-editing){cursor:pointer}
.chip__rename-input{border:none;outline:none;background:transparent;font:500 12px inherit;color:var(--deep,#2E1A47);padding:0;caret-color:var(--deep,#2E1A47);min-width:40px;max-width:150px}

/* Subtle long-press indicator */
@keyframes longpressAnim {
  0%   { box-shadow: 0 0 0 0 rgba(75,45,138,.3); }
  100% { box-shadow: 0 0 0 6px rgba(75,45,138,.0); }
}
@media (prefers-reduced-motion: no-preference){
  .ec-chip:not(.ec-editing):active{
    animation: longpressAnim 450ms ease forwards;
  }
}

/* Razmak između buttona */
.ec-chip .chip__remove{margin-left:1px}

/* ══════════════════════════════════════════════════════════
   EXTRA KATEGORIJE — novi CSS
   ══════════════════════════════════════════════════════════ */
.ec-chips-area{
  display:flex;flex-wrap:wrap;gap:8px;list-style:none;padding:0;
}
/* Svaki chip: checkbox + label + edit + delete */
.ec-chip-wrap{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px 5px 7px;
  border-radius:20px;
  border:1.5px solid rgba(122,90,174,.25);
  background:#fff;
  font-size:12px;font-weight:500;color:var(--ink2,#4a3560);
  transition:border-color .13s, background .13s;
  cursor:default;
}
.ec-chip-wrap.ec-checked{
  background:var(--deep,#2E1A47);
  border-color:var(--deep,#2E1A47);
  color:#fff;
}
/* Checkbox dugme */
.ec-cb{
  width:16px;height:16px;min-width:16px;
  border-radius:4px;
  border:1.5px solid rgba(122,90,174,.4);
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:0;
  transition:background .12s, border-color .12s;
  color:var(--deep,#2E1A47);
}
.ec-chip-wrap.ec-checked .ec-cb{
  background:rgba(255,255,255,.25);
  border-color:rgba(255,255,255,.5);
  color:#fff;
}
.ec-cb:focus-visible{outline:2px solid var(--deep,#2E1A47);outline-offset:2px;}
/* Label */
.ec-lbl{pointer-events:auto;cursor:pointer;line-height:1.2;}
/* Edit dugme */
.ec-edit{
  appearance:none;border:0;background:transparent;
  cursor:pointer;padding:1px;
  color:inherit;opacity:0;
  border-radius:3px;
  display:flex;align-items:center;
  transition:opacity .12s;
  flex-shrink:0;
}
.ec-chip-wrap:hover .ec-edit{opacity:.55;}
.ec-edit:hover{opacity:1!important;background:rgba(122,90,174,.12);}
.ec-chip-wrap.ec-checked:hover .ec-edit{background:rgba(255,255,255,.15);}
.ec-edit:focus-visible{opacity:1;outline:2px solid currentColor;outline-offset:1px;}
/* Delete dugme */
.ec-del{
  appearance:none;border:0;background:transparent;
  cursor:pointer;padding:0 2px;
  color:inherit;opacity:.5;
  font-size:14px;line-height:1;
  border-radius:50%;
  transition:opacity .12s, background .12s;
  flex-shrink:0;
}
.ec-chip-wrap:hover .ec-del{opacity:.8;}
.ec-del:hover{opacity:1!important;background:rgba(192,57,43,.15);}
.ec-chip-wrap.ec-checked .ec-del:hover{background:rgba(255,255,255,.2);}
.ec-del:focus-visible{outline:2px solid currentColor;outline-offset:1px;}
/* Inline edit input */
.ec-inline-inp{
  border:none;border-bottom:1.5px solid var(--deep,#2E1A47);
  outline:none;background:transparent;
  font:500 12px inherit;color:inherit;
  padding:0 2px;width:80px;min-width:40px;max-width:140px;
}
/* "+ Dodaj" dugme */
.ec-add-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 14px;
  border:0.5px solid rgba(122,90,174,.25);
  border-radius:100px;
  background:transparent;
  font:400 11px inherit;color:#5A4B6A;
  cursor:pointer;
  transition:border-color .13s, color .13s, background .13s;
}
.ec-add-btn:hover{border-color:var(--deep);color:var(--deep);background:rgba(122,90,174,.05);}
/* Inline add row */
.ec-new-inp{
  border:0.5px solid rgba(122,90,174,.2);
  border-radius:8px;outline:none;
  padding:6px 10px;font:400 11px inherit;
  color:#2E1A47;background:#f8f6fc;
  width:140px;
}
.ec-new-inp:focus{border-color:var(--deep,#2E1A47);}
.ec-new-confirm{
  padding:6px 12px;border-radius:100px;
  background:var(--deep);color:#fff;
  border:none;font:500 11px inherit;cursor:pointer;
}
.ec-new-confirm:hover{opacity:.88;}
.ec-new-cancel{
  appearance:none;border:none;background:transparent;
  font-size:13px;cursor:pointer;color:var(--muted,#888);
  padding:2px 4px;border-radius:4px;
}
.ec-new-cancel:hover{color:var(--ink2,#4a3560);}

/* ── Inline add chip ────────────────────── */
.ec-chip-wrap.ec-adding{
  border-style:dashed;
  border-color:var(--deep,#2E1A47);
  background:#f5f2fb;
  padding:4px 8px;
}
.ec-inline-add{
  border:none;outline:none;background:transparent;
  font:500 12px inherit;color:var(--deep,#2E1A47);
  width:90px;min-width:50px;padding:0;
  caret-color:var(--deep,#2E1A47);
}

#am-extra-chips-container{position:relative;}

/* ── Meal type separator ── */
.meal-type-sep{
  width:100%;
  font-size:11px;
  color:var(--deep);
  padding:10px 0 5px 0;
  font-weight:500;
  display:block;
}

/* ── Test paneli — samo za dev, skriveni u produkciji ── */
#ux-smoke-fab, #ux-smoke-overlay,
#am-dev-fab, #am-dev-panel,
#ux-fab, #ux-overlay,
#elog-toggle-btn, #event-log-panel { display: none !important; }

/* ── Tab visibility by step ── */
.am-tab.step-locked{
  opacity:.38;
  transition:opacity .3s ease;
}
.am-tab.step-locked:not(.active){
  /* Klikabilni ali vizualno bljeđi */
}

/* ── P5: SVG ikonice u listi jela ── */
.mc-icon-wrap{
  width:36px;height:36px;flex-shrink:0;
  border-radius:10px;
  background:linear-gradient(135deg,var(--deep2),rgba(201,169,110,.1));
  border:1px solid rgba(122,90,174,.15);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.mc:hover .mc-icon-wrap{background:linear-gradient(135deg,rgba(122,90,174,.2),rgba(201,169,110,.15));}
.mc-icon-svg{width:20px;height:20px;flex-shrink:0;}

/* P6: Font +1px na kartici jela (accessibility 40+) */
.mc-nm{font-size:16px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.mc-tag{font-size:12px;font-weight:500;color:var(--deep);background:var(--deep2);border-radius:20px;padding:3px 10px}

/* P6: Modal body scroll — "Dalje" dugme uvijek vidljivo */
#am-body{
  flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
  padding:0 16px 8px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.am-footer{
  flex-shrink:0;
  position:sticky;
  bottom:0;
  z-index:10;
  background:var(--bg,#F4F0F8);
}

/* P6: Ingredient inputs font — čitljivije na 40+ */
.am-input{font-size:14px;}
.am-input.ing-name,.am-input.ing-qty,.am-input.ing-unit{font-size:13px;}
.am-label{font-size:11px;font-weight:700;letter-spacing:.5px;}
.am-hint{font-size:11px;}
@keyframes amShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.input-shake{animation:amShake .35s ease;border-color:var(--red,#D94F4F)!important;box-shadow:0 0 0 3px rgba(217,79,79,.15)!important;}

/* ── P3: Max-height Dodatnih kategorija ── */
#am-extra-chips-container{position:relative;max-height:120px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(122,90,174,.2) transparent;}
#am-extra-chips-container::-webkit-scrollbar{width:3px;}
#am-extra-chips-container::-webkit-scrollbar-thumb{background:rgba(122,90,174,.25);border-radius:3px;}

/* ── P1: AI slika prijedlog ── */
.am-img-suggest-badge{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(122,90,174,.82);
  color:#fff;font-size:8.5px;font-weight:600;
  text-align:center;padding:4px 6px;
  backdrop-filter:blur(4px);
  cursor:pointer;transition:background .15s;
}
.am-img-suggest-badge:hover{background:rgba(122,90,174,.95);}
.am-img-loading{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(244,240,248,.8);
}
.am-img-spinner{width:18px;height:18px;border:2.5px solid rgba(122,90,174,.2);border-top-color:var(--deep,#7A5AAE);border-radius:50%;animation:spin .7s linear infinite;}

/* ── Image section: lijevo drop-zona, desno ikona ── */
.am-image-section{
  display:grid;
  grid-template-columns:minmax(0,1fr) 130px;
  gap:12px;
  align-items:stretch;
  margin-bottom:4px;
}
@media(max-width:480px){
  .am-image-section{ grid-template-columns:1fr; }
  .am-image-right{ order:2; flex-direction:row; justify-content:center; }
  .am-image-left{ order:1; }
}

/* Lijeva kolona — drop zona */
.am-image-left{ width:100%; }
.am-dropzone{
  position:relative;
  width:100%;
  aspect-ratio:4/3;
  border-radius:12px;
  overflow:hidden;
  border:1.5px dashed var(--border,rgba(110,80,170,.25));
  background:var(--surface2,#F8F5FC);
  cursor:pointer;
  transition:border-color .2s, background .2s, box-shadow .2s;
  outline:none;
  display:flex;
  align-items:center;
  justify-content:center;
}
.am-dropzone:hover,
.am-dropzone:focus-visible{
  border-color:var(--deep,#7A5AAE);
  background:#F0EBF8;
  box-shadow:0 0 0 3px rgba(122,90,174,.12);
}
.am-dropzone.drag-over{
  border-color:var(--deep,#7A5AAE);
  background:#EAE3F5;
  box-shadow:0 0 0 4px rgba(122,90,174,.18);
}
.am-dropzone-placeholder{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  padding:12px;
  pointer-events:none;
}
.am-meal-placeholder-icon{
  width:44px;height:44px;opacity:.6;
}
.am-dropzone-hint{
  font-size:10px;
  color:var(--muted,#7B6E9A);
  text-align:center;
  line-height:1.4;
  font-weight:500;
}
.am-meal-img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

/* Desna kolona — uska ikona + akcije */
.am-image-right{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:8px 4px;
  border-radius:10px;
  background:var(--surface2,#F8F5FC);
  border:1px solid var(--border,rgba(110,80,170,.12));
}
.am-img-upload-btn{
  width:100%;
  padding:5px 4px;
  border:1px solid var(--border,rgba(110,80,170,.2));
  border-radius:8px;
  background:transparent;
  font-size:10px;
  color:var(--muted,#7B6E9A);
  cursor:pointer;
  transition:all .15s;
  text-align:center;
}
.am-img-upload-btn:hover{
  border-color:var(--deep,#7A5AAE);
  color:var(--deep,#7A5AAE);
  background:#F2EDF9;
}
.am-img-hint-txt{
  font-size:8px;
  color:var(--muted,#7B6E9A);
  text-align:center;
  line-height:1.4;
  opacity:.7;
}
/* ── Tab 1 dvostubni grid ─────────────────────────── */
.am-tab1-grid{
  position:relative;
  padding-right:120px;
}
.am-tab1-left{ min-width:0; }
.am-tab1-right{
  position:absolute;
  top:0;
  right:0;
  bottom:0;
  width:115px;
  transform:translateX(-75px);
}

/* ── Slika placeholder ───────────────────────────── */
.am-meal-img-wrap{
  width:100%;
  height:auto;
  min-height:80px;
  max-height:130px;
  aspect-ratio:1/1;
  border-radius:12px;
  overflow:hidden;
  border:1.5px dashed var(--border,rgba(110,80,170,.25));
  background:var(--surface2,#F8F5FC);
  cursor:pointer;
  transition:border-color .2s, background .2s;
  position:relative;
}
.am-meal-img-wrap:hover{
  border-color:var(--deep,#7A5AAE);
  background:#F2EDF9;
}
.am-meal-img-placeholder{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding:8px;
}
.am-meal-placeholder-icon{
  width:44px;
  height:44px;
  opacity:.65;
}
.am-meal-placeholder-txt{
  font-size:9px;
  color:var(--muted,#7B6E9A);
  text-align:center;
  line-height:1.3;
  font-weight:500;
  letter-spacing:.3px;
}
.am-meal-img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.am-img-actions{display:flex;flex-direction:column;gap:4px;margin-top:5px;}
.am-img-btn{width:100%;padding:4px 4px;border:1px solid var(--border,rgba(110,80,170,.2));border-radius:8px;background:transparent;font-size:9px;color:var(--muted,#7B6E9A);cursor:pointer;transition:all .15s;text-align:center;}
.am-img-btn:hover{border-color:var(--deep,#7A5AAE);color:var(--deep,#7A5AAE);background:#F2EDF9;}

/* ── 2026: X gore desno + FAB strelica ── */
.am-close-btn{
  position:absolute;top:14px;right:14px;width:30px;height:30px;
  border:none;background:rgba(110,80,170,.08);border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:18px;font-weight:300;transition:all .18s;z-index:10;
}
.am-close-btn:hover{background:rgba(110,80,170,.15);color:var(--deep);}
.am-fab-next{
  position:absolute;bottom:20px;right:20px;
  width:48px;height:48px;border-radius:50%;
  background:#fff;color:var(--deep,#7A5AAE);
  border:1.5px solid rgba(110,80,170,.2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(91,63,166,.14);
  font-size:20px;transition:all .2s cubic-bezier(.34,1.56,.64,1);z-index:20;
}
.am-fab-next:hover{transform:scale(1.08);border-color:var(--deep);}
.am-fab-next:active{transform:scale(.93);}

// ── Normalize ─────────────────────────────────────────────────────
function normalize(s){
  return s.toLowerCase().normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[čć]/g,'c').replace(/š/g,'s').replace(/ž/g,'z')
    .replace(/đ/g,'d').replace(/\s+/g,' ').trim();
}

// ── Trigrams ──────────────────────────────────────────────────────
function trigrams(s){
  const n='  '+normalize(s)+'  ';
  const r=new Set();
  for(let i=0;i<n.length-2;i++) r.add(n.slice(i,i+3));
  return r;
}
function trigramSim(ta,tb){
  let k=0; ta.forEach(t=>{if(tb.has(t))k++;});
  return k/(ta.size+tb.size-k+.001);
}

// ── Levenshtein ───────────────────────────────────────────────────
function levenshtein(a,b){
  if(Math.abs(a.length-b.length)>4) return 99;
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>
    Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

// ── Build index ───────────────────────────────────────────────────
const INDEX=[];
SEED_DATA.forEach(e=>e.names.forEach(name=>{
  INDEX.push({key:e.key,name,ings:e.ings,norm:normalize(name),tg:trigrams(name)});
}));

// ── Search ────────────────────────────────────────────────────────
function search(query,limit=7){
  if(!query||query.trim().length<2) return [];
  const q=normalize(query.trim());
  const qtg=trigrams(query.trim());
  const scored=INDEX.map(item=>{
    const n=item.norm;
    if(n===q||n.startsWith(q+' ')) return{...item,score:1.0};
    if(n.startsWith(q)) return{...item,score:.95};
    if(n.includes(q)) return{...item,score:.88};
    // prefix of query matches start of name
    if(q.length>=3&&n.startsWith(q.slice(0,3))) return{...item,score:.80};
    const tgSim=trigramSim(qtg,item.tg);
    const lev=q.length<=9?levenshtein(q,n.slice(0,Math.min(n.length,q.length+3))):99;
    const score=Math.max(tgSim,lev<=1?.75:lev<=2?.58:lev<=3?.40:0);
    return{...item,score};
  }).filter(r=>r.score>.12);
  scored.sort((a,b)=>b.score-a.score);
  const seen=new Set(),results=[];
  for(const r of scored){
    if(!seen.has(r.key)){
      seen.add(r.key);
      results.push({key:r.key,name:r.name,ings:r.ings,score:r.score,servings:r.servings||4});
    }
    if(results.length>=limit) break;
  }
  return results;
}

self.onmessage=({data})=>{
  if(data.type==='search') self.postMessage({type:'results',id:data.id,results:search(data.query)});
};

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════
// 1. OPEN FOOD FACTS — nutritivne vrijednosti sirovih namirnica
// ══════════════════════════════════════════════════════════════════
window.AM_OFF = {
  // Traži namirnicu po nazivu, vraća nutri na 100g
  async search(name) {
    if (!name || name.length < 2) return null;
    const q = encodeURIComponent(name.trim());
    try {
      const r = await fetch(
        `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${q}&search_simple=1&action=process&json=1&page_size=1&fields=product_name,nutriments`,
        { signal: AbortSignal.timeout(4000) }
      );
      if (!r.ok) return null;
      const d = await r.json();
      const p = d.products?.[0];
      if (!p?.nutriments) return null;
      const n = p.nutriments;
      return {
        source: 'off',
        name: p.product_name || name,
        per100g: {
          kcal:  Math.round(n['energy-kcal_100g'] || n['energy_100g'] / 4.184 || 0),
          prot:  Math.round((n.proteins_100g || 0) * 10) / 10,
          carb:  Math.round((n.carbohydrates_100g || 0) * 10) / 10,
          fat:   Math.round((n.fat_100g || 0) * 10) / 10,
          fiber: Math.round((n.fiber_100g || 0) * 10) / 10,
          sugar: Math.round((n.sugars_100g || 0) * 10) / 10,
          sodium:Math.round((n.sodium_100g || 0) * 1000) / 1000,
          sat:   Math.round((n['saturated-fat_100g'] || 0) * 10) / 10,
        }
      };
    } catch(e) { return null; }
  },

  // Izračunaj nutri za sve sastojke i vrati ukupno po porciji
  async computeForIngredients(ingredients, servings) {
    if (!ingredients?.length) return null;
    const totals = {kcal:0,prot:0,carb:0,fat:0,fiber:0,sugar:0,sodium:0,sat:0};
    let matched = 0;

    for (const ing of ingredients) {
      // Prvo provjeri lokalnu bazu (brže)
      const localKey = (typeof findNutriKey === 'function') ? findNutriKey(ing.name) : null;
      let per100g = null;

      if (localKey && typeof NUTRI_DB !== 'undefined') {
        per100g = NUTRI_DB[localKey];
      } else {
        // Fallback na Open Food Facts API
        const offResult = await this.search(ing.name);
        if (offResult) per100g = offResult.per100g;
      }

      if (!per100g) continue;
      matched++;

      const grams = (typeof unitToGrams === 'function')
        ? unitToGrams(ing.qty, ing.unit, ing.name)
        : (parseFloat(ing.qty) || 0);
      if (!grams) continue;

      const f = grams / 100;
      totals.kcal  += (per100g.kcal  || 0) * f;
      totals.prot  += (per100g.prot  || 0) * f;
      totals.carb  += (per100g.carb  || 0) * f;
      totals.fat   += (per100g.fat   || 0) * f;
      totals.fiber += (per100g.fiber || 0) * f;
      totals.sugar += (per100g.sugar || 0) * f;
      totals.sodium+= (per100g.sodium|| 0) * f;
      totals.sat   += (per100g.sat   || 0) * f;
    }

    if (!matched) return null;
    const s = servings || 4;
    return {
      kcal:  Math.round(totals.kcal / s),
      prot:  Math.round(totals.prot / s * 10) / 10,
      carb:  Math.round(totals.carb / s * 10) / 10,
      fat:   Math.round(totals.fat  / s * 10) / 10,
      fiber: Math.round(totals.fiber/ s * 10) / 10,
      sugar: Math.round(totals.sugar/ s * 10) / 10,
      sodium:Math.round(totals.sodium/s * 100)/ 100,
      sat:   Math.round(totals.sat  / s * 10) / 10,
    };
  }
};

// ══════════════════════════════════════════════════════════════════
// 2. THEMEALDB — slike i recepti internacionalnih jela
// ══════════════════════════════════════════════════════════════════
window.AM_MEALDB = {
  async search(name) {
    if (!name || name.length < 2) return null;
    const q = encodeURIComponent(name.trim()
      .replace(/[čć]/g,'c').replace(/š/g,'s')
      .replace(/ž/g,'z').replace(/đ/g,'d'));
    try {
      const r = await fetch(
        `https://www.themealdb.com/api/json/v1/1/search.php?s=${q}`,
        { signal: AbortSignal.timeout(4000) }
      );
      if (!r.ok) return null;
      const d = await r.json();
      const m = d.meals?.[0];
      if (!m) return null;
      return {
        name:         m.strMeal,
        image:        m.strMealThumb,
        category:     m.strCategory,
        area:         m.strArea,
        instructions: m.strInstructions,
        youtube:      m.strYoutube,
        ingredients:  this._parseIngredients(m),
      };
    } catch(e) { return null; }
  },

  _parseIngredients(m) {
    const ings = [];
    for (let i = 1; i <= 20; i++) {
      const name = m[`strIngredient${i}`]?.trim();
      const qty  = m[`strMeasure${i}`]?.trim();
      if (name) ings.push({ name, qty: qty || '' });
    }
    return ings;
  },

  // Predloži sliku jela iz MealDB
  async suggestImage(mealName) {
    const result = await this.search(mealName);
    if (!result?.image) return null;
    return result.image;
  }
};

window.AM_IDB = {
  _db: null,
  DB_NAME: 'amigella_images',
  DB_VERSION: 1,

  async open() {
    if (this._db) return this._db;
    return new Promise((res, rej) => {
      const req = indexedDB.open(this.DB_NAME, this.DB_VERSION);
      req.onupgradeneeded = e => {
        e.target.result.createObjectStore('images', { keyPath: 'id' });
      };
      req.onsuccess = e => { this._db = e.target.result; res(this._db); };
      req.onerror   = () => rej(req.error);
    });
  },

  async save(id, dataUrl) {
    try {
      const db = await this.open();
      return new Promise((res, rej) => {
        const tx  = db.transaction('images', 'readwrite');
        tx.objectStore('images').put({ id, dataUrl, ts: Date.now() });
        tx.oncomplete = () => res(true);
        tx.onerror    = () => rej(tx.error);
      });
    } catch(e) { return false; }
  },

  async load(id) {
    try {
      const db = await this.open();
      return new Promise((res) => {
        const tx  = db.transaction('images', 'readonly');
        const req = tx.objectStore('images').get(id);
        req.onsuccess = () => res(req.result?.dataUrl || null);
        req.onerror   = () => res(null);
      });
    } catch(e) { return null; }
  },

  async delete(id) {
    try {
      const db = await this.open();
      return new Promise((res) => {
        const tx = db.transaction('images', 'readwrite');
        tx.objectStore('images').delete(id);
        tx.oncomplete = () => res(true);
        tx.onerror    = () => res(false);
      });
    } catch(e) { return false; }
  },

  // Sačuvaj sve slike iz formState u IDB
  async syncPhotos(photos) {
    if (!photos?.length) return;
    for (const p of photos) {
      if (p.id && p.dataUrl) await this.save(p.id, p.dataUrl);
    }
  }
};

// ══════════════════════════════════════════════════════════════════
// 5. SPEECH RECOGNITION — glasovni unos sastojaka
//    "Dodaj dvjesto grama piletine" → {name:'piletina',qty:'200',unit:'g'}
// ══════════════════════════════════════════════════════════════════
window.AM_SPEECH = {
  _rec: null,
  _active: false,

  isSupported() {
    return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  },

  // Parsira izgovorenu frazu u sastojak
  parseIngredient(text) {
    const t = text.toLowerCase().trim();

    // Mapa brojeva na cifre
    const numMap = {
      'jedan':1,'jedna':1,'jedno':1,'two':2,'dva':2,'dvije':2,'tri':3,'četiri':4,
      'pet':5,'šest':6,'sedam':7,'osam':8,'devet':9,'deset':10,
      'pedeset':50,'sto':100,'dvjesto':200,'tristo':300,'četiristo':400,'petsto':500,
      'hiljadu':1000,'dvije stotine':200,'tri stotine':300,
      'one':1,'two':2,'three':3,'four':4,'five':5,'six':6,'seven':7,'eight':8,
      'nine':9,'ten':10,'fifty':50,'hundred':100,'two hundred':200,
    };

    // Mapa jedinica
    const unitMap = {
      'gram':'g','grama':'g','grame':'g','gramova':'g','g':'g',
      'kilogram':'kg','kilograma':'kg','kg':'kg','kilo':'kg',
      'mililitar':'ml','mililitara':'ml','ml':'ml',
      'litar':'l','litra':'l','litara':'l','l':'l',
      'komad':'kom','komada':'kom','kom':'kom','piece':'kom','pieces':'kom',
      'kašika':'kaš','kašike':'kaš','kašiku':'kaš','kaš':'kaš','tablespoon':'kaš',
      'kašičica':'kšč','kašičice':'kšč','kšč':'kšč','teaspoon':'kšč',
    };

    let qty = '', unit = 'g', name = t;

    // Pokušaj izvući broj + jedinicu + naziv
    // Pattern: (broj_riječima|broj) (jedinica) (naziv)
    const rx = /^(?:dodaj\s+)?(\d+(?:[.,]\d+)?|\w+)\s+(gram\w*|kilogram\w*|mililitar\w*|litar\w*|komad\w*|kašik\w*|kašičic\w*|kom|kg|ml|kaš|kšč|g|l)\s+(.+)$/i;
    const m = t.match(rx);
    if (m) {
      const rawQty  = m[1];
      const rawUnit = m[2].toLowerCase();
      name = m[3].replace(/^(od\s+)/, '').trim();
      qty  = numMap[rawQty] ? String(numMap[rawQty]) : rawQty.replace(',', '.');
      unit = unitMap[rawUnit] || 'g';
    } else {
      // Samo naziv bez količine
      name = t.replace(/^dodaj\s+/i, '').trim();
    }

    // Capitalize
    name = name.charAt(0).toUpperCase() + name.slice(1);
    return { name, qty, unit };
  },

  start(lang, onResult, onEnd) {
    if (!this.isSupported()) {
      if (typeof toast === 'function') toast('Glasovni unos nije podržan u ovom browseru.', 'error');
      return;
    }
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    this._rec = new SpeechRec();
    this._rec.lang = lang === 'sh' ? 'sr-RS' : (lang || 'sr-RS');
    this._rec.continuous = false;
    this._rec.interimResults = false;
    this._rec.maxAlternatives = 1;

    this._rec.onresult = e => {
      const transcript = e.results[0][0].transcript;
      const parsed = this.parseIngredient(transcript);
      if (onResult) onResult(parsed, transcript);
    };
    this._rec.onerror = e => {
      if (e.error !== 'no-speech' && typeof toast === 'function')
        toast('Greška glasovnog unosa: ' + e.error, 'error');
      if (onEnd) onEnd();
    };
    this._rec.onend = () => { this._active = false; if (onEnd) onEnd(); };

    this._rec.start();
    this._active = true;
  },

  stop() {
    if (this._rec) { this._rec.stop(); this._active = false; }
  }
};

// Glasovni unos za Moj recept — dodaje sastojak iz glasa
window.amVoiceAddIngredient = function() {
  const btn = document.getElementById('am-voice-ing-btn');
  if (AM_SPEECH._active) { AM_SPEECH.stop(); return; }

  const lang = (typeof getCurrentLang === 'function') ? getCurrentLang() : 'sh';

  AM_SPEECH.start(lang,
    (parsed, raw) => {
      if (!parsed.name) return;
      if (typeof formState !== 'undefined') {
        formState.ingredients.push({
          id: (typeof uid === 'function') ? uid() : Date.now(),
          name: parsed.name,
          qty:  parsed.qty,
          unit: parsed.unit,
          source: 'voice'
        });
        if (typeof renderIngList === 'function') renderIngList();
        if (typeof scheduleSaveDraft === 'function') scheduleSaveDraft();
        if (typeof toast === 'function') toast(`🎙️ Dodano: ${parsed.name} ${parsed.qty} ${parsed.unit}`);
      }
      if (btn) { btn.textContent = '🎙️'; btn.style.background = 'transparent'; }
    },
    () => {
      if (btn) { btn.textContent = '🎙️'; btn.style.background = 'transparent'; }
    }
  );

  if (btn) { btn.textContent = '⏹️'; btn.style.background = 'rgba(122,90,174,.15)'; }
};

// ══════════════════════════════════════════════════════════════════
// 6. CAMERA API — fotografiraj jelo direktno
// ══════════════════════════════════════════════════════════════════
window.AM_CAMERA = {
  isSupported() {
    return !!(navigator.mediaDevices?.getUserMedia);
  },

  // Otvori kameru i fotografiši — vraća dataUrl
  async capture() {
    if (!this.isSupported()) {
      // Fallback — file input sa capture atributom
      return new Promise((res) => {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'image/*';
        inp.setAttribute('capture', 'environment');
        inp.onchange = e => {
          const f = e.target.files?.[0];
          if (!f) { res(null); return; }
          const reader = new FileReader();
          reader.onload = ev => res(ev.target.result);
          reader.readAsDataURL(f);
        };
        inp.click();
      });
    }

    // Native kamera
    return new Promise((res) => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*';
      inp.setAttribute('capture', 'environment');
      inp.onchange = e => {
        const f = e.target.files?.[0];
        if (!f) { res(null); return; }
        const reader = new FileReader();
        reader.onload = ev => res(ev.target.result);
        reader.readAsDataURL(f);
      };
      inp.click();
    });
  }
};

// Dugme "Kamera" u Slike sekciji
window.amCapturePhoto = async function() {
  const dataUrl = await AM_CAMERA.capture();
  if (!dataUrl) return;
  if (typeof formState !== 'undefined') {
    const id = 'img_' + Date.now();
    formState.photos.push({ id, name: 'kamera_' + Date.now() + '.jpg', dataUrl });
    // Sačuvaj u IndexedDB
    AM_IDB.save(id, dataUrl);
    if (typeof renderImgGrid === 'function') renderImgGrid();
    if (typeof scheduleSaveDraft === 'function') scheduleSaveDraft();
  }
};

// ══════════════════════════════════════════════════════════════════
// INTEGRISANI NUTRI FLOW
// Redoslijed: lokalna baza → Open Food Facts API
// ══════════════════════════════════════════════════════════════════
window.AM_NUTRI = {
  async compute(ingredients, servings) {
    // 1. Pokušaj lokalnom bazom (instant)
    if (typeof computeNutriLocal === 'function') {
      computeNutriLocal();
      if (window.formState?.nutri) return window.formState.nutri;
    }
    // 2. Open Food Facts za neprepoznate sastojke
    const result = await AM_OFF.computeForIngredients(ingredients, servings);
    if (result) {
      if (window.formState) window.formState.nutri = result;
      if (typeof renderNutri === 'function') renderNutri();
      if (typeof scheduleSaveDraft === 'function') scheduleSaveDraft();
    }
    return result;
  }
};

<script>

// ── iOS Safari keyboard resize — visualViewport ─────────────
(function() {
  const vv = window.visualViewport;
  if (!vv || !document.getElementById('am-modal')) return;
  
  let _rafId = null;
  function onVVResize() {
    if (_rafId) cancelAnimationFrame(_rafId);
    _rafId = requestAnimationFrame(function() {
      const modal = document.getElementById('am-modal');
      const overlay = document.getElementById('am-overlay');
      if (!modal || !overlay) return;
      // Samo dok je modal vidljiv
      if (overlay.style.display === 'none') return;
      // Postavi visinu na vidljivi viewport (izbjegni keyboard overlap)
      const h = vv.height;
      modal.style.maxHeight = h + 'px';
      modal.style.height = h + 'px';
      qaLog && qaLog('VV_RESIZE', {h: Math.round(h)});
    });
  }
  
  vv.addEventListener('resize', onVVResize, {passive: true});
  vv.addEventListener('scroll', onVVResize, {passive: true});
  
  // Resetuj kad modal zatvori
  document.addEventListener('amigella:modal:close', function() {
    const modal = document.getElementById('am-modal');
    if (modal) { modal.style.maxHeight = ''; modal.style.height = ''; }
  });
})();


// ── IndexedDB unavailable fallback (Safari Private Mode) ────
(function() {
  let _idbChecked = false;
  function checkIDBAvailability() {
    if (_idbChecked) return;
    _idbChecked = true;
    try {
      const req = indexedDB.open('__idb_test__', 1);
      req.onerror = function() {
        // IndexedDB nije dostupan — obavijesti korisnica jednom
        if (!sessionStorage.getItem('_idb_warn')) {
          sessionStorage.setItem('_idb_warn', '1');
          setTimeout(function() {
            if(typeof toast === 'function') {
              toast('Privatni mod: podaci se čuvaju samo u ovoj sesiji.', 'info');
            }
          }, 2000);
        }
        qaLog && qaLog('IDB_UNAVAILABLE', {fallback: 'localStorage'});
      };
      req.onsuccess = function() {
        req.result.close();
        indexedDB.deleteDatabase('__idb_test__');
      };
    } catch(e) {
      qaLog && qaLog('IDB_ERROR', {msg: e.message});
    }
  }
  // Provjeri pri startu
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', checkIDBAvailability);
  } else {
    checkIDBAvailability();
  }
})();


// ── Camera permission error handling ────────────────────────
window._amHandleCamError = function(err) {
  if (!err) return;
  const msg = err.name === 'NotAllowedError' ? 'Kamera nije dozvoljena. Provjeri podešavanja.' :
              err.name === 'NotFoundError'   ? 'Kamera nije pronađena na uređaju.' :
              err.name === 'NotReadableError'? 'Kamera je u upotrebi drugom aplikacijom.' :
              'Kamera nije dostupna. Pokušaj ponovo.';
  if(typeof toast === 'function') toast(msg, 'error');
  qaLog && qaLog('CAM_ERROR', {name: err.name, msg: err.message?.slice(0,80)});
};

document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='hidden'){
    // Otkaži pending AI zahtjeve
    if(window._aiAbortController){window._aiAbortController.abort();window._aiAbortController=null;}
    if(window._amModalAbort){window._amModalAbort.abort();}
    qaLog && qaLog('VIS_HIDDEN', {ts: Date.now()});
  } else if(document.visibilityState==='visible'){
    // Resuming — refresh modal AbortController ako je modal otvoren
    qaLog && qaLog('VIS_VISIBLE', {ts: Date.now()});
    const overlay = document.getElementById('am-overlay');
    if(overlay && overlay.classList.contains('visible')){
      // Modal je otvoren — obnovi AbortController za nove zahtjeve
      window._amModalAbort = new AbortController();
      // Ako je AI signal bio otkazan — prikaži hint
      const aiWrap = document.getElementById('am-ai-wrap');
      if(aiWrap && aiWrap.innerHTML === ''){
        const hint = document.createElement('div');
        hint.style.cssText = 'font-size:12px;color:#7A5AAE;font-style:italic;padding:4px 0;text-align:center;';
        hint.textContent = 'Upiši naziv za AI prijedlog sastojaka';
        aiWrap.appendChild(hint);
        setTimeout(()=>{ if(aiWrap.contains(hint)) aiWrap.removeChild(hint); }, 4000);
      }
    }
  }
});
</script>

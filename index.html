// ── Normalize ────────────────────────────────────────────────────
function acNorm(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,' ').trim();}

// ── Smart casing ─────────────────────────────────────────────────
const _debounceAc=(fn,ms=120)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};};
function smartCaseStr(s){const lower=s.toLocaleLowerCase();const m=lower.match(/^(\s*)(\p{L})(.*)$/u);return m?m[1]+m[2].toLocaleUpperCase()+m[3]:lower;}
function smartCaseFirstWord(el){const v=el.value;const lower=v.toLocaleLowerCase();const m=lower.match(/^(\s*)(\p{L})(.*)$/u);const next=m?m[1]+m[2].toLocaleUpperCase()+m[3]:lower;const{selectionStart:ss,selectionEnd:se}=el;el.value=next;try{el.setSelectionRange(ss,se);}catch(_){}}

// ── Levenshtein ───────────────────────────────────────────────────
function levenshtein(a,b){if(Math.abs(a.length-b.length)>2)return 99;const m=a.length,n=b.length;const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}

// ── Trigrams ──────────────────────────────────────────────────────
function trigramSim(a,b){const tr=s=>{const p='  '+s+'  ';const t=new Set();for(let i=0;i<p.length-2;i++)t.add(p.slice(i,i+3));return t;};const ta=tr(a),tb=tr(b);let c=0;ta.forEach(g=>{if(tb.has(g))c++;});return c/(ta.size+tb.size-c||1);}

// ── Language detect ───────────────────────────────────────────────
function detectInputLang(q){if(/[а-яё]/i.test(q))return 'ru';if(/[čćžšđ]/i.test(q)||/\b(pire|punjene|sarma|gulaš|kaša)\b/i.test(q))return 'sh';if(/[äöüß]/i.test(q))return 'de';if(/[àâçéèêëîïôùûü]/i.test(q))return 'fr';if(/[ñáéíóú]/i.test(q))return 'es';return null;}

// ── Index build (lazy) ────────────────────────────────────────────
let _acIndex=null,_acIndexBuilt=false;
const _acUsage={};
function buildAcIndex(){if(_acIndexBuilt)return;_acIndexBuilt=true;_acIndex=[];DISH_SEED.forEach(d=>{Object.entries(d.names).forEach(([lang,names])=>{names.forEach(n=>{_acIndex.push({norm:acNorm(n),display:n,canonical:d.canonical,pop:d.pop||50,lang});});});});}

// ── Search ────────────────────────────────────────────────────────
function acSearch(rawQ){
  if(!_acIndex)buildAcIndex();
  const q=acNorm(rawQ);
  if(q.length<1)return[];
  const dl=detectInputLang(rawQ);
  const results=[];const seen=new Set();
  // Tokenize query for multi-word fuzzy
  const qTokens=q.split(' ').filter(Boolean);
  _acIndex.forEach(e=>{
    if(dl&&e.lang!==dl&&e.lang!=='sh')return;
    const n=e.norm;
    let score=0,type=0;
    if(n===q){score=100;type=0;}
    else if(n.startsWith(q)){score=90-(n.length-q.length)*0.5;type=1;}
    else if(n.includes(q)){score=75;type=2;}
    else if(q.length>=3){
      // Lev na prvim N+3 znakovima
      const lev=levenshtein(q,n.slice(0,Math.min(n.length,q.length+3)));
      if(lev<=2){score=62-lev*14;type=3;}
      else if(q.length>=4){
        // Trigram
        const sim=trigramSim(q,n);
        if(sim>0.42){score=Math.round(sim*55);type=4;}
        else {
          // Token-level match: "pire kormpir" → tokens "pire","kormpir"
          const nTokens=n.split(' ');
          let matchedTokens=0;
          qTokens.forEach(qt=>{
            if(nTokens.some(nt=>nt.startsWith(qt)||levenshtein(qt,nt)<=1))matchedTokens++;
          });
          if(matchedTokens===qTokens.length&&qTokens.length>=2){score=55;type=4;}
          else if(matchedTokens>=2&&qTokens.length>=3){score=35+matchedTokens*8;type=5;}
        }
      }
    }
    if(score>0&&!seen.has(e.canonical)){
      seen.add(e.canonical);
      results.push({...e,score:score+e.pop*0.1+(_acUsage[e.canonical]||0)*2,type});
    }
  });
  results.sort((a,b)=>a.type-b.type||b.score-a.score);
  return results.slice(0,6);
}

function openAcDb(){return new Promise((res,rej)=>{if(_acDb){res(_acDb);return;}const req=indexedDB.open(AC_DB,AC_VER);req.onupgradeneeded=e=>e.target.result.createObjectStore(AC_STORE,{keyPath:'key'});req.onsuccess=e=>{_acDb=e.target.result;res(_acDb);};req.onerror=()=>rej(req.error);});}

async function workerSearch(query) {

  if (typeof acSearch === 'function') {

// AUTOCOMPLETE — spec pattern
// openListbox / closeListbox / renderSuggestions / moveActive
// chooseSuggestion / acKeyNav
// ARIA: aria-expanded, am-opt-N id, role=option, aria-activedescendant
// ════════════════════════════════════════════════════════════════

let _acDebTimer     = null;
let lastSuggestions = []; // poslednji niz predloga za Enter lookup

// ── Open / Close ─────────────────────────────────────────────
function openListbox() {
  const { listbox, nameInput } = getEls();
  if (!listbox) return;
  listbox.hidden = false;
  if (nameInput) nameInput.setAttribute('aria-expanded', 'true');
}

function closeListbox() {
  const { listbox, nameInput } = getEls();
  if (!listbox) return; // modal nije otvoren — mirno izađi
  listbox.hidden = true;
  listbox.innerHTML = '';
  if (nameInput) {
    nameInput.setAttribute('aria-expanded', 'false');
    nameInput.removeAttribute('aria-activedescendant');
  }
  lastSuggestions = [];
}

function hideAc() { closeListbox(); }

// ── renderSuggestions(items) ─────────────────────────────────
// items: [{ key, name, ings, score }] max 6
function renderSuggestions(items) {
  const { listbox, nameInput } = getEls();
  if (!listbox) return; // modal nije u DOM-u
  listbox.innerHTML = '';
  lastSuggestions = items || [];

  if (!items || !items.length) { closeListbox(); return; }

  items.forEach((it, idx) => {
    const div = document.createElement('div');
    div.className = 'am-ac-item';
    div.id = 'am-opt-' + idx;
    div.setAttribute('role', 'option');
    div.setAttribute('aria-selected', idx === 0 ? 'true' : 'false');
    div.setAttribute('data-test', 'ac-item');

    const nameSp = document.createElement('span');
    nameSp.textContent = it.name;
    div.appendChild(nameSp);

    if (it.score != null) {
      const hint = document.createElement('span');
      hint.className = 'ac-hint';
      hint.setAttribute('aria-hidden', 'true');
      hint.textContent = Math.round(it.score * 100) + '%';
      div.appendChild(hint);
    }

    div.addEventListener('mousedown', ev => { ev.preventDefault(); });
    div.addEventListener('click', () => chooseSuggestion(it, div));
    listbox.appendChild(div);
  });

  const first = listbox.querySelector('[role="option"]');
  if (first && nameInput) nameInput.setAttribute('aria-activedescendant', first.id);
  openListbox();
}

// ── showAcSpinner ─────────────────────────────────────────────
function showAcSpinner() {
  const { listbox } = getEls();
  if (!listbox) return;
  listbox.innerHTML =
    '<div class="am-ac-item am-ai-spinner">' +
    '<div class="spinner-ring"></div>Tražim predloge…</div>';
  openListbox();
}

// ── chooseSuggestion(item, optEl) ─────────────────────────────
function chooseSuggestion(item, optEl) {
  const { nameInput } = getEls();
  const label = smartCase(item.name);
  if (nameInput) nameInput.value = label;
  formState.name = label;
  AM.name = label;
  closeListbox();
  _selectAcAndTriggerAI(item);
  saveDraft();
}

// ── moveActive(delta) ─────────────────────────────────────────
function moveActive(delta) {
  const { listbox, nameInput } = getEls();
  if (!listbox || listbox.hidden) return;
  const opts = [...listbox.querySelectorAll('[role="option"]')];
  if (!opts.length) return;
  let idx = opts.findIndex(o => o.getAttribute('aria-selected') === 'true');
  if (idx < 0) idx = 0;
  const next = Math.max(0, Math.min(opts.length - 1, idx + delta));
  if (next === idx) return;
  opts[idx].setAttribute('aria-selected', 'false');
  opts[next].setAttribute('aria-selected', 'true');
  if (nameInput) nameInput.setAttribute('aria-activedescendant', opts[next].id);
  const r = opts[next].getBoundingClientRect();
  const L = listbox.getBoundingClientRect();
  if (r.top < L.top || r.bottom > L.bottom) {
    opts[next].scrollIntoView({ block: 'nearest' });
  }
}

// ── acKeyNav ──────────────────────────────────────────────────
function acKeyNav(ev) {
  const { listbox } = getEls();
  if (ev.key === 'ArrowDown') {
    ev.preventDefault(); moveActive(1);
  } else if (ev.key === 'ArrowUp') {
    ev.preventDefault(); moveActive(-1);
  } else if (ev.key === 'Enter') {
    if (listbox && !listbox.hidden) {
      const active = listbox.querySelector('[role="option"][aria-selected="true"]');
      if (active) {
        ev.preventDefault();
        const idx  = Number(active.id.replace('am-opt-', '')) || 0;
        const item = lastSuggestions[idx];
        if (item) chooseSuggestion(item, active);
      }
    }
  } else if (ev.key === 'Escape') {
    if (listbox && !listbox.hidden) { closeListbox(); ev.preventDefault(); }
  }
}

function scheduleAcSearch(query) {
  clearTimeout(_acDebTimer);
  if (!query || query.trim().length < 2) { closeListbox(); return; }
  _acDebTimer = setTimeout(() => runAcSearch(query), 130);
}

async function runAcSearch(query) {
  if (!query || query.trim().length < 2) return;
  const fs = window._amI?.formState;
  if (!fs) return;
  if (fs.aiAccepted || fs.aiDismissed) return;

  // Pokazi autocomplete predloge iz seed-a (brzo, lokalno)
  if (window._amI) {
    window._amI.showAcSpinner();
    const seedResults = await window._amI.workerSearch(query);
    window._amI.renderSuggestions(seedResults);
  }

  // Pokeni Claude AI za sastojke (pravi AI)
  fs._aiStartTime = Date.now();
  amStartAiSlowTimer();

  try {
    // Pokušaj Claude API
    // Rate limit provjera
    const _nameLen = (query||'').length;
    if (!_aiRateCheck(200 + _nameLen * 2 + 400)) { amClearAiSlowTimer(); return; }
    const claudeIngs = await fetchAiIngredients(query);
    amClearAiSlowTimer();

    if (claudeIngs && claudeIngs.length > 0) {
      // Formatiraj kao searchResult koji triggerAiSuggestion očekuje
      const result = {
        canonical: query,
        score: claudeIngs[0]?.confidence || 0.9,
        ings: claudeIngs.map(i => i.name),
        _ings_full: claudeIngs,
        _source: 'claude'
      };
      window._amI?.triggerAiSuggestion(result);
      amTelEvent('ttfap', { ms: Date.now() - fs._aiStartTime });
      return;
    }
  } catch (e) {
    console.warn('[AI] Claude API nije dostupan (CORS/network), koristim seed:', e.message);
    amClearAiSlowTimer();
  }

  // ── Korak 4: "Pomozi mi" modal — ni AI ni seed ne znaju ──
  if (window._amI) {
    const seedResults = await window._amI.workerSearch(query);
    if (seedResults.length) {
      window._amI.triggerAiSuggestion(seedResults[0]);
    } else {
      window._amI.hideAiBox();
      // Pokaži "Pomozi mi" modal tek nakon 1s da ne zbunjuje
      if (query.trim().length > 2) {
        setTimeout(() => {
          // Samo ako korisnica još uvijek nije dodala sastojke
          const f = window._amI?.formState;
          if (f && !f.aiAccepted && !f.ingredients?.length) {
            amShowHelpMeModal(query);
          }
        }, 1000);
      }
    }
  }
}

function getAISuggestion(name, cb) {
  const rawName = name.toLowerCase().trim();

  // Helper: normalizuj za poređenje (ukloni dijakritike)
  const norm = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[čć]/g,'c').replace(/[šđ]/g,'s').replace(/[žz]/g,'z').trim();

  const normName = norm(rawName);

  // Layer 1: direktan hit (tačno ime ili alias)
  let entry = SEED_DB[rawName];
  if (!entry) {
    // Pokušaj case-insensitive
    const k = Object.keys(SEED_DB).find(k => k.toLowerCase() === rawName);
    if (k) entry = SEED_DB[k];
  }
  if (entry && entry.key) {
    // alias → dohvati canonical
    const canon = SEED_DB[entry.key] || entry;
    entry = canon;
  }
  if (entry && entry.ings && entry.confidence >= 0.7) {
    setTimeout(() => cb({ ings: entry.ings, nutri: entry.nutri, defaultServings: entry.defaultServings||4, confidence: entry.confidence, source: 'seed' }), 60 + Math.random()*60);
    return;
  }

  // Layer 2: fuzzy match po normalizovanom imenu
  const keys = Object.keys(SEED_DB);
  let bestKey = null, bestScore = 0;
  for (const k of keys) {
    const nk = norm(k);
    let score = 0;
    if (nk === normName) { score = 1.0; }
    else if (nk.startsWith(normName) || normName.startsWith(nk)) { score = 0.9; }
    else if (nk.includes(normName) || normName.includes(nk)) { score = 0.75; }
    else {
      // Levenshtein approx
      const minLen = Math.min(nk.length, normName.length);
      if (minLen >= 3) {
        let common = 0;
        for (let i = 0; i < Math.min(4, minLen); i++) if (nk[i] === normName[i]) common++;
        score = common / 4 * 0.6;
      }
    }
    if (score > bestScore) { bestScore = score; bestKey = k; }
  }

  if (bestKey && bestScore >= 0.6) {
    let e = SEED_DB[bestKey];
    if (e && e.key) e = SEED_DB[e.key] || e;
    if (e && e.ings) {
      setTimeout(() => cb({ ings: e.ings, nutri: e.nutri, defaultServings: e.defaultServings||4, confidence: bestScore * 0.9, source: 'fuzzy' }), 100 + Math.random()*100);
      return;
    }
  }

  // Layer 3: DISH_SEED fallback (AC seed)
  if (typeof DISH_SEED !== 'undefined') {
    const dishMatch = DISH_SEED.find(d => {
      const allNames = Object.values(d.names).flat();
      return allNames.some(n => {
        const nn = norm(n);
        return nn === normName || nn.startsWith(normName) || normName.startsWith(nn);
      });
    });
    if (dishMatch && dishMatch.ings && dishMatch.ings.length) {
      const ings = dishMatch.ings.map(i => typeof i === 'string'
        ? {n:i,a:null,u:''}
        : {n:i.n||i.name||i,a:i.a||i.amount||null,u:i.u||i.unit||''});
      setTimeout(() => cb({ ings, nutri: null, defaultServings: 4, confidence: 0.70, source: 'dish_seed' }), 150 + Math.random()*100);
      return;

// SMART INGREDIENTS PARSER
// ══════════════════════════════════════════════════════════════
const EA={'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};
function toWD(s){return s.replace(/[٠-٩]/g,d=>EA[d]||d)}
function normDC(s){return s.replace(/(\d),(\d)/g,'$1.$2')}
function sdl(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()}
function frac2d(s){
  const vf={'¼':0.25,'½':0.5,'¾':0.75,'⅓':0.333,'⅔':0.667};
  let t=s;for(const[f,v] of Object.entries(vf))t=t.replace(f,String(v));
  t=t.replace(/(\d+)\s+(\d+)\s*\/\s*(\d+)/g,(_,w,n,d)=>String(Number(w)+Number(n)/Number(d)));
  t=t.replace(/(\d+)\s*\/\s*(\d+)/g,(_,n,d)=>String(Number(n)/Number(d)));
  return t;
}
const SRG={'mleka':'mleko','mlijeka':'mleko','mlijeko':'mleko','brasna':'brasno','ulja':'ulje','jaja':'jaje','soli':'so','krumpira':'krompir','krompira':'krompir','paradajza':'paradajz','piletine':'piletina','secera':'secer'};
function srGM(t){const l=sdl(t);return SRG[l]||l}
function lcupML(loc){return loc&&loc.startsWith('ru')?250:240}
function isLU(r){return r.split('').filter(c=>'aeiou'.includes(c)).length<=1}
const UA={g:'g',kg:'kg',ml:'ml',l:'l',pcs:'pcs',tbsp:'tbsp',tsp:'tsp',cup:'cup',gram:'g',grama:'g',kilogram:'kg',kilograma:'kg',mililitar:'ml',litar:'l',kasika:'tbsp',kasike:'tbsp',kasicica:'tsp',kasicice:'tsp',solja:'cup',solje:'cup',kom:'pcs',komad:'pcs',komada:'pcs',essloffel:'tbsp',teeloffel:'tsp',xicara:'cup',stakan:'cup',bardak:'cup'};
const OUTDIM={g:'mass',kg:'mass',ml:'volume',l:'volume',tbsp:'volume',tsp:'volume',cup:'volume',pcs:'count'};
const UML={g:1,kg:1000,ml:1,l:1000,tbsp:15,tsp:5,cup:240,pcs:1};
const CTBL=new Set(['jaje','paradajz','paprika','banana','jabuka','limun','luk']);

function parseIngredient(text,locale){
  const flags=[];
  let t=toWD(text.trim());t=normDC(t);t=frac2d(t);
  t=t.replace(/(\d)(ml|l|g|kg|tbsp|tsp|cup|kom|pcs)/gi,'$1 $2');
  const tokens=t.split(/\s+/);let amount=null,unit=null;const np=[];
  for(const tok of tokens){
    if(!tok)continue;
    const raw=sdl(tok).replace(/[^a-z0-9./%-]/g,'');
    if(!raw||raw==='-')continue;
    if(amount===null&&!raw.includes('%')){const v=parseFloat(raw.replace(',','.'));if(!isNaN(v)&&v>0){amount=Math.round(v*10000)/10000;continue}}
    if(unit===null){
      const cr=raw.replace('%','');
      if(cr==='stakan'&&locale){const ml=lcupML(locale);if(amount!==null)amount=Math.round(amount*ml*10000)/10000;unit='ml';continue}
      const m=UA[cr]??null;
      if(m){if(m==='cup'&&locale&&amount!==null){const ml=lcupML(locale);if(ml!==240){amount=Math.round(amount*ml*10000)/10000;unit='ml';}else unit='cup';}else unit=m;continue}
      if(amount!==null&&np.length===0&&raw.length<=6&&!raw.includes('%')&&isLU(cr)){flags.push('UNKNOWN_UNIT');continue}
    }
    if(/^\d+\.?\d*%$/.test(tok))continue;
    np.push(srGM(tok));
  }
  const nm=np.length>0?np.join(' ').trim():sdl(t.trim());
  if(amount!==null&&unit===null){for(const c of CTBL){if(nm.toLowerCase().includes(c)){unit='pcs';break}}}
  if(amount===null&&unit===null)flags.push('INDETERMINATE');
  if(amount!==null&&unit!==null){const dim=OUTDIM[unit];const base=amount*(UML[unit]??1);const thr={mass:5000,volume:4000,count:200}[dim];if(thr!==undefined&&base>thr)flags.push('OUTLIER')}
  return{parsed_name:nm,parsed_amount:amount,parsed_unit_code:unit,flags};
}
function _legacyNormalizeUnit(amount,unit,locale){
  const f=unit==='cup'?lcupML(locale):(UML[unit]??1);
  const b=unit==='g'||unit==='kg'?'g':unit==='pcs'?'pcs':'ml';
  return{canonical_amount:Math.round(amount*f*10000)/10000,canonical_unit:b};
}
function dimGuard(uA,uB){
  const da=OUTDIM[uA],db=OUTDIM[uB];
  if(!da||!db)return false;
  if(da==='count'||da==='other'||db==='count'||db==='other')return true;
  return da===db;
}

function upsertShop(params){
  const{userId,mId,iId,cid,unit,amount,src,isIndet}=params;
  const rid=makeRID(userId,mId,iId,getWK(),'ADD');
  if(S.authPaused){toast(t('add_meal')+' — '+t('save'));setSyncBar('auth','Prijavi se da nastaviš.');logEvent('auth.paused',{});return{status:'paused_auth'}}
  if(S.offline){S.queueCnt++;setSyncBar('pend',`Čeka mrežu… (${S.queueCnt})`);logEvent('queue.enqueue',{rid,opType:'ADD_SHOP'});
    setTimeout(()=>{S.queueCnt=Math.max(0,S.queueCnt-1);S.shopping.push({id:S.shopId++,cid,unit,amount:isIndet?null:amount,src,isIndet,rid});save();if(S.queueCnt===0)setSyncBar('ok','Sinhronizovano ✓');logEvent('sync.completed',{rid});renderShopPrev()},1200+Math.random()*1000);
    return{status:'queued'}}
  if(!notDup(userId,rid)){toast('Već na listi ✓');return{status:'duplicate'}}
  if(!isIndet){const ex=S.shopping.find(s=>s.cid===cid&&!s.isIndet&&s.unit!==unit);if(ex&&!dimGuard(ex.unit,unit)){toast('Proveri jedinice — ne mogu se spojiti.');return{status:'dim_err'}}}
  if(isIndet){const ex=S.shopping.find(s=>s.cid===cid&&s.isIndet);if(ex){ex.src+=', '+src;save();toast(`${cid} (proveri)`);renderShopPrev();return{status:'merged_indet'}}}
  const norm=!isIndet&&amount?normalizeUnit(amount,unit,LANG):{canonical_amount:amount,canonical_unit:unit};
  const ex=!isIndet&&S.shopping.find(s=>s.cid===cid&&!s.isIndet&&s.unit===norm.canonical_unit);
  if(ex){const exN=normalizeUnit(ex.amount||0,ex.unit,LANG);ex.amount=norm.canonical_amount+(exN.canonical_amount||0);ex.unit=norm.canonical_unit;ex.src+=', '+src;save();toast(`${cid}: ${ex.amount}${ex.unit} ✓`);logEvent('shopping.merge_hit',{cid});renderShopPrev();return{status:'merged'}}
  S.shopping.push({id:S.shopId++,cid,unit:norm.canonical_unit,amount:norm.canonical_amount,src,isIndet,rid});
  save();logEvent('ingredient.parse_success',{cid,unit,amount});renderShopPrev();
  return{status:'ok'};
}

// Normalize + trigram + levenshtein (inline, bez Worker)
const _amNorm = s => s.toLowerCase().normalize('NFD')
  .replace(/[\u0300-\u036f]/g,'').replace(/[čć]/g,'c')
  .replace(/š/g,'s').replace(/ž/g,'z').replace(/đ/g,'d')
  .replace(/\s+/g,' ').trim();
const _amTrigrams = s => {
  const n='  '+_amNorm(s)+'  '; const r=new Set();
  for(let i=0;i<n.length-2;i++) r.add(n.slice(i,i+3)); return r;
};
const _amTgSim = (a,b) => { let k=0; a.forEach(t=>{if(b.has(t))k++;}); return k/(a.size+b.size-k+.001); };
const _amLev = (a,b) => {
  if(Math.abs(a.length-b.length)>4) return 99;
  const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
};

// Izgradi inline index
const _amIndex = [];
SEED_DATA.forEach(e=>e.names.forEach(name=>{
  _amIndex.push({key:e.key, name, ings:e.ings, servings:e.servings||4, norm:_amNorm(name), tg:_amTrigrams(name)});
}));

// Sync search fn (zamjena za async workerSearch)
function workerSearch(query){
  return new Promise(resolve=>{
    if(!query||query.trim().length<2){resolve([]);return;}
    const q=_amNorm(query.trim());
    const qtg=_amTrigrams(query.trim());
    const scored=_amIndex.map(item=>{
      const n=item.norm;
      if(n===q||n.startsWith(q+' ')) return{...item,score:1.0};
      if(n.startsWith(q)) return{...item,score:.95};
      if(n.includes(q)) return{...item,score:.88};
      if(q.length>=3&&n.startsWith(q.slice(0,3))) return{...item,score:.80};
      const tgSim=_amTgSim(qtg,item.tg);
      const lev=q.length<=9?_amLev(q,n.slice(0,Math.min(n.length,q.length+3))):99;
      const score=Math.max(tgSim,lev<=1?.75:lev<=2?.58:lev<=3?.40:0);
      return{...item,score};
    }).filter(r=>r.score>.15);
    scored.sort((a,b)=>b.score-a.score);
    const seen=new Set(),results=[];
    for(const r of scored){
      if(!seen.has(r.key)){seen.add(r.key);results.push({key:r.key,name:r.name,ings:r.ings,score:r.score,servings:r.servings||4});}
      if(results.length>=7) break;
    }
    // Sync — resolvi odmah (nema čekanja)
    resolve(results);
  });
}

let _voiceRecognition = null;
let _voiceActive = false;

function initVoiceInput() {
  const SpeechRec = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRec) return false;
  _voiceRecognition = new SpeechRec();
  _voiceRecognition.continuous = false;
  _voiceRecognition.interimResults = false;
  _voiceRecognition.lang = _voiceLangMap[window._amModalLang || 'SH'] || 'bs-BA';
  _voiceRecognition.onresult = (ev) => {
    const transcript = ev.results[0][0].transcript;
    const { nameInput } = getEls();
    if(nameInput) {
      // Koristi točno ono što je korisnica rekla — ne tražimo u bazi
      const spokenName = transcript.trim();
      nameInput.value = spokenName.charAt(0).toUpperCase() + spokenName.slice(1);
      formState.name = nameInput.value;
      // Pokaži prijedloge ali NE mijenjaj naziv
      scheduleAcSearch(nameInput.value);
      scheduleSaveDraft();
    }
    stopVoice();
  };
  _voiceRecognition.onerror = () => stopVoice();
  _voiceRecognition.onend = () => stopVoice();
  return true;
}

const _voiceLangMap = {
  SH:'bs-BA', EN:'en-US', DE:'de-DE', FR:'fr-FR', IT:'it-IT', RU:'ru-RU', ES:'es-ES'
};

window.toggleVoice = function toggleVoice() {
  if(_voiceActive) { stopVoice(); return; }
  const ok = _voiceRecognition ? true : initVoiceInput();
  if(!ok) { ariaAnnounce('Glasovni unos nije podržan u ovom pregledaču.'); return; }
  _voiceActive = true;
  _voiceRecognition.lang = _voiceLangMap[window._amModalLang || 'SH'] || 'bs-BA';
  _voiceRecognition.start();
  const btn = document.getElementById('am-voice-btn');
  if(btn) { btn.classList.add('active'); btn.setAttribute('aria-label', 'Zaustavi glasovni unos'); }
  ariaAnnounce('Slušam...');
}

function stopVoice() {
  _voiceActive = false;
  if(_voiceRecognition) { try { _voiceRecognition.stop(); } catch(_) {} }
  const btn = document.getElementById('am-voice-btn');
  if(btn) { btn.classList.remove('active'); btn.setAttribute('aria-label', 'Unesi glasom'); }
}

function voiceSupported() {
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

// Trigger: query počinje sa "imam " ili "@"
// Npr: "imam krompir" → musaka, pire krompir, gulaš
function ingredientSearch(query) {
  const q = query.replace(/^(imam|@)\s*/i, '').trim().toLowerCase();
  if(q.length < 2) return [];
  const qNorm = _amNorm(q);
  const results = [];
  const seen = new Set();
  SEED_DATA.forEach(entry => {
    if(seen.has(entry.key)) return;
    const match = entry.ings.some(ing => {
      const ingNorm = _amNorm(ing);
      return ingNorm.includes(qNorm) || qNorm.includes(ingNorm) ||
        _amLev(qNorm, ingNorm.slice(0, Math.min(ingNorm.length, qNorm.length+2))) <= 1;
    });
    if(match) {
      seen.add(entry.key);
      // Uzmi prvo SH ime
      const name = entry.names.find(n => /[čćšžđ]|[a-z]/i.test(n)) || entry.names[0];
      results.push({ key: entry.key, name, ings: entry.ings, score: 0.9,
        servings: entry.servings, _ingMatch: true });
    }
  });
  return results.slice(0, 6);
}

function isIngredientQuery(query) {
  return /^(imam\s+|@)\S/i.test(query.trim());
}

function getCurrentSeason() {
  const m = new Date().getMonth(); // 0-11
  if(m >= 2 && m <= 4) return 'spring';
  if(m >= 5 && m <= 7) return 'summer';
  if(m >= 8 && m <= 10) return 'autumn';
  return 'winter';
}

const SEASONAL_KEYS = {
  winter: ['sarma','musaka','pasulj','gulas','pileca_corba','prebranac','podvarak','gibanica'],
  spring: ['palacinka','cezar_salata','proja','ovsena_kasa','kajgana','pizza_margarita'],
  summer: ['cezar_salata','pizza_margarita','hamburger','palacinka','proja','tiramisu'],
  autumn: ['musaka','pasulj','gulas','sarma','gibanica','baklava','pileca_corba'],
};

const SEASON_LABELS = {
  winter: '❄️ Zimsko jelo', spring: '🌸 Proljetno', 
  summer: '☀️ Ljetno', autumn: '🍂 Jesensko'
};

function getSeasonalSuggestions() {
  const season = getCurrentSeason();
  const keys = SEASONAL_KEYS[season] || [];
  return keys.slice(0, 5).map(key => {
    const entry = SEED_DATA.find(e => e.key === key);
    if(!entry) return null;
    const name = entry.names[0];
    return { key, name, ings: entry.ings, score: 0.85,
      servings: entry.servings, _seasonal: season };
  }).filter(Boolean);
}

// Prepoznaje unos u zagradama kao varijantu: "Pasta (bez jaja)"
function parseVariant(name) {
  const m = name.match(/^([^(]+?)\s*\(([^)]+)\)\s*$/);
  if(m) return { base: m[1].trim(), variant: m[2].trim() };
  return { base: name, variant: null };
}

function formatVariantHint(name) {
  const { base, variant } = parseVariant(name);
  if(!variant) return null;
  return variant;
}

function applyPresetPack(pack){
  pack.cats.forEach(key=>{
    formState.categories.add(key);
    if(pack.labels&&pack.labels[key]) formState.catLabels[key]=pack.labels[key];
  });
  scheduleSaveDraft();renderExtraChips();
  ariaAnnounce(pack.label+' paket dodan');
}
function removePresetPack(pack){
  pack.cats.forEach(key=>{
    // Ukloni samo kategorije koje su ISKLJUČIVO iz ovog paketa
    // (ne diraj ako ih drugi paket dijeli, ali jednostavnost > preciznost)
    formState.categories.delete(key);
  });
  scheduleSaveDraft();renderExtraChips();
  ariaAnnounce(pack.label+' paket uklonjen');
}

function renderPresetPacks(container){
  if(!container)return;
  const existing=container.querySelector('.preset-packs');
  if(existing)existing.remove();
  const wrap=document.createElement('div');wrap.className='preset-packs';
  const lbl=document.createElement('div');lbl.className='preset-packs-label';lbl.textContent='Brzi paketi';
  wrap.appendChild(lbl);
  const row=document.createElement('div');row.className='preset-pack-row';
  CATEGORY_PACKS.forEach(pack=>{
    const btn=document.createElement('button');btn.type='button';btn.className='preset-pack-btn';
    // Provjeri je li paket već primjenjen
    const applied=pack.cats.every(k=>formState.categories.has(k));
    if(applied){btn.classList.add('applied');btn.textContent='✓ '+pack.label;}
    else{btn.textContent=pack.label;}
    btn.addEventListener('click',()=>{
      const isApplied=pack.cats.every(k=>formState.categories.has(k));
      if(isApplied){
        removePresetPack(pack);
        btn.classList.remove('applied');
        btn.textContent=pack.label;
      } else {
        applyPresetPack(pack);
        btn.classList.add('applied');
        btn.textContent='✓ '+pack.label;
      }
    });
    row.appendChild(btn);
  });
  wrap.appendChild(row);container.appendChild(wrap);
}

const FREQ_KEY = 'amigella_cat_freq';
const MAX_FREQ_SHOW = 3;

function getCatFreq(){
  try{ return JSON.parse(localStorage.getItem(FREQ_KEY)||'{}'); }catch(_){return {};}
}
function bumpCatFreq(cats){
  const freq=getCatFreq();
  (cats||[]).forEach(k=>{ freq[k]=(freq[k]||0)+1; });
  localStorage.setItem(FREQ_KEY,JSON.stringify(freq));
}
function getTopCats(n){
  const freq=getCatFreq();
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,n).map(e=>e[0]);
}

function renderFreqCats(container){
  if(!container)return;
  const existing=container.querySelector('.freq-cats-wrap');
  if(existing)existing.remove();
  const top=getTopCats(MAX_FREQ_SHOW);
  if(!top.length)return;
  const wrap=document.createElement('div');wrap.className='freq-cats-wrap';
  const lbl=document.createElement('div');lbl.className='freq-cats-label';
  lbl.textContent='⭐ Najčešće';wrap.appendChild(lbl);
  const row=document.createElement('div');row.className='freq-cats-row';
  top.forEach(key=>{
    const label=formState.catLabels[key]||
      PRESET_CATS.find(p=>p.key===key)?.label||key;
    const isSel=formState.categories.has(key);
    const li=createChipEl(label,key,false,isSel,{'data-freq':'1'});
    applyChipColor(li,key);
    li.addEventListener('click',()=>{
      if(formState.categories.has(key))formState.categories.delete(key);
      else formState.categories.add(key);
      scheduleSaveDraft();renderExtraChips();
    });
    row.appendChild(li);
  });
  wrap.appendChild(row);
  container.insertBefore(wrap,container.firstChild);
}

function suggestCatsForName(name){
  if(!name||name.length<3)return[];
  const lower=name.toLowerCase();
  const suggested=new Set();
  AUTO_CAT_RULES.forEach(rule=>{
    if(rule.words.some(w=>lower.includes(w))){
      rule.cats.forEach(c=>suggested.add(c));
    }
  });
  // Ne predlažemo već odabrane
  return [...suggested].filter(c=>!formState.categories.has(c)).slice(0,3);
}

function renderAutoCatSuggestions(name){
  const container=document.getElementById('am-autocat-suggest');
  if(!container)return;
  const cats=suggestCatsForName(name);
  if(!cats.length){container.style.display='none';return;}
  container.style.display='flex';
  container.innerHTML='<span class="autocat-lbl">🤖 Predlog:</span>';
  cats.forEach(key=>{
    const label=AUTO_CAT_LABELS[key]||PRESET_CATS.find(p=>p.key===key)?.label||
      (formState.catLabels[key])||key.replace(/_/g,' ');
    const btn=document.createElement('button');btn.type='button';

function smartCase(val){
  if(!val)return'';
  // Find first real letter
  const m=val.match(/^(\s*)(\S)(.*)/s);
  if(!m)return val;
  return m[1]+m[2].toLocaleUpperCase()+m[3].toLocaleLowerCase();
}
function applySmartCase(input){
  const caret=input.selectionStart;
  const raw=input.value;
  const cased=smartCase(raw);
  if(cased!==raw){
    input.value=cased;
    try{input.setSelectionRange(caret,caret);}catch(_){}
  }
  formState.name=cased;
}

function moveActive(delta){
  const{listbox,nameInput}=getEls();
  if(!listbox||listbox.hidden)return;
  const opts=[...listbox.querySelectorAll('[role="option"]')];if(!opts.length)return;
  let idx=opts.findIndex(o=>o.getAttribute('aria-selected')==='true');if(idx<0)idx=0;
  const next=Math.max(0,Math.min(opts.length-1,idx+delta));if(next===idx)return;
  opts[idx].setAttribute('aria-selected','false');
  opts[next].setAttribute('aria-selected','true');
  if(nameInput)nameInput.setAttribute('aria-activedescendant',opts[next].id);
  const r=opts[next].getBoundingClientRect(),L=listbox.getBoundingClientRect();
  if(r.top<L.top||r.bottom>L.bottom)opts[next].scrollIntoView({block:'nearest'});
}

function acKeyNav(ev){

  else if(ev.key==='ArrowUp'){ev.preventDefault();moveActive(-1);}

    if(listbox&&!listbox.hidden){
      // Enter samo zatvara listbox - NIKAD ne zamjenjuje unos automatski

}

function scheduleAcSearch(query){

  if(!query||query.trim().length<2){closeListbox();return;}
  _acDebTimer=setTimeout(()=>runAcSearch(query),130);

async function runAcSearch(query){
  // Sačekaj IME — ne triggeri tokom composition
  if(typeof D !== 'undefined' && D.nameInput && D.nameInput._isComposing) return;
  // ══ VAŽNO: query = ono što je korisnica kucala — NIKAD ne mijenjamo automatski ══
  // Listbox = samo prijedlozi. Korisnica mora KLIKNUTI da bi izabrala.
  // Ako ne klikne — njen tekst ostaje nepromijenjen.

  // Korak 1: Lični rječnik
  const personalHit=(typeof amDictSearch==='function')?amDictSearch(query):null;
  if(personalHit&&personalHit.length>0){
    const result={canonical:query,score:0.99,ings:personalHit.map(i=>i.name),_ings_full:personalHit,_source:'personal'};
    triggerAiSuggestion(result);
    showAcSpinner();
    const seedR=await workerSearch(query);
    if(seedR.length)renderSuggestionsGrouped(seedR,null);
    return;
  }
  // Korak 2: Sastojak pretraga (@krompir)
  if(isIngredientQuery(query)){
    const ingResults=ingredientSearch(query);
    if(ingResults.length){renderSuggestionsGrouped(ingResults,'🥕 Jela s tim sastojkom');return;}
  }
  // Korak 3: Seed prijedlozi — SAMO kao hint lista, ne auto-replace
  showAcSpinner();
  const results=await workerSearch(query);
  if(results.length){
    renderSuggestionsGrouped(results,null);
    // Predloži sastojke SAMO za visok score match, ali naziv u inputu ostaje netaknut
    if(!formState.aiAccepted&&!formState.aiDismissed&&results[0].score>0.85){
      triggerAiSuggestion(results[0]);
    }
  } else {
    // Nema u seedu — zatvori listbox, korisnica slobodno upisuje vlastiti naziv
    closeListbox();
    // Pokušaj Claude API za sastojke (ali naziv NE mijenjamo)
    if(query.trim().length>2&&!formState.aiAccepted&&!formState.aiDismissed){
      try{
        const claudeResult=await fetchAiIngredients(query);
        if(claudeResult&&claudeResult.length){
          const processed=postProcessAiIngs(claudeResult,query);
          formState.aiResult={canonical:query,score:0.85,ings:processed.map(i=>i.name),_ings_full:processed,_source:'claude'};
          renderAiBox(formState.aiResult);
        }
      }catch(e){}
    }
  }
}

// ── ALLOWED UNITS (BUG-02) ───────────────────────────────────
const ALLOWED_UNITS = ['g','kom','ml','kaš','kg','l','kšč'];
const UNIT_MAP = {
  // stari nazivi → novi
  'kašika':'kaš','kašič':'kšč','kašičica':'kšč',
  // internacionalni → naši
  'kg':'kg','l':'l','šolja':'ml','cup':'ml',
  'tsp':'kšč','tbsp':'kaš','kaš':'kaš','kšč':'kšč',
  'pcs':'kom','Stk.':'kom','pz':'kom','unid.':'kom',
  'EL':'kaš','TL':'kšč','c.s.':'kaš','c.c.':'kšč',
  'cucch.':'kaš','cucch.c':'kšč','cda':'kaš','cdta':'kšč',
  'tasse':'ml','taza':'ml','tazza':'ml','стакан':'ml',
  'ст.л.':'kaš','ч.л.':'kšč','лст':'kaš','члк':'kšč',
  // engleski
  'g':'g','ml':'ml','kom':'kom',
};
const UNIT_SCALE = {'kg':1000,/* l ostaje l */'šolja':240,'cup':240};

function normalizeUnit(u){
  if(!u)return 'g';
  const clean = u.trim().toLowerCase();
  // Direktan match
  if(ALLOWED_UNITS.includes(u)) return u;
  // Iz mape
  const mapped = UNIT_MAP[u] || UNIT_MAP[clean];
  if(mapped && ALLOWED_UNITS.includes(mapped)) return mapped;
  return 'g'; // fallback
}
function normalizeQtyUnit(qty,unit){
  const nu = normalizeUnit(unit);
  const scale = UNIT_SCALE[unit];
  if(scale&&qty){
    const q = parseFloat(qty);
    if(!isNaN(q))return {qty:String(Math.round(q*scale)), unit:nu};
  }
  return {qty:qty||'', unit:nu};
}

// ── NEGATION FILTER (BUG-01) ─────────────────────────────────
const SYNONYM_MAP = {
  'brašno':['brašno','pšenično brašno','belo brašno','kukuruzno brašno','ražano brašno'],
  'gluten':['gluten','pšenica','ječam','raž','krupica'],
  'šećer':['šećer','beli šećer','kristal šećer'],
  'laktoza':['mleko','mlijeko','pavlaka','sir','jogurt','kajmak'],
  'jaje':['jaje','jaja','jajce'],
  'orasi':['orasi','lješnjaci','bademi','kikiriki','pistacije'],
};

function parseNegations(name){
  const banned = new Set();
  const rx = /(bez|no)\s+([a-zA-ZčćžšđČĆŽŠĐ\s\-]+?)(?=\s+i\s+bez|\s*,|\s*i\s*$|$)/gi;
  let m;
  while((m=rx.exec(name))!==null){
    const token = m[2].trim().toLowerCase();
    banned.add(token);
    // expand synonyms
    for(const [canon,syns] of Object.entries(SYNONYM_MAP)){
      if(syns.includes(token)||token===canon){
        syns.forEach(s=>banned.add(s));
        banned.add(canon);
      }
    }
  }
  return banned;
}

function filterByNegation(ings, mealName){
  const banned = parseNegations(mealName||'');
  if(!banned.size)return ings;
  return ings.filter(ing=>{
    const low = ing.toLowerCase();
    for(const b of banned){
      if(low.includes(b)||b.includes(low))return false;
    }
    return true;
  });
}

// ── COUNT LIMIT (BUG-03) ─────────────────────────────────────
const WORD_NUMS = {
  'jedan':1,'jedna':1,'jedno':1,'dva':2,'dvije':2,'tri':3,
  'četiri':4,'pet':5,'šest':6,'sedam':7,'osam':8,'devet':9,'deset':10
};
function parseCountLimit(name){
  const rx = /od\s+(\d+|jedan|jedna|jedno|dva|dvije|tri|četiri|pet|šest|sedam|osam|devet|deset)\s+sastojka/i;
  const m = (name||'').match(rx);
  if(!m)return null;
  const token = m[1].toLowerCase();
  return WORD_NUMS[token]||parseInt(token,10)||null;
}

// ── FUZZY DEDUP (BUG-04) ─────────────────────────────────────
const ING_SYNONYMS = {
  'piletina':['piletina','pileći file','pileća prsa','pileće meso','pileće belo meso','chicken'],
  'govedina':['govedina','goveđe meso','juneće meso','mljeveno meso','mleveno meso'],
  'paradajz':['paradajz','rajčica','crveni paradajz','cherry paradajz','pelat'],
  'crni luk':['crni luk','luk','crveni luk','ljubičasti luk'],
  'ulje':['ulje','maslinovo ulje','suncokretovo ulje','biljno ulje'],
};
function getIngCanon(name){
  const low = (name||'').toLowerCase().trim();
  for(const [canon,variants] of Object.entries(ING_SYNONYMS)){
    if(variants.some(v=>low.includes(v)||v.includes(low)))return canon;
  }
  return low;
}
function levenshtein(a,b){
  const m=a.length,n=b.length;
  const d=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    d[i][j]=a[i-1]===b[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);
  return d[m][n];
}
function isSimilarIng(a,b){
  const ca=getIngCanon(a),cb=getIngCanon(b);
  if(ca===cb)return true;
  const maxLen=Math.max(ca.length,cb.length);
  if(!maxLen)return false;
  const dist=levenshtein(ca,cb);
  return (1-dist/maxLen)>=0.82;
}
function dedupeIngredients(ings){
  const out=[];
  for(const ing of ings){
    const dup=out.find(x=>isSimilarIng(x.name,ing.name));
    if(!dup)out.push(ing);
  }
  return out;
}

// ── PAMETNO MAPIRANJE JEDINICE po nazivu sastojka ─────────────
function guessUnit(name){
  const n = (name||'').toLowerCase().trim();
  // kom — cijele namirnice koje se broje
  const komWords = ['jaje','jaja','jajce','luk','glavica','paprika','paradajz','krompir',
    'šargarepa','mrkva','tikvica','patlidžan','brokola','karfiol','limun','narandža',
    'jabuka','kruška','banana','avokado','krastavac','praziluk','beli luk','čen',
    'kocka','lovorov list','list','kom','par','parče','kriška'];
  // ml/l — tečnosti
  const mlWords = ['voda','mleko','mlijeko','ulje','sok','sirće','ocat','kremšnit',
    'kefir','alkohol','vino','pivo','bujon','temeljac','čorba'];
  // kaš — začini i kašike
  const kasWords = ['so','sol','šećer','biber','paprika mlev','origano','timijan',
    'bosiljak','kurkuma','kim','kmin','cimet','vanila','prašak','soda','kvasac',
    'skrob','škrob','brašno za prahu','ulje maslinovo','sirće','ocat','med',
    'pavlaka','kisela','kajmak','majonez','senf','kečap','sos'];
  // kšč — male količine
  const kscWords = ['sol sitna','prstohvat','anis','karanfilić','muskat','lovor','žafran'];

  for(const w of kscWords) if(n.includes(w)) return 'kšč';
  for(const w of kasWords) if(n.includes(w)) return 'kaš';
  for(const w of mlWords)  if(n.includes(w)) return 'ml';
  for(const w of komWords) if(n.includes(w)) return 'kom';
  return 'g';
}

// ── POST-PROCESS AI INGS (all fixes combined) ─────────────────
function postProcessAiIngs(ings, mealName){
  // BUG-01: filter negations
  let processed = filterByNegation(ings, mealName);
  // BUG-02: normalize units
  processed = processed.map(ing=>{
    if(typeof ing==='string') return {name:ing, qty:'', unit:guessUnit(ing), source:'ai'};
    const {qty,unit} = normalizeQtyUnit(ing.qty, ing.unit||guessUnit(ing.name));
    return {...ing, qty, unit:unit||guessUnit(ing.name), source:'ai'};
  });
  // BUG-03: count limit
  const limit = parseCountLimit(mealName);
  if(limit&&processed.length>limit)processed=processed.slice(0,limit);
  // BUG-04: dedup
  processed = dedupeIngredients(processed);
  return processed;
}

function parseRecipeFromHtml(html){
  // Prioritet 1: JSON-LD schema.org/Recipe
  const jsonldRx = /<script[^>]+type="application\/ld\+json"[^>]*>([\s\S]*?)<\/script>/gi;
  let m;
  while((m=jsonldRx.exec(html))!==null){
    try{
      const data=JSON.parse(m[1]);
      const recipe=findSchemaRecipe(data);
      if(recipe?.recipeIngredient?.length){
        return recipe.recipeIngredient.map(parseIngredientString);
      }
    }catch(_){}
  }
  // Prioritet 2: microdata itemprop="recipeIngredient"
  const microdataRx = /itemprop="recipeIngredient"[^>]*>([^<]+)/gi;
  const micros=[];
  while((m=microdataRx.exec(html))!==null){
    const txt=m[1].trim();
    if(txt.length>2)micros.push(parseIngredientString(txt));
  }
  if(micros.length)return micros;
  // Prioritet 3: heuristic — li elementi koji izgledaju kao sastojci
  const liRx = /<li[^>]*>([^<]{5,80})<\/li>/gi;
  const candidates=[];
  while((m=liRx.exec(html))!==null){
    const txt=m[1].replace(/&amp;/g,'&').replace(/&nbsp;/g,' ').trim();
    if(/\d/.test(txt)&&txt.length<100)candidates.push(parseIngredientString(txt));
  }
  return candidates.slice(0,20);
}
function findSchemaRecipe(obj){
  if(!obj)return null;
  if(Array.isArray(obj)){for(const x of obj){const r=findSchemaRecipe(x);if(r)return r;}}
  if(typeof obj==='object'){
    if((obj['@type']==='Recipe'||obj['@type']?.includes?.('Recipe'))&&obj.recipeIngredient)return obj;
    for(const v of Object.values(obj)){const r=findSchemaRecipe(v);if(r)return r;}
  }
  return null;
}
function parseIngredientString(str){
  str = String(str).replace(/<[^>]+>/g,'').trim();
  const m = str.match(/^(\d+[\d.,\/]*)\s*([a-zA-ZčćžšđšĐ.]+)?\s+(.+)$/);
  if(m){
    const {qty,unit} = normalizeQtyUnit(m[1], m[2]||'g');
    return {name:m[3].trim(), qty, unit};
  }
  return {name:str, qty:'', unit:'g'};
}

// ── OCR VIA TESSERACT.JS (BUG-06) ────────────────────────────
let _tesseractLoaded=false;
async function loadTesseract(){
  if(_tesseractLoaded||window.Tesseract)return;
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=()=>{_tesseractLoaded=true;res();};
    s.onerror=rej;
    document.head.appendChild(s);
  });
}
async function ocrImageFile(file){
  if(!file)return null;
  amTelEvent('ocr_attempt');
  const _ocrT0 = Date.now();
  try{
    await loadTesseract();
    if(!window.Tesseract)throw new Error('Tesseract not loaded');
    toast('OCR — čitam recept sa slike…');
    const {data:{text}} = await Tesseract.recognize(file,'srp+eng',{
      logger:m=>{if(m.status==='recognizing text')console.log('OCR:',Math.round(m.progress*100)+'%');}
    });
    if(!text||text.trim().length<10){
      toast('Nisam pronašla tekst na slici. Probaj jasniju fotografiju.');
      return [];
    }
    // Parsuj linije kao sastojke
    const lines = text.split('\n').map(l=>l.trim()).filter(l=>l.length>2&&l.length<120);
    const ings = lines.map(parseIngredientString).filter(i=>i.name.length>1);
    const processed = postProcessAiIngs(ings, document.getElementById('am-name-input')?.value||'');
    amTelEvent('ocr_success', {ms: Date.now()-_ocrT0});
    toast(`OCR: pronašla ${processed.length} sastojaka ✓`);
    return processed;
  }catch(e){
    console.warn('OCR error:',e);
    amTelEvent('error', {msg:'ocr: '+String(e).slice(0,60)});
    toast('OCR nije uspio. Dodaj sastojke ručno.');
    return [];
  }
}
window.importFromOcrImage = async function importFromOcrImage(file){
  if(!file)return;
  amTelEvent('ocr_attempt');
  const _t0 = Date.now();
  // Pokušaj Claude Vision (bolji), fallback na Tesseract
  let ings = [];
  try {
    ings = await ocrImageViaClaudeVision(file);
  } catch(e) {
    console.warn('[OCR] Claude Vision failed, Tesseract fallback:', e.message);
    ings = await ocrImageFile(file);
  }
  if(!ings||!ings.length){ toast('Nisam pronašla sastojke na slici.','error'); return; }
  const processed = postProcessAiIngs(
    ings, document.getElementById('am-name-input')?.value||''
  );
  processed.forEach(ing=>{
    if(!formState.ingredients.some(x=>isSimilarIng(x.name,ing.name)))
      formState.ingredients.push({id:uid(),...ing,source:'ocr'});
  });
  amTelEvent('ocr_success',{ms:Date.now()-_t0});
  toast('Dodano ' + processed.length + ' sastojaka ✓');
  renderIngList();updateTab2Badge();scheduleSaveDraft();
}

function triggerAiSuggestion(searchResult){
  if(!searchResult)return;
  if(formState.aiAccepted||formState.aiDismissed)return;

  // ── DISH_SEED ima ings — prikaži odmah, bez API ──────────────
  if(searchResult.ings && searchResult.ings.length > 0){
    amTelEvent('ai_trigger');
    amClearAiSlowTimer();
    const mealName = document.getElementById('am-name-input')?.value||'';
    const processed = postProcessAiIngs(
      searchResult.ings.map(i=>typeof i==='string'
        ? {name:i, qty:'', unit:guessUnit(i), confidence:searchResult.score||0.85}
        : ({...i, unit:i.unit||guessUnit(i.name)})
      ),
      mealName
    );
    const result = {
      ...searchResult,
      ings: processed.map(i=>i.name),
      _ings_full: processed,
      _source: searchResult._source || 'seed'
    };
    formState.aiResult = result;
    renderAiBox(result);
    return;
  }

  // ── Nema u seed-u — pokušaj Claude API ──────────────────────
  // Pokaži loading state dok čekamo API
  const mealName = document.getElementById('am-name-input')?.value||'';
  if(mealName.trim().length > 2 && !formState.aiAccepted && !formState.aiDismissed){
    amStartAiSlowTimer();
    fetchAiIngredients(mealName).then(result => {
      if(result && typeof renderAiBox === 'function') renderAiBox(result);
    }).catch(() => {
      amClearAiSlowTimer();
      showAiEmptyState();
    });
  } else {
    showAiEmptyState();
  }
}

function removeChipFromDOM(li,afterRemove){
  if(!li||li._removing)return;li._removing=true;
  li.style.animation='chipFadeOut 120ms ease-out both';
  li.addEventListener('animationend',()=>{
    const parent=li.parentNode,next=li.nextElementSibling,prev=li.previousElementSibling;
    li.remove();
    const focus=(next&&next.matches('li.chip'))?next:(prev&&prev.matches('li.chip'))?prev:parent;
    if(focus)focus.focus();if(afterRemove)afterRemove();
  },{once:true});
}

function updateChipX(li,isSel){
  const isCore = li.getAttribute('data-core')==='1';
  if(isCore) return; // preset chipovi nikad nemaju ×
  const existing=li.querySelector('.chip__remove');
  if(isSel&&!existing){
    const btn=document.createElement('button');btn.type='button';btn.className='chip__remove';
    btn.setAttribute('aria-label','Ukloni: '+(li.getAttribute('data-label')||''));
    btn.setAttribute('tabindex','-1');btn.textContent='\xd7';li.appendChild(btn);
  }else if(!isSel&&existing){existing.remove();}
}

// Prikaži/sakrij inline input za novu kategoriju
function ecShowAddInput(){
  const el=D.extraChips;if(!el)return;
  // Ako je input već otvoren, fokusiraj ga
  const existing=el.querySelector('.ec-inline-add');
  if(existing){existing.focus();return;}

  // Sakrij + dugme
  const addBtn=el.querySelector('.ec-add-btn');
  if(addBtn)addBtn.style.display='none';

  // Kreiraj inline input chip
  const wrap=document.createElement('div');
  wrap.className='ec-chip-wrap ec-adding';

  const inp=document.createElement('input');
  inp.type='text';
  inp.className='ec-inline-add';
  inp.placeholder=t('ph_nova_kat')||'npr. Slatko';
  inp.maxLength=30;
  inp.setAttribute('aria-label','Novi filter');
  wrap.appendChild(inp);

  // × za odustajanje
  const cancel=document.createElement('button');
  cancel.type='button';
  cancel.className='ec-del';
  cancel.textContent='×';
  cancel.setAttribute('tabindex','-1');
  cancel.onclick=function(ev){ev.stopPropagation();cancelAdd();};
  wrap.appendChild(cancel);

  // Ubaci ispred + dugmeta (ili na kraj)
  if(addBtn)el.insertBefore(wrap,addBtn);
  else el.appendChild(wrap);
  inp.focus();

  function doAdd(){
    const val=(inp.value.trim()).charAt(0).toUpperCase()+(inp.value.trim()).slice(1).toLowerCase();
    if(!val){inp.style.borderColor='var(--red,#c0392b)';inp.focus();return;}
    if(val.length>30){inp.style.borderColor='var(--red,#c0392b)';inp.focus();return;}
    const allLabels=[...[...formState.categories].map(k=>(formState.catLabels[k]||k).toLowerCase())];
    if(allLabels.includes(val.toLowerCase())){
      inp.style.borderColor='var(--red,#c0392b)';
      ariaAnnounce('"'+val+'" već postoji');
      inp.select();return;
    }
    const key='custom_'+Date.now();
    formState.catLabels[key]=val;
    formState.categories.add(key);
    scheduleSaveDraft();
    ariaAnnounce('"'+val+'" dodano.');
    renderExtraChips();
  }

  function cancelAdd(){
    wrap.remove();
    if(addBtn)addBtn.style.display='';
  }

  let committed=false;
  inp.addEventListener('keydown',function(ev){
    if(ev.key==='Enter'){ev.preventDefault();if(!committed){committed=true;doAdd();}}
    if(ev.key==='Escape'){ev.preventDefault();cancelAdd();}
    inp.style.borderColor='';
  });
  inp.addEventListener('blur',function(){
    setTimeout(function(){
      if(!committed&&document.activeElement!==inp&&!wrap.contains(document.activeElement)){
        cancelAdd();
      }
    },150);
  });
}


function setupEcDelegation(){
  if(document._ecDelSetup)return;
  document._ecDelSetup=true;
  // Fallback delegation — direktni listeneri na ecMakeChip su primarni
  document.addEventListener('click',function(ev){
    var btn=ev.target.closest('.ec-del');
    if(!btn)return;
    var wrap=btn.closest('.ec-chip-wrap');
    if(!wrap||wrap._delHandled)return;
    // Direktni listener na btn trebao bi ga riješiti
    // Ovdje samo ako direktni listener nije okidnut (edge case)
    btn.dispatchEvent(new MouseEvent('click',{bubbles:false,cancelable:true}));
  });
}

      formState.categories.delete(k);
      formState.selectedCats.delete(k);
      delete formState.catLabels[k];
    }else{
      formState.categories.delete(k);
      formState.selectedCats.delete(k);
      if(formState.catLabels[k])delete formState.catLabels[k];
    }
    _undoStack={
      key:k,label:currentLabel,source:'categories',isCustom:custom,
      catSnapshot:snapCats,catLabels:snapLabels
    };
    scheduleSaveDraft();
    showUndoBar('"'+currentLabel+'" — obrisano');
    renderExtraChips();
  });
  wrap.appendChild(delBtn);
  return wrap;
}

function ecStartEdit(wrap, key, oldLabel, isCustom){
  if(wrap.querySelector('.ec-inline-inp'))return;

  var lbl=wrap.querySelector('.ec-lbl');
  if(!lbl)return;
  var delBtn=wrap.querySelector('.ec-del');

  // Sakrij label i delete dugme
  lbl.style.display='none';
  if(delBtn)delBtn.style.display='none';

  // Inline input
  var inp=document.createElement('input');
  inp.type='text';
  inp.className='ec-inline-inp';
  inp.value=oldLabel;
  inp.maxLength=30;
  inp.setAttribute('aria-label','Uredi naziv kategorije');
  inp.style.pointerEvents='auto';

  // Ubaci input ISPRED label (ne .ec-edit koji ne postoji)
  wrap.insertBefore(inp, lbl);
  inp.focus();
  inp.select();

  function doCommit(){
    var val=inp.value.trim();
    if(!val||val===oldLabel){doCancel();return;}
    var lowerVal=val.toLowerCase();
    var all=[
      ...PRESET_CATS.filter(p=>p.key!==key).map(p=>(formState.catLabels[p.key]||p.label).toLowerCase()),
      ...[...formState.categories].filter(k=>k!==key&&!PRESET_CATS.find(p=>p.key===k)).map(k=>(formState.catLabels[k]||k).toLowerCase())
    ];
    if(all.includes(lowerVal)){
      ariaAnnounce('"'+val+'" već postoji');
      inp.style.borderColor='var(--red,#c0392b)';
      inp.style.animation='shake .35s ease';
      inp.select();
      return;
    }
    formState.catLabels[key]=val;
    scheduleSaveDraft();
    ariaAnnounce('"'+oldLabel+'" preimenovano u "'+val+'".');
    renderExtraChips();
  }

  function doCancel(){
    renderExtraChips();
  }

  var committed=false;
  inp.addEventListener('keydown',function(ev){
    ev.stopPropagation();
    if(ev.key==='Enter'){ev.preventDefault();if(!committed){committed=true;doCommit();}}
    if(ev.key==='Escape'){ev.preventDefault();doCancel();}
  });
  inp.addEventListener('blur',function(){
    setTimeout(function(){
      if(!committed&&document.activeElement!==inp){committed=true;doCommit();}
    },120);
  });
}

// ── Chip delegation ────────────────────────────────────────────────
function setupChipDelegation(container,source){
  if(!container||container._del)return;
  container._del=true;
  container.setAttribute('role','listbox');container.setAttribute('aria-multiselectable','true');

  container.addEventListener('click',ev=>{
    const li=ev.target.closest('li.chip');
    if(!li||li._removing)return;

    const key   = li.getAttribute('data-key');
    const label = li.getAttribute('data-label');
    const isCore= li.getAttribute('data-core')==='1';

    // categories: direktni listeneri na svakom chipu rade posao
    // Ovdje samo obrađujemo mealTypes
    if(source==='categories') return;

    // ── × BUTTON — mealTypes ──────────────────────────────────
    if(ev.target.closest('.chip__remove')){
      ev.stopPropagation();
      if(source==='mealTypes'){
        if(isCore) return;
        scheduleSaveDraft(); renderMealTypeChips();
      }
      return;
    }

    // ── KLIK NA CHIP — mealTypes toggle ───────────────────────
    if(li.querySelector('.chip__rename-input'))return;

    // *** LOCKED: mealTypes toggle ***
    if(source==='mealTypes'){
      const isDRVU=['d','r','v','u'].includes(key);
      const isFlag=['fav','guests','brzo','zdravo','jeftino','smrznuto'].includes(key);
      const isSel=li.classList.contains('sel');
      const dataStore=li.getAttribute('data-store')||'mealTypes';
      if(isDRVU){
        if(isSel){
          const rem=new Set(formState.mealTypes);rem.delete(key);
          if(rem.size+formState.mealFlags.size===0){showInlineCatError(t('err_cats_min'));return;}
          formState.mealTypes.delete(key);
        }else{formState.mealTypes.add(key);}
      }else if(isFlag||dataStore==='mealFlags'){
        if(isSel)formState.mealFlags.delete(key);else formState.mealFlags.add(key);
      }
      const nowSel=isDRVU?formState.mealTypes.has(key):formState.mealFlags.has(key);
      li.classList.toggle('sel',nowSel);
      li.setAttribute('aria-selected',nowSel?'true':'false');
      updateChipX(li,nowSel);
      scheduleSaveDraft();
      return;
    }
  });

  // Desni klik / long-press → color picker za custom kategorije
  container.addEventListener('contextmenu',ev=>{
    ev.preventDefault();
    const li=ev.target.closest('li.chip');
    if(li&&li.getAttribute('data-custom')==='1'){
      showColorPicker(li,li.getAttribute('data-key'));
    }
  });
  // Double-click → rename custom kategorije (i selektovana i neselektovana)
  // Dblclick ILI longpress → rename
  container.addEventListener('dblclick',ev=>{
    if(source!=='categories')return;
    const li=ev.target.closest('li.chip');
    if(li&&!li.querySelector('.chip__rename-input')){
      ev.preventDefault(); ev.stopPropagation(); startRenameChip(li);
    }
  });
  // Longpress (450ms) → rename
  let _lpTimer=null, _lpLi=null;
  container.addEventListener('pointerdown',ev=>{
    if(source!=='categories')return;
    const li=ev.target.closest('li.chip');
    const xBtn=ev.target.closest('.chip__remove');
    if(!li||xBtn||li.querySelector('.chip__rename-input'))return;
    _lpLi=li;
    _lpTimer=setTimeout(()=>{
      _lpLi=null;
      if(!li.querySelector('.chip__rename-input')) startRenameChip(li);
    },450);
  });
  container.addEventListener('pointerup',()=>{ clearTimeout(_lpTimer);_lpLi=null; });
  container.addEventListener('pointermove',()=>{ clearTimeout(_lpTimer);_lpLi=null; });
  container.addEventListener('pointercancel',()=>{ clearTimeout(_lpTimer);_lpLi=null; });
  container.addEventListener('keydown',ev=>{
    const li=ev.target.closest('li.chip');if(!li)return;
    if(ev.key==='Delete'||ev.key==='Backspace'){ev.preventDefault();li.querySelector('.chip__remove')?.click();}
    if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();li.click();}
    if(ev.key==='F2'&&source==='categories'){
      ev.preventDefault();startRenameChip(li);
    }
    if(ev.key==='ArrowRight'){const n=li.nextElementSibling;if(n&&n.matches('li.chip'))n.focus();}
    if(ev.key==='ArrowLeft'){const p=li.previousElementSibling;if(p&&p.matches('li.chip'))p.focus();}
  });
}

function copyIngList(){
  const btn = document.getElementById('am-copy-ings-btn');
  if(!formState.ingredients.length){
    toast('Lista je prazna — nema šta kopirati.', 'error');
    return;
  }
  const text = formState.ingredients
    .map((ing, i) => {
      const qty = ing.qty ? ing.qty + ' ' + (ing.unit||'') + ' ' : '';
      return (i+1) + '. ' + qty + ing.name;
    })
    .join('\n');
  
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text)
      .then(()=>{
        toast('Sastojci kopirani ✓');
        if(btn){btn.classList.add('copied');btn.textContent='✓ Kopirano';
          setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='📋 Kopiraj listu';},2000);}
        amTelEvent && amTelEvent('clipboard_copy');
      })
      .catch(()=>_copyFallback(text, btn));
  } else {
    _copyFallback(text, btn);
  }
}
function _copyFallback(text, btn){
  // Fallback za starije browsere
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{
    document.execCommand('copy');
    toast('Sastojci kopirani ✓');
    if(btn){btn.classList.add('copied');btn.innerHTML='✓ Kopirano';
      setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='📋 Kopiraj listu';},2000);}
  }catch(e){
    toast('Kopiranje nije uspjelo. Markraj ručno.','error');
  }
  document.body.removeChild(ta);
}

function addIngFromInput(){

function handleIngPaste(ev){
  const text=ev.clipboardData.getData('text');
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(lines.length<2)return;
  ev.preventDefault();
  lines.forEach(line=>{
    const m=line.match(/^(\d+[\d.,]*)\s*([a-zA-Z\u010d\u0107\u017e\u0161\u0111\u0430-\u044f]+)?\s+(.+)$/);
    if(m)formState.ingredients.push({id:uid(),name:m[3].trim(),qty:m[1],unit:m[2]||t('units')[0]});
    else formState.ingredients.push({id:uid(),name:line,qty:'',unit:t('units')[0]});
  });
  renderIngList();updateTab2Badge();scheduleSaveDraft();ariaAnnounce('Dodano '+lines.length+' sastojaka');
}

  formState._scaleFactor=1;
  document.querySelectorAll('.sc-preset').forEach(btn=>{
    btn.classList.toggle('active',Math.abs(Number(btn.dataset.scale)-1)<0.01);
  });
  updateServingsDisplay();scheduleSaveDraft();
}

function applyScale(factor){
  // Uvijek skaliramo od BASE-a — nikad od trenutnog
  formState._scaleFactor=factor;
  const base=formState.servingsBase||4;
  formState.servings=Math.round(base*factor);
  if(D.scNum)D.scNum.value=formState.servings;
  updateServingsDisplay();scheduleSaveDraft();
  // Označi aktivni preset
  document.querySelectorAll('.sc-preset').forEach(btn=>{
    btn.classList.toggle('active',Math.abs(Number(btn.dataset.scale)-factor)<0.01);
  });
}

function setupAccordion(hdr,body){
  hdr.addEventListener('click',()=>{
    const isOpen=hdr.getAttribute('aria-expanded')==='true';
    hdr.setAttribute('aria-expanded',!isOpen?'true':'false');
    body.classList.toggle('open',!isOpen);
    // Strelica — dolje kad otvoreno, desno kad zatvoreno
    const icon=hdr.querySelector('.am-acc-icon');
    if(icon)icon.textContent=isOpen?'▸':'▾';
    // "Više detalja" mijenja tekst kad se otvori/zatvori
    const titleEl=hdr.querySelector('.am-acc-title');
    if(titleEl&&hdr.id==='am-vise-hdr'){
      const opt=titleEl.querySelector('.am-acc-opt');
      titleEl.childNodes[0].textContent=isOpen?'＋ Više detalja ':'– Sakrij detalje ';
    }
  });
  hdr.addEventListener('keydown',ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();hdr.click();}});
}

function renderLinks(){
  const linksList=document.getElementById('am-links-list');
  if(!linksList)return;
  linksList.innerHTML='';
  formState.links.forEach((url,i)=>{
    const div=document.createElement('div');div.className='link-row';
    div.innerHTML=`<a href="${escHtml(sanitizeUrl(url))}" target="_blank" rel="noopener noreferrer">${escHtml(url)}</a>
      <button type="button" style="border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:14px" aria-label="Ukloni link">\xd7</button>`;
    div.querySelector('button').addEventListener('click',()=>{formState.links.splice(i,1);renderLinks();scheduleSaveDraft();});
    linksList.appendChild(div);
  });
}
function addLink(){
  const inp=document.getElementById('am-link-input');
  const url=(inp?inp.value:'').trim();if(!url)return;
  if(!/^https?:\/\//i.test(url)){toast('Link nije validan — mora početi sa https://','error');return;}
  if(!formState.links.includes(url))formState.links.push(url);
  if(inp)inp.value='';
  renderLinks();scheduleSaveDraft();
  importFromLink(url);
}
function addPhoto(){
  if(formState.photos.length>=8)return;
  // Otvori file picker
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      formState.photos.push({name:file.name, dataUrl:ev.target.result});
      renderImgGrid(); scheduleSaveDraft();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function renderImgGrid(){
  const grid = document.getElementById('am-img-grid');
  if(!grid) return;
  grid.innerHTML = '';
  formState.photos.forEach((p, i) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;border:0.5px solid rgba(122,90,174,.2);background:#f8f6fc;flex-shrink:0;cursor:pointer;';

    // Slika
    const img = document.createElement('img');
    img.src = p.dataUrl || '';
    img.alt = p.name || 'Slika';
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    wrap.appendChild(img);

    // Overlay — pojavljuje se na hover/touch
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;background:rgba(122,90,174,.72);display:flex;align-items:center;justify-content:center;gap:8px;opacity:0;transition:opacity .18s;';
    
    // Olovka — izmijeni
    const editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.title = 'Zamijeni sliku';
    editBtn.innerHTML = '✏️';
    editBtn.style.cssText = 'background:rgba(255,255,255,.9);border:none;border-radius:50%;width:28px;height:28px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;box-shadow:0 1px 4px rgba(46,26,71,.2);';
    editBtn.addEventListener('mouseenter', () => editBtn.style.background='#fff');
    editBtn.addEventListener('mouseleave', () => editBtn.style.background='rgba(255,255,255,.9)');
    editBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      const inp2 = document.createElement('input');
      inp2.type='file'; inp2.accept='image/*';
      inp2.onchange = e2 => {
        const f2 = e2.target.files[0]; if(!f2) return;
        const r2 = new FileReader();
        r2.onload = ev2 => {
          formState.photos[i] = {name:f2.name, dataUrl:ev2.target.result};
          renderImgGrid(); scheduleSaveDraft();
        };
        r2.readAsDataURL(f2);
      };
      inp2.click();
    });

    // X — obriši
    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.title = 'Obriši sliku';
    delBtn.innerHTML = '×';
    delBtn.style.cssText = 'background:rgba(255,255,255,.9);border:none;border-radius:50%;width:28px;height:28px;font-size:15px;font-weight:400;color:#7A5AAE;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;box-shadow:0 1px 4px rgba(46,26,71,.2);line-height:1;';

    delBtn.addEventListener('mouseleave', () => { delBtn.style.background='rgba(255,255,255,.9)'; delBtn.style.color='#7A5AAE'; });
    delBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      formState.photos.splice(i, 1);
      renderImgGrid(); scheduleSaveDraft();
    });

    overlay.appendChild(editBtn);
    overlay.appendChild(delBtn);
    wrap.appendChild(overlay);

    // Hover / touch
    wrap.addEventListener('mouseenter', () => overlay.style.opacity='1');
    wrap.addEventListener('mouseleave', () => overlay.style.opacity='0');
    wrap.addEventListener('touchstart', () => {
      overlay.style.opacity = overlay.style.opacity==='1' ? '0' : '1';
    }, {passive:true});

    grid.appendChild(wrap);
  });

  if(formState.photos.length < 8){
    const addCell = document.createElement('div');

  }
}

// ── Nutrition ─────────────────────────────────────────────────────
function renderNutri(){
  const fields = t('nutri_fields') || {
    kcal: {lbl:'Kalorije', unit:'kcal'},
    prot: {lbl:'Proteini', unit:'g'},
    carb: {lbl:'Ugljeni hidrati', unit:'g'},
    fat:  {lbl:'Masti', unit:'g'},
    fiber:{lbl:'Vlakna', unit:'g'},
  };

  const grid = D.nutriGrid || document.getElementById('am-nutri-grid');
  const status = D.nutriStatus || document.getElementById('am-nutri-status');
  if(!grid) return;

  // Nema sastojaka
  if(!formState.ingredients || !formState.ingredients.length){
    grid.innerHTML = '<div style="font-size:13px;color:#7A5AAE;font-style:italic;padding:8px 0;text-align:center">Dodaj sastojke — kalorije će se izračunati automatski ✨</div>';
    if(status) status.style.display = 'none';
    return;
  }

  // Izračunaj nutri
  const nutri = computeNutriLocal();
  if(!nutri || !nutri.kcal){
    grid.innerHTML = '<div style="font-size:13px;color:#9B8AAB;font-style:italic;padding:8px 0">Dodaj količine sastojaka (npr. 200g, 2 kom) za tačan izračun.</div>';
    if(status) status.style.display = 'none';
    return;
  }

  const s = formState.servings || 4;

  // Prikaži po porciji i ukupno
  const perServing = {
    kcal: Math.round(nutri.kcal / s),
    prot: Math.round(nutri.prot / s * 10) / 10,
    carb: Math.round(nutri.carb / s * 10) / 10,
    fat:  Math.round(nutri.fat  / s * 10) / 10,
    fiber:Math.round((nutri.fiber || 0) / s * 10) / 10,
  };

  grid.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      ${Object.entries(perServing).map(([k, val]) => {
        const f = fields[k] || {lbl: k, unit: 'g'};
        const colors = {kcal:'#C9A96E', prot:'#7A5AAE', carb:'#5AA88B', fat:'#AA7A5A', fiber:'#8A9B7A'};
        const col = colors[k] || '#7A5AAE';
        return `<div style="background:#F8F5FF;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:11px;color:#9B8AAB;margin-bottom:2px">${f.lbl}</div>
          <div style="font-size:20px;font-weight:700;color:${col}">${val}</div>
          <div style="font-size:11px;color:#9B8AAB">${f.unit}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:11px;color:#9B8AAB;text-align:center;font-style:italic">po porciji · ${s} porcija ukupno</div>
    <div style="font-size:11px;color:#C2B5D4;text-align:center;margin-top:4px">* procjena na osnovu lokalnih podataka</div>
  `;

  if(status){
    status.style.display = 'none'; // Sakrij "⚡" kad ima rezultata
  }
  formState.nutri = nutri;
}

// ── Konverzija jedinica u grame ────────────────────────────────
function unitToGrams(qty, unit, ingName){
  const q = parseFloat(qty) || 0;
  if(!q) return 0;
  switch(unit){
    case 'g': return q;
    case 'kg': return q * 1000;
    case 'ml': return q; // aproksimacija 1ml≈1g
    case 'l': return q * 1000;
    case 'kom': {
      // Nađi perKom iz baze
      const key = findNutriKey(ingName);
      const perKom = key ? (NUTRI_DB[key].perKom || 100) : 100;
      return q * perKom;
    }
    case 'kaš': return q * 15;   // 1 kašika ≈ 15g
    case 'kšč': return q * 5;    // 1 kašičica ≈ 5g
    default: return q;
  }
}

function findNutriKey(name){
  if(!name) return null;
  const n = name.toLowerCase().trim();
  // Direktan match
  if(NUTRI_DB[n]) return n;
  // Parcijalni match
  for(const key of Object.keys(NUTRI_DB)){
    if(n.includes(key) || key.includes(n)) return key;
  }
  return null;
}

function computeNutriLocal(){
  if(formState.nutriEdited) return;
  if(!formState.ingredients.length) return;
  
  const totals = {kcal:0,prot:0,carb:0,fat:0,fiber:0,sugar:0,sodium:0,sat:0};
  let matched = 0;
  
  formState.ingredients.forEach(ing => {
    const key = findNutriKey(ing.name);
    if(!key) return;
    matched++;
    const db = NUTRI_DB[key];
    const grams = unitToGrams(ing.qty, ing.unit, ing.name);
    if(!grams) return;
    const factor = grams / 100;
    totals.kcal  += (db.kcal  || 0) * factor;
    totals.prot  += (db.prot  || 0) * factor;
    totals.carb  += (db.carb  || 0) * factor;
    totals.fat   += (db.fat   || 0) * factor;
    totals.fiber += (db.fiber || 0) * factor;
    totals.sugar += (db.sugar || 0) * factor;
    totals.sodium+= (db.sodium|| 0) * factor;
    totals.sat   += (db.sat   || 0) * factor;
  });
  
  if(matched === 0){
    if(formState.ingredients && formState.ingredients.some(i=>parseFloat(i.qty)>0)){
      if(typeof D!=='undefined'&&D.nutriGrid)
        D.nutriGrid.innerHTML='<div style="font-size:10px;color:#5A4B6A;font-style:italic;padding:6px 0">Neke namirnice nisu u lokalnoj bazi. Koristi generičke nazive (npr. "piletina", "brašno", "jabuka").</div>';
    }
    return;
  }
  
  const servings = formState.servings || 4;
  formState.nutri = {
    kcal:  Math.round(totals.kcal  / servings),
    prot:  Math.round(totals.prot  / servings * 10) / 10,
    carb:  Math.round(totals.carb  / servings * 10) / 10,
    fat:   Math.round(totals.fat   / servings * 10) / 10,
    fiber: Math.round(totals.fiber / servings * 10) / 10,
    sugar: Math.round(totals.sugar / servings * 10) / 10,
    sodium:Math.round(totals.sodium/ servings * 100) / 100,
    sat:   Math.round(totals.sat   / servings * 10) / 10,
  };
  renderNutri();
  scheduleSaveDraft();
}

  computeNutriLocal();

function trapFocus(ev){
  if(ev.key!=='Tab')return;
  const focusable=[...D.modal.querySelectorAll('button:not([disabled]),input:not([disabled]),select:not([disabled]),[tabindex="0"]')].filter(el=>el.offsetParent!==null);
  if(!focusable.length)return;
  const first=focusable[0],last=focusable[focusable.length-1];
  if(ev.shiftKey){if(document.activeElement===first){ev.preventDefault();last.focus();}}
  else{if(document.activeElement===last){ev.preventDefault();first.focus();}}
}

// MAGIC MOMENT — sve tiho u pozadini kada korisnica upiše naziv
// Redoslijed: slika → Wikipedia opis → TheMealDB → nutri
// ══════════════════════════════════════════════════════════════
window._magicRunning = false;

window.amMagicMoment = async function(name) {
  if (!name || name.length < 3) return;
  if (window._magicRunning) return;
  window._magicRunning = true;

  try {
    // ── 1. SLIKA — TheMealDB prvo (profesionalne foto), pa Unsplash ──
    if (!formState._imgDataUrl && !formState._imgUrl) {
      // TheMealDB slika — tiho
      if (window.AM_MEALDB) {
        AM_MEALDB.suggestImage(name).then(imgUrl => {
          if (imgUrl && !formState._imgDataUrl && !formState._imgUrl) {
            const img = document.getElementById('am-meal-img');
            const ph  = document.getElementById('am-meal-img-placeholder');
            if (img) {
              const test = new Image();
              test.onload = () => {
                img.src = imgUrl;
                img.style.display = 'block';
                if (ph) ph.style.display = 'none';
                formState._imgUrl = imgUrl;
              };
              test.src = imgUrl;
            }
          } else {
            // Fallback Unsplash
            if (typeof amSuggestImage === 'function') amSuggestImage(name);
          }
        });
      } else {
        if (typeof amSuggestImage === 'function') amSuggestImage(name);
      }
    }

    // ── 2. WIKIPEDIA OPIS — tiho, prikaži ispod naziva ──────────
    if (window.AM_WIKI) {
      const lang = (typeof getCurrentLang === 'function') ? getCurrentLang() : 'sh';
      AM_WIKI.search(name, lang).then(wiki => {
        if (!wiki?.extract) return;
        // Prikaži mali opis ispod polja za naziv
        let wikiEl = document.getElementById('am-wiki-extract');
        if (!wikiEl) {
          wikiEl = document.createElement('div');
          wikiEl.id = 'am-wiki-extract';
          wikiEl.style.cssText = 'font-size:10px;color:#5A4B6A;font-style:italic;line-height:1.5;margin-top:4px;padding:6px 10px;background:rgba(122,90,174,.05);border-radius:6px;border-left:2px solid rgba(122,90,174,.2);';
          const nameInputWrap = document.getElementById('am-name-input')?.parentElement;
          if (nameInputWrap) nameInputWrap.appendChild(wikiEl);
        }
        wikiEl.textContent = wiki.extract;
        wikiEl.style.display = 'block';

        // Nestane nakon 8 sekundi ako korisnica nije kliknula
        clearTimeout(window._wikiHideTimer);
        window._wikiHideTimer = setTimeout(() => {
          if (wikiEl) wikiEl.style.opacity = '0';
          setTimeout(() => { if (wikiEl) wikiEl.style.display = 'none'; wikiEl.style.opacity = '1'; }, 600);
        }, 8000);
      });
    }

    // ── 3. THEMEALDB SASTOJCI — ako korisnica još nema sastojaka ──
    if (window.AM_MEALDB && !formState.ingredients?.length) {
      AM_MEALDB.search(name).then(meal => {
        if (!meal?.ingredients?.length) return;
        // Nemoj prepisati AI chip box — samo ako je prazan
        if (formState.ingredients?.length) return;
        // TheMealDB vraća engleski — koristimo samo ako DISH_SEED nema
        if (formState.aiResult) return; // AI seed već našao
        // Prikaži kao prijedlog u AI boxu
        const processed = meal.ingredients.map(i => ({
          name: i.name,
          qty:  i.qty ? i.qty.replace(/[^0-9.,]/g,'').trim() : '',
          unit: 'g',
          source: 'mealdb'
        })).filter(i => i.name && i.name.length > 1).slice(0, 12);

        if (processed.length && typeof renderAiBox === 'function' && !formState.aiAccepted) {
          const result = {
            canonical: name,
            score: 0.85,
            ings: processed.map(i => i.name),
            _ings_full: processed,
            _source: 'mealdb'
          };
          formState.aiResult = result;
          renderAiBox(result);
        }
      });
    }

  } finally {
    // Reset nakon 10s — dozvoli novi magic za drugi naziv
    setTimeout(() => { window._magicRunning = false; }, 10000);
  }
};

function amShowPreview(file){
  if(!file)return;
  // Max 3 slike
  const existingImgs = document.querySelectorAll('#am-img-grid .am-img-thumb');
  if(existingImgs.length >= 3){
    if(typeof toast==='function') toast('Maksimalno 3 slike po receptu.','info');
    return;
  }
  if(!file.type.startsWith('image/')){
    toast('Molim odaberi sliku (JPG, PNG, WEBP).','error');return;
  }
  // File size limit — max 10MB
  if(file.size>10*1024*1024){
    toast('Slika je prevelika. Max 10MB.','error');return;
  }
  var reader=new FileReader();
  reader.onload=function(e){
    formState._imgDataUrl=e.target.result;
    // Oslobodi memoriju od starog objectURL
    if(formState._imgBlobUrl){
      URL.revokeObjectURL(formState._imgBlobUrl);
      formState._imgBlobUrl=null;
    }
    formState._imgUrl=null; // vlastita slika — ukloni AI prijedlog URL
    var img=document.getElementById('am-meal-img');
    var ph=document.getElementById('am-meal-img-placeholder');
    var badge=document.getElementById('am-meal-img-wrap')?.querySelector('.am-img-suggest-badge');
    if(img){img.src=e.target.result;img.style.display='block';}
    if(ph){ph.style.display='none';}
    if(badge)badge.remove(); // ukloni "Prijedlog" badge
  };
  reader.readAsDataURL(file);
}
window.amPickImage = function amPickImage(source){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  if(source==='camera') inp.setAttribute('capture','environment');
  inp.onchange = function(){
    const file = inp.files && inp.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      formState.photos.push({name:file.name, dataUrl:ev.target.result});
      renderImgGrid();
      scheduleSaveDraft();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function amInitDropzone(){
  var dz=document.getElementById('am-meal-img-wrap');
  if(!dz||dz._dzInit)return;

    if(file)amShowPreview(file);

}

const AM_PERSONAL_DICT_KEY = 'am_personal_dict_v1';
let _personalDict = {}; // { "bećarac": [{name:"meso",qty:"300",unit:"g"}, ...] }

// ── Učitaj lični rječnik iz localStorage ──────────────────────
function amDictLoad() {
  try {
    const raw = localStorage.getItem(AM_PERSONAL_DICT_KEY);
    if (raw) _personalDict = JSON.parse(raw);
  } catch (_) { _personalDict = {}; }
}

// ── Sačuvaj lični rječnik ─────────────────────────────────────
function amDictSave() {
  try { localStorage.setItem(AM_PERSONAL_DICT_KEY, JSON.stringify(_personalDict)); }
  catch (_) {}
}

// ── Dodaj recept u lični rječnik ──────────────────────────────
function amDictAdd(mealName, ingredients) {
  if (!mealName || !ingredients?.length) return;
  const key = mealName.toLowerCase().trim();
  _personalDict[key] = ingredients.map(i => ({ ...i }));
  // Spremi i sinonime (prve 2 riječi kao ključ)
  const words = key.split(/\s+/);
  if (words.length > 1) {
    const shortKey = words.slice(0, 2).join(' ');
    if (!_personalDict[shortKey]) _personalDict[shortKey] = _personalDict[key];
  }
  amDictSave();
  console.log('[Dict] Naučila sam:', key, '(' + ingredients.length + ' sastojaka)');
}

// ── Pretraži lični rječnik (fuzzy) ───────────────────────────
function amDictSearch(query) {
  if (!query || !Object.keys(_personalDict).length) return null;
  const q = query.toLowerCase().trim();

  // 1. Egzaktno podudaranje
  if (_personalDict[q]) return _personalDict[q];

  // 2. Sadrži query
  for (const [key, ings] of Object.entries(_personalDict)) {
    if (key.includes(q) || q.includes(key)) return ings;
  }

  // 3. Levenshtein fuzzy (prag 0.75 — malo opuštenije nego dedup)
  for (const [key, ings] of Object.entries(_personalDict)) {
    const maxLen = Math.max(key.length, q.length);
    if (!maxLen) continue;
    const dist = levenshtein(key, q);
    if ((1 - dist / maxLen) >= 0.75) return ings;
  }

  return null;
}

  if (!inp || !inp.value.trim()) return;

  const lines = inp.value.split(/[,\n]+/).map(l => l.trim()).filter(Boolean);

    const m = line.match(/^(\d+[\d.,]*)\s*([a-zA-ZčćžšđČĆŽŠĐ.]+)?\s+(.+)$/);
